<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnom-Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.status-lamps{display:flex;justify-content:center;gap:5px;padding:3px 0;background:#08080c}
.lamp{width:90px;height:5px;border-radius:2px;transition:all .3s;opacity:.15}
.lamp.on{opacity:1;animation:glow 2s cubic-bezier(.45,.05,.55,.95) infinite}
.lamp.busy{opacity:1;animation:pulse .8s cubic-bezier(.45,.05,.55,.95) infinite}
@keyframes glow{0%,100%{box-shadow:0 0 6px currentColor,0 0 12px currentColor;opacity:.75}50%{box-shadow:0 0 14px currentColor,0 0 28px currentColor,0 0 45px currentColor;opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px currentColor;opacity:.5}50%{box-shadow:0 0 16px currentColor,0 0 35px currentColor,0 0 60px currentColor;opacity:1}}
.lamp[title]:hover::after{content:attr(title);position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#222;color:#ddd;padding:2px 8px;border-radius:3px;font-size:.7rem;white-space:nowrap;z-index:99}
.lamp{position:relative}
header{background:#111118;border-bottom:1px solid #222;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.3rem;color:#4CAF50;font-weight:700}
.header-actions{display:flex;gap:10px;align-items:center}
.header-stats{display:flex;gap:18px;font-size:.82rem;color:#888;margin-right:20px}
.header-stats span{color:#4CAF50;font-weight:600}
button{background:transparent;border:1px solid #333;color:#ccc;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:.82rem;transition:all .15s}
button:hover{border-color:#4CAF50;color:#fff}
.btn-green{background:#4CAF50;border-color:#4CAF50;color:#fff}
.btn-green:hover{background:#45a049}
.btn-red{color:#ff5252;border-color:#ff5252}
.btn-red:hover{background:#ff5252;color:#fff}
.main{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 53px)}
.sidebar{background:#0e0e14;border-right:1px solid #1a1a22;overflow-y:auto;padding:12px}
.sidebar input{width:100%;padding:8px 10px;background:#161620;border:1px solid #222;border-radius:4px;color:#ddd;margin-bottom:10px;font-size:.85rem}
.sidebar input::placeholder{color:#555}
.agent-card{background:#161620;border:1px solid #1e1e2a;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.agent-card:hover,.agent-card.active{border-color:#4CAF50}
.agent-card h3{font-size:.95rem;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.agent-card .desc{font-size:.78rem;color:#777;margin-bottom:6px}
.agent-card .meta{display:flex;gap:10px;font-size:.75rem;color:#666}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.on{background:#4CAF50;box-shadow:0 0 8px #4CAF50;animation:pulse 2s infinite}.dot.off{background:#ff5252}
@keyframes pulse{0%{opacity:1}50%{opacity:.5}100%{opacity:1}}
@keyframes flash-green{0%{background:#4CAF50}100%{background:transparent}}
.nudge-active{animation:flash-green .8s ease-out}
.badge{background:#222;padding:2px 8px;border-radius:10px;font-size:.72rem;color:#aaa}
.badge.port{background:#1a2a1a;color:#4CAF50}
.content{overflow-y:auto;padding:20px}
.panel{background:#12121a;border:1px solid #1e1e2a;border-radius:8px;padding:20px;margin-bottom:16px}
.panel h2{font-size:1.1rem;margin-bottom:12px;color:#e8e8e8;display:flex;justify-content:space-between;align-items:center}
.panel h2 .actions{display:flex;gap:8px}
.welcome{text-align:center;padding:60px 20px;color:#555}
.welcome h2{font-size:1.4rem;color:#4CAF50;margin-bottom:10px}
.mem-item{background:#0e0e16;border:1px solid #1a1a24;border-radius:6px;padding:12px;margin-bottom:8px}
.mem-item .mem-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:.78rem;color:#666}
.mem-item .mem-content{font-size:.88rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.mem-item textarea{width:100%;background:#0a0a10;border:1px solid #333;color:#ddd;padding:8px;border-radius:4px;font-size:.85rem;resize:vertical;min-height:60px;font-family:inherit}
.add-mem{display:flex;gap:8px;margin-bottom:16px}
.add-mem textarea{flex:1;background:#0a0a10;border:1px solid #222;color:#ddd;padding:8px;border-radius:4px;font-size:.85rem;resize:vertical;min-height:50px;font-family:inherit}
.mem-search{margin-bottom:12px}
.mem-search input{width:100%;padding:8px 10px;background:#0a0a10;border:1px solid #222;border-radius:4px;color:#ddd;font-size:.85rem}
.status-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.status-row .label{font-size:.85rem;color:#888}
.empty{color:#555;font-size:.85rem;padding:20px;text-align:center}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center;z-index:100}
.modal-bg.show{display:flex}
.modal{background:#161620;border:1px solid #2a2a35;border-radius:8px;padding:24px;width:440px;max-width:90vw;max-height:80vh;overflow-y:auto}
.modal h2{margin-bottom:16px;font-size:1.1rem}
.modal label{display:block;font-size:.82rem;color:#999;margin:10px 0 4px}
.modal input,.modal textarea{width:100%;padding:8px;background:#0e0e16;border:1px solid #2a2a35;border-radius:4px;color:#ddd;font-size:.85rem;font-family:inherit}
.modal .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
iframe{width:100%;height:calc(100vh - 110px);border:none;border-radius:6px;background:#111}
.chat-msg{padding:8px 12px;border-radius:6px;max-width:85%;font-size:.85rem;line-height:1.4;word-break:break-word;margin-bottom:2px}
.chat-msg.user{background:#1e1e2a;align-self:flex-end;border-left:3px solid #4CAF50}
.chat-msg.agent{background:#161620;align-self:flex-start}
.chat-meta{font-size:.7rem;color:#555;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.copy-btn{background:none;border:none;color:#555;cursor:pointer;font-size:.75rem;padding:2px 4px;opacity:.4;transition:opacity .15s}
.copy-btn:hover{opacity:1;color:#4CAF50}
.agent-name{color:#2196F3;font-weight:700}
.war-room-badge{background:#4CAF50;color:#000;font-weight:700;animation:pulse 2s infinite}
#mic-btn{background:transparent;border:1px solid #333;border-radius:50%;width:40px;height:40px;cursor:pointer;transition:all .3s;font-size:1.1rem}
#mic-btn.active{background:#ff5252;border-color:#ff5252;box-shadow:0 0 10px #ff5252;animation:pulse-red 1.5s infinite}
@keyframes pulse-red{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:6px;font-size:.82rem;color:#fff;animation:slide-in .3s ease-out;max-width:360px;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.toast.success{background:#2e7d32;border-left:3px solid #4CAF50}
.toast.error{background:#c62828;border-left:3px solid #ff5252}
.toast.info{background:#1565c0;border-left:3px solid #2196F3}
@keyframes slide-in{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.badge.role{background:#7b1fa2;color:#e1bee7;font-weight:600}
.badge.role.general{background:#e65100;color:#ffe0b2}
.badge.role.summarizer{background:#1565c0;color:#bbdefb}
.chat-hints{font-size:.68rem;color:#888;padding:4px 8px;display:flex;gap:12px;flex-wrap:wrap}
.chat-hints span{background:#2a2a3a;color:#7c8aff;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:.68rem}
.badge.group{font-size:.65rem;border:1px solid;padding:1px 6px;background:transparent}
.group-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}
.ac-dropdown{position:absolute;bottom:100%;left:0;background:#1e1e2e;border:1px solid #444;border-radius:6px;max-height:160px;overflow-y:auto;z-index:100;min-width:180px;display:none}
.ac-dropdown.show{display:block}
.ac-item{padding:6px 12px;cursor:pointer;font-size:.82rem;color:#ccc}
.ac-item:hover,.ac-item.active{background:#333;color:#fff}
.chat-input-wrap{position:relative;flex:1}
#chat-input{width:100%;min-height:80px;resize:vertical;background:#0a0a10;border:1px solid #222;color:#ddd;padding:10px;border-radius:4px;font-size:.9rem;font-family:inherit;line-height:1.4}
</style>
</head>
<body>
<div class="status-lamps" id="status-lamps"></div>
<header>
  <h1 onclick="showWarRoom()" style="cursor:pointer">⚙ Gnom-Hub</h1>
  <div class="header-actions">
    <div class="header-stats">
      Agents: <span id="s-agents">0</span>
      Memory: <span id="s-memory">0</span>
    </div>
    <button class="btn-green" onclick="openAddAgent()">+ Agent registrieren</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <input type="text" id="agent-search" placeholder="Agenten suchen..." oninput="filterAgents(this.value)">
    <div id="agent-list"></div>
  </div>

  <div class="content" id="content">
    <div class="panel" id="war-room">
      <h2>War Room <span class="badge war-room-badge">Live</span></h2>
      <div id="chat-display" style="height:600px;overflow-y:auto;background:#0a0a10;padding:10px;border-radius:4px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px"></div>
      <div class="add-mem">
        <button id="mic-btn" onclick="toggleSTT()" title="Spracheingabe">🎤</button>
        <div class="chat-input-wrap">
          <div class="ac-dropdown" id="ac-dropdown"></div>
          <textarea id="chat-input" placeholder="@bs @recherche @idea ..." oninput="onChatInput(this)" onkeydown="onChatKey(event)"></textarea>
        </div>
        <button class="btn-green" onclick="sendChat()">Senden</button>
        <label style="font-size:.7rem;display:flex;align-items:center;gap:4px"><input type="checkbox" id="tts-enabled" checked> 🔊</label>
      </div>
      <div class="chat-hints">
        <span>@bs</span> Brainstorm
        <span>@Name</span> Gezielt
        <span>@general @Name</span> General
        <span>@summarizer @Name</span> Summarizer
        <span>@normal @Name</span> Reset
        <span>@recherche</span> Recherche
        <span>@job</span> Auftrag → General
        <span>@idea</span> Idee
        <span>@status</span> Status
        <span>@clear</span> Leeren
      </div>
    </div>
  </div>
</div>

<!-- Register Agent Modal -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <h2>Agent registrieren</h2>
    <label>Name</label>
    <input id="add-name" placeholder="z.B. Hermes">
    <label>Port</label>
    <input id="add-port" type="number" placeholder="z.B. 9119">
    <label>Beschreibung (optional)</label>
    <input id="add-desc" placeholder="z.B. Chat-Agent">
    <div class="btns">
      <button onclick="closeModal('modal-add')">Abbrechen</button>
      <button class="btn-green" onclick="doRegister()">Registrieren</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toasts"></div>

<script>
function toast(msg, type='info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(() => t.remove(), 300); }, 3000);
}
let API = '';
let agents = [];
let selectedId = null;

async function discoverPort() {
  // Wenn vom Hub geserved: Origin direkt nutzen
  if (location.protocol !== 'file:') { API = location.origin + '/api'; return; }
  for (const p of [3002, 3001, 3000]) {
    try {
      const r = await fetch(`http://127.0.0.1:${p}/api/stats`, {signal: AbortSignal.timeout(800)});
      if (r.ok) { API = `http://127.0.0.1:${p}/api`; return; }
    } catch(e) {}
  }
}

async function api(method, path, body) {
  try {
    const opts = {method, headers: {'Content-Type':'application/json'}};
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    if (!r.ok) throw new Error(r.status);
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  } catch(e) { console.error('API error:', path, e); return null; }
}

// ── Agent Color ──
function agentColor(name) {
  let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) % 360;
  return `hsl(${h}, 55%, 55%)`;
}
function groupColor(g) {
  if (!g) return null;
  let h = 0; for (let i = 0; i < g.length; i++) h = (h * 37 + g.charCodeAt(i)) % 360;
  return `hsl(${h}, 70%, 70%)`;
}

// ── Agents ──
async function loadAgents() {
  const res = await api('GET', '/agents');
  agents = Array.isArray(res) ? res : (res?.agents || []);
  updateStats();
  renderAgentList();
}

function renderAgentList(filter = '') {
  const el = document.getElementById('agent-list');
  const f = filter.toLowerCase();
  const filtered = f ? agents.filter(a => a.name.toLowerCase().includes(f)) : agents;

  if (!filtered.length) { el.innerHTML = '<div class="empty">Keine Agenten gefunden.</div>'; return; }

  el.innerHTML = filtered.map(a => {
    const on = a.status === 'online';
    const port = a.port || '';
    const role = a.role && a.role !== 'normal' ? a.role : '';
    const roleIcon = role === 'general' ? '👑' : role === 'summarizer' ? '📋' : '';
    const c = agentColor(a.name);
    const nc = a.group ? groupColor(a.group) : c;
    return `<div class="agent-card ${a.id === selectedId ? 'active' : ''}" id="card-${a.id}" onclick="selectAgent('${a.id}')" style="border-left:3px solid ${c}">
      <h3><span class="dot ${on ? 'on' : 'off'}"></span><span style="color:${nc}">${a.name}</span>${roleIcon ? ' '+roleIcon : ''}</h3>
      <div class="desc">${a.description || '–'}</div>
      <div class="meta"><span class="badge">${on ? 'online' : 'offline'}</span>${port ? `<span class="badge port">:${port}</span>` : ''}${role ? `<span class="badge role ${role}">${role}</span>` : ''}</div>
    </div>`;
  }).join('');
}

function filterAgents(q) { renderAgentList(q); }

async function selectAgent(id) {
  selectedId = id;
  renderAgentList(document.getElementById('agent-search').value);
  const agent = agents.find(a => a.id === id);
  if (!agent) return;

  const on = agent.status === 'online';
  const port = agent.port;
  const openUiBtn = port ? `<button onclick="openAgentUI('${agent.name}','${port}')">🖥 Open UI</button>` : '';
  const nudgeBtn = on ? `<button onclick="doNudge('${agent.id}')">📢 Nudge</button>` : '';
  const ls = agent.last_seen ? new Date(agent.last_seen).toLocaleString() : '–';

  document.getElementById('content').innerHTML = `
    <div class="panel">
      <h2>${agent.name} <div class="actions">
        ${openUiBtn} ${nudgeBtn}
        <button onclick="toggleStatus('${agent.id}','${agent.status}')">${on ? '⏹ Offline' : '▶ Online'}</button>
        <button class="btn-red" onclick="deleteAgent('${agent.id}')">Löschen</button>
      </div></h2>
      <div class="status-row">
        <span class="dot ${on?'on':'off'}"></span><span class="label">${on?'Online':'Offline'}</span>
        ${port ? `<span class="badge port">:${port}</span>` : ''}
        <span class="label">Last seen: ${ls}</span>
      </div>
    </div>

    <div class="panel">
      <h2>Memory <div class="actions">
        <button class="btn-red" onclick="clearMemory('${agent.id}')">Alle löschen</button>
      </div></h2>
      <div class="add-mem">
        <textarea id="new-mem" placeholder="Neuen Memory-Eintrag schreiben..."></textarea>
        <button class="btn-green" onclick="addMemory('${agent.id}')" style="align-self:flex-end">Speichern</button>
      </div>
      <div class="mem-search"><input placeholder="Memories durchsuchen..." oninput="searchAgentMem('${agent.id}',this.value)"></div>
      <div id="mem-list"><div class="empty">Lade...</div></div>
    </div>

    <div id="agent-ui-frame"></div>
  `;
  loadAgentMemory(agent.id);
}

async function loadAgentMemory(agentId) {
  const el = document.getElementById('mem-list');
  const mems = await api('GET', `/agents/${agentId}/memory`);
  renderMemories(el, mems);
}

async function searchAgentMem(agentId, q) {
  const el = document.getElementById('mem-list');
  if (!q) return loadAgentMemory(agentId);
  const all = await api('GET', `/agents/${agentId}/memory`);
  const filtered = (all||[]).filter(m => (m.content||'').toLowerCase().includes(q.toLowerCase()));
  renderMemories(el, filtered);
}

function renderMemories(el, mems) {
  if (!mems || !mems.length) { el.innerHTML = '<div class="empty">Keine Einträge.</div>'; return; }
  el.innerHTML = mems.map(m => {
    const d = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
    return `<div class="mem-item" id="mem-${m.id}">
      <div class="mem-head">
        <span>${d}</span>
        <div>
          <button onclick="editMem('${m.id}')">✏</button>
          <button class="btn-red" onclick="deleteMem('${m.id}')">✕</button>
        </div>
      </div>
      <div class="mem-content" id="mc-${m.id}">${m.content||''}</div>
    </div>`;
  }).join('');
}

async function addMemory(agentId) {
  const ta = document.getElementById('new-mem');
  const btn = event.target;
  const c = ta.value.trim();
  if (!c) return;
  const res = await api('POST', '/memory', {agent_id: agentId, content: c});
  if (res) { btn.classList.add('nudge-active'); setTimeout(() => btn.classList.remove('nudge-active'), 800); }
  ta.value = '';
  loadAgentMemory(agentId);
  updateStats();
}

function editMem(id) {
  const el = document.getElementById('mc-' + id);
  const old = el.innerText;
  el.innerHTML = `<textarea id="ed-${id}">${old}</textarea>
    <div style="margin-top:6px;display:flex;gap:6px;justify-content:flex-end">
      <button onclick="selectAgent(selectedId)">Abbrechen</button>
      <button class="btn-green" onclick="saveMem('${id}')">Speichern</button>
    </div>`;
}

async function saveMem(id) {
  const c = document.getElementById('ed-' + id).value;
  await api('PUT', `/memory/${id}`, null);
  // PUT expects query param
  await fetch(API + `/memory/${id}?content=${encodeURIComponent(c)}`, {method:'PUT'});
  selectAgent(selectedId);
}

async function deleteMem(id) {
  await api('DELETE', `/memory/${id}`);
  selectAgent(selectedId);
  updateStats();
}

async function clearMemory(agentId) {
  if (!confirm('Alle Memories dieses Agenten löschen?')) return;
  await api('DELETE', `/agents/${agentId}/memory`);
  selectAgent(selectedId);
  updateStats();
}

// ── Agent Actions ──
async function toggleStatus(id, current) {
  const next = current === 'online' ? 'offline' : 'online';
  await fetch(API + `/agents/${id}/status?status=${next}`, {method:'PUT'});
  await loadAgents();
  selectAgent(id);
}

async function deleteAgent(id) {
  if (!confirm('Agent und alle seine Memories löschen?')) return;
  await api('DELETE', `/agents/${id}`);
  selectedId = null;
  document.getElementById('content').innerHTML = '<div class="welcome"><h2>Agent gelöscht</h2></div>';
  await loadAgents();
}

function openAgentUI(name, port) {
  const frame = document.getElementById('agent-ui-frame');
  if (frame.innerHTML) { frame.innerHTML = ''; return; }
  frame.innerHTML = `<div class="panel"><h2>🖥 ${name} <div class="actions"><button onclick="document.getElementById('agent-ui-frame').innerHTML=''">Schließen</button>
    <button onclick="window.open('http://127.0.0.1:${port}','_blank')">↗ Neuer Tab</button></div></h2>
    <iframe src="http://127.0.0.1:${port}"></iframe></div>`;
}

// ── Register Agent ──
function openAddAgent() { document.getElementById('modal-add').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
async function doRegister() {
  const n = document.getElementById('add-name').value.trim();
  const p = parseInt(document.getElementById('add-port').value) || 0;
  const d = document.getElementById('add-desc').value.trim();
  if (!n || !p) { alert('Name und Port sind Pflicht.'); return; }
  await api('POST', '/agents/register', {name: n, port: p, description: d});
  document.getElementById('add-name').value = '';
  document.getElementById('add-port').value = '';
  document.getElementById('add-desc').value = '';
  closeModal('modal-add');
  await loadAgents();
}

// ── Nudge ──
async function doNudge(id) {
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('nudge-active'); setTimeout(() => card.classList.remove('nudge-active'), 800); }
  const res = await api('POST', `/agents/${id}/nudge`);
  console.log('Nudge:', res);
}

// ── Stats ──
async function updateStats() {
  const s = await api('GET', '/stats');
  if (s) {
    document.getElementById('s-agents').textContent = s.agents ?? agents.length;
    document.getElementById('s-memory').textContent = s.memory ?? 0;
  }
}

// ── Chat / War Room ──
function addChatMsg(text, type='system') {
  const el = document.getElementById('chat-display');
  if (!el) return;
  const d = document.createElement('div');
  d.className = `chat-msg ${type}`;
  d.innerHTML = `<div class="chat-meta"><span class="agent-name">${type==='user'?'Du':'System'}</span><span>${new Date().toLocaleTimeString()}</span></div><div class="mem-content">${text}</div>`;
  el.appendChild(d);

}
const BUILTIN_CMDS = ['bs','general','summarizer','normal','recherche','job','idea','status','clear'];
let acIdx = -1;
function onChatInput(ta) {
  const dd = document.getElementById('ac-dropdown');
  const val = ta.value, m = val.match(/@(\w*)$/);
  if (!m) { dd.classList.remove('show'); return; }
  const q = m[1].toLowerCase();
  const agentNames = agents.map(a => a.name);
  const all = [...BUILTIN_CMDS, ...agentNames].filter(n => n.toLowerCase().startsWith(q));
  if (!all.length || (all.length === 1 && all[0].toLowerCase() === q)) { dd.classList.remove('show'); return; }
  acIdx = -1;
  dd.innerHTML = all.map((n,i) => `<div class="ac-item" onmousedown="pickAc('${n}')">${BUILTIN_CMDS.includes(n) ? '@'+n : '@ '+n}</div>`).join('');
  dd.classList.add('show');
}
function pickAc(name) {
  const ta = document.getElementById('chat-input');
  ta.value = ta.value.replace(/@\w*$/, '@' + name + ' ');
  document.getElementById('ac-dropdown').classList.remove('show');
  ta.focus();
}
function onChatKey(e) {
  const dd = document.getElementById('ac-dropdown');
  const items = dd.querySelectorAll('.ac-item');
  if (dd.classList.contains('show') && items.length) {
    if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('active', i===acIdx)); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx-1, 0); items.forEach((el,i) => el.classList.toggle('active', i===acIdx)); return; }
    if (e.key === 'Tab' || (e.key === 'Enter' && acIdx >= 0)) { e.preventDefault(); pickAc(items[acIdx]?.textContent.replace(/^@\s?/,'') || ''); return; }
    if (e.key === 'Escape') { dd.classList.remove('show'); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}
async function sendChat() {
  const ta = document.getElementById('chat-input');
  const msg = ta.value.trim();
  if (!msg) return;
  ta.value = '';
  document.getElementById('ac-dropdown').classList.remove('show');
  const res = await api('POST', '/chat', {content: msg});
  if (res) {
    if (res.status === 'role_set') { toast(`👑 ${res.agent} → ${res.role}`, 'success'); }
    else if (res.status === 'idea_saved') { toast(`💡 Idee gespeichert`, 'success'); }
    else if (res.status === 'job_created') { toast(`📋 Job → ${res.general}: ${res.task.substring(0,60)}`, 'success'); }
    else if (res.msg) { toast(`⚠️ ${res.msg}`, 'error'); }
    else if (res.status === 'cleared') { toast(`🗑 Chat geleert`, 'success'); }
    else if (res.status === 'agents') { toast(`📊 ${res.agents.map(a => a.name+'('+a.role+')').join(', ')}`, 'info'); }
    else { const target = res.target ? `→ ${res.target}` : `→ ${(res.asked||[]).join(', ') || 'niemand'}`; toast(`${res.mode === 'brainstorm' ? '🧠' : res.mode === 'recherche' ? '🔍' : '💬'} ${target}`, 'success'); }
    refreshChat(); loadAgents();
  } else { toast('Hub nicht erreichbar', 'error'); }
}
async function refreshChat() {
  const el = document.getElementById('chat-display');
  if (!el) return;
  const msgs = await api('GET', '/chat?limit=20');
  if (!msgs || !msgs.length) { el.innerHTML = '<div class="empty">Noch keine Nachrichten.</div>'; return; }
  const sorted = msgs.sort((a,b) => (a.timestamp||'').localeCompare(b.timestamp||''));
  el.innerHTML = sorted.map(m => {
    const isUser = m.metadata?.sender === 'user';
    const name = isUser ? 'Du' : (m.metadata?.sender || 'System');
    const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
    const agentObj = !isUser && agents.find(a => a.name === name);
    const c = isUser ? '#4CAF50' : agentColor(name);
    const nc = (!isUser && agentObj?.group) ? groupColor(agentObj.group) : c;
    const mid = m.id || Math.random().toString(36).slice(2);
    return `<div class="chat-msg ${isUser ? 'user' : 'agent'}" style="border-left:3px solid ${c}">
      <div class="chat-meta"><span class="agent-name" style="color:${nc}">${name}</span><span><button class="copy-btn" onclick="copyMsg('${mid}')" title="Kopieren">📋</button>${time}</span></div>
      <div class="mem-content" id="msg-${mid}">${m.content}</div></div>`;
  }).join('');

  // TTS: nur die neuste ungesprochene Agent-Nachricht vorlesen
  if (sorted.length) {
    if (!window._spokenIds) window._spokenIds = new Set();
    const unspoken = sorted.filter(m => m.metadata?.sender !== 'user' && !window._spokenIds.has(m.id));
    if (unspoken.length) {
      const newest = unspoken[unspoken.length - 1];
      window._spokenIds.add(newest.id);
      speak(`${newest.metadata?.sender || 'System'} sagt: ${newest.content}`);
    }
    sorted.forEach(m => window._spokenIds.add(m.id));
  }
}
function copyMsg(id) {
  const el = document.getElementById('msg-' + id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.parentElement.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✅'; setTimeout(() => btn.textContent = '📋', 1200); }
  });
}
function showWarRoom() {
  selectedId = null;
  renderAgentList(document.getElementById('agent-search').value);
  const ttsOn = document.getElementById('tts-enabled')?.checked;
  document.getElementById('content').innerHTML = `
    <div class="panel" id="war-room">
      <h2>War Room <span class="badge war-room-badge">Live</span></h2>
      <div id="chat-display" style="height:600px;overflow-y:auto;background:#0a0a10;padding:10px;border-radius:4px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px"></div>
      <div class="add-mem">
        <button id="mic-btn" onclick="toggleSTT()" title="Spracheingabe">🎤</button>
        <textarea id="chat-input" placeholder="Befehl oder @bs..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
        <button class="btn-green" onclick="sendChat()">Senden</button>
        <label style="font-size:.7rem;display:flex;align-items:center;gap:4px"><input type="checkbox" id="tts-enabled" ${ttsOn?'checked':''}> 🔊</label>
      </div>
    </div>`;
  refreshChat();
}
// ── TTS (Queue — eins nach dem anderen) ──
const _ttsQ = []; let _ttsBusy = false;
async function speak(text, agentId='') {
  if (!document.getElementById('tts-enabled')?.checked) return;
  _ttsQ.push({text, agentId});
  if (_ttsBusy) return;
  _ttsBusy = true;
  while (_ttsQ.length) {
    const {text: t, agentId: a} = _ttsQ.shift();
    speechSynthesis.cancel();
    try {
      const r = await fetch(`${API}/audio/tts`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t, agent_id:a})});
      if (r.ok && r.headers.get('content-type')?.includes('audio')) {
        const audio = new Audio(URL.createObjectURL(await r.blob()));
        await new Promise(ok => { audio.onended = ok; audio.onerror = ok; audio.play(); }); continue;
      }
    } catch {}
    const u = new SpeechSynthesisUtterance(t); u.lang = 'de-DE'; u.rate = 1.0;
    await new Promise(ok => { u.onend = ok; u.onerror = ok; speechSynthesis.speak(u); });
  }
  _ttsBusy = false;
}
// ── STT ──
let recognition;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true; recognition.lang = 'de-DE';
  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript + ' ';
    document.getElementById('chat-input').value = text.trim();
  };
  recognition.onerror = (e) => { document.getElementById('mic-btn')?.classList.remove('active'); toast(`STT-Fehler: ${e.error}`, 'error'); };
  recognition.onend = () => { document.getElementById('mic-btn')?.classList.remove('active'); };
}
function toggleSTT() {
  const btn = document.getElementById('mic-btn');
  if (!recognition) { toast('Browser unterstützt keine Spracheingabe', 'error'); return; }
  if (btn.classList.contains('active')) { recognition.stop(); btn.classList.remove('active'); }
  else { recognition.start(); btn.classList.add('active'); }
}

let _lampCount = 0;
const AG_AGENTS = [
  {name:'General',color:'#ff6b35'},{name:'Summarizer',color:'#36d7b7'},{name:'Skills',color:'#9b59b6'},
  {name:'Cronjob',color:'#f39c12'},{name:'Soul',color:'#e74c3c'},{name:'APIKeys',color:'#3498db'},
  {name:'Watchdog',color:'#1abc9c'},{name:'Tiny',color:'#4CAF50'}
];
function updateLamps() {
  const el = document.getElementById('status-lamps');
  if (!_lampCount) {
    el.innerHTML = AG_AGENTS.map((a, i) => {
      const d = (Math.random() * 2).toFixed(2);
      return `<div class="lamp" data-ag="${a.name}" title="${a.name}AG" style="color:${a.color};background:${a.color};animation-delay:${d}s"></div>`;
    }).join('');
    _lampCount = AG_AGENTS.length;
  }
}
(async () => {
  await discoverPort();
  if (!API) { document.getElementById('content').innerHTML = '<div class="welcome"><h2>Hub nicht erreichbar</h2><p>Backend auf Port 3002 starten.</p></div>'; return; }
  await loadAgents();
  updateLamps();
  refreshChat();
  setInterval(async () => {
    const res = await api('GET', '/agents');
    agents = Array.isArray(res) ? res : (res?.agents || []);
    renderAgentList(document.getElementById('agent-search').value);
    updateStats();
    updateLamps();
  }, 10000);
  setInterval(refreshChat, 3000);
})();
