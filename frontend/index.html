    async function speak(text, agentId = '') {
      if (!document.getElementById('tts-enabled')?.checked) return;
      _ttsQ.push({ text, agentId });
      if (_ttsBusy) return;
      _ttsBusy = true;
      const stopBtn = document.getElementById('stop-tts-btn');
      if (stopBtn) stopBtn.style.display = 'block';

      while (_ttsQ.length) {
        const { text: t, agentId: a } = _ttsQ.shift();
        speechSynthesis.cancel();
        try {
          const r = await fetch(`${API}/audio/tts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: t, agent_id: a }) });
          if (r.ok && r.headers.get('content-type')?.includes('audio')) {
            const audio = new Audio(URL.createObjectURL(await r.blob()));
            await new Promise(ok => { audio.onended = ok; audio.onerror = ok; audio.play(); }); continue;
          }
        } catch { }
        const u = new SpeechSynthesisUtterance(t); u.lang = 'de-DE'; u.rate = 1.0;
        await new Promise(ok => { u.onend = ok; u.onerror = ok; speechSynthesis.speak(u); });
      }
      _ttsBusy = false;
      if (stopBtn) stopBtn.style.display = 'none';
    }

    // ── STT ──
    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = true; recognition.lang = 'de-DE';
      recognition.onresult = (e) => {
        let text = '';
        for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript + ' ';
        const inp = document.getElementById('chat-input');
        if (inp) inp.value = text.trim();
      };
      recognition.onerror = () => { const b = document.getElementById('mic-btn'); if (b) { b.classList.remove('active'); b.innerText = 'Rec'; } };
      recognition.onend = () => { const b = document.getElementById('mic-btn'); if (b) { b.classList.remove('active'); b.innerText = 'Rec'; } };
    }
    function toggleSTT() {
      const btn = document.getElementById('mic-btn');
      if (!recognition) { toast('Browser does not support voice input', 'error'); return; }
      if (btn.classList.contains('active')) {
        recognition.stop();
        btn.classList.remove('active');
        btn.innerText = 'Rec';
      } else {
        recognition.start();
        btn.classList.add('active');
        btn.innerText = 'Stop';
      }
    }

    // ── Status Lamps ──
    let _lastInternals = '';
    function updateLamps(hubAgents) {
      const el = document.getElementById('status-lamps');
      if (!hubAgents) return;

      // 4 System-Agenten als Lämpchen
      const sysNames = ['soulag', 'generalag', 'securityag', 'watchdogag'];
      const hiddenSys = [
        { name: 'SoulAG', status: 'online' },
        { name: 'GeneralAG', status: 'online' },
        { name: 'SecurityAG', status: 'online' },
        { name: 'WatchdogAG', status: 'online' }
      ];

      let displayAgents = [...hiddenSys.filter(h => !hubAgents.some(a => a.name === h.name)), ...hubAgents];
      displayAgents = displayAgents.filter(a => sysNames.includes((a.name || '').toLowerCase()));

      const names = displayAgents.map(a => a.name).join(',');

      if (_lastInternals !== names) {
        el.innerHTML = displayAgents.map((a, i) => {
          const dur = (2.5 + Math.random() * 2.0).toFixed(2);   // 2.5s – 4.5s
          const dly = (-(Math.random() * 6.0)).toFixed(2);       // -0 … -6s offset
          const col = agentColor(a.name);
          return `<div class="lamp" data-ag="${a.name}" title="${a.name}" style="color:${col};background:${col};--dur:${dur}s;--delay:${dly}s"></div>`;
        }).join('');
        _lastInternals = names;
      }

      el.querySelectorAll('.lamp').forEach(l => {
        const key = l.dataset.ag;
        const agent = displayAgents.find(a => a.name === key);

        l.className = st === 'busy' ? 'lamp busy' : st === 'online' ? 'lamp on' : 'lamp';

    // ── Interval cleanup registry ──

    window.addEventListener('beforeunload', () => {
      _intervalIds.forEach(id => clearInterval(id));
      if (window.showboxTimerInterval) clearInterval(window.showboxTimerInterval);

      if (!window.showboxTimeEnabled) return;

      const timeStr = now.toLocaleTimeString();
      const clock1 = document.getElementById('showbox-clock');
      const clock2 = document.getElementById('sb-panel-clock');
      if (clock1) clock1.innerText = timeStr;
      if (clock2) clock2.innerText = timeStr;
    }
    _trackInterval(updateShowboxClocks, 1000);

    window.showboxTimerInterval = null;
    window.showboxTimerRemaining = 0;
    function stopShowboxTimer() {
      if (window.showboxTimerInterval) {
        clearInterval(window.showboxTimerInterval);
        window.showboxTimerInterval = null;
      }
      const t1 = document.getElementById('showbox-timer');
      const t2 = document.getElementById('sb-panel-timer');
      if (t1) t1.style.display = 'none';
      if (t2) t2.style.display = 'none';
      document.getElementById('layer-showbox')?.classList.remove('timer-timeout-pulse');
      document.getElementById('sb-screen')?.classList.remove('timer-timeout-pulse');
    }
    function formatShowboxTimer(s) {
      const min = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }
    function tickShowboxTimer() {
      if (window.showboxTimerRemaining > 0) {
        window.showboxTimerRemaining--;
        const timeStr = formatShowboxTimer(window.showboxTimerRemaining);
        const t1 = document.getElementById('showbox-timer');
        const t2 = document.getElementById('sb-panel-timer');
        if (t1) { t1.innerText = timeStr; t1.style.display = 'block'; }
        if (t2) { t2.innerText = timeStr; t2.style.display = 'block'; }
      }
      if (window.showboxTimerRemaining === 0) {
        clearInterval(window.showboxTimerInterval);
        window.showboxTimerInterval = null;
        document.getElementById('layer-showbox')?.classList.add('timer-timeout-pulse');
        document.getElementById('sb-screen')?.classList.add('timer-timeout-pulse');
      }
    }
    function startShowboxTimer(secs) {
      stopShowboxTimer();
      window.showboxTimerRemaining = secs;
      const timeStr = formatShowboxTimer(secs);
      const t1 = document.getElementById('showbox-timer');
      const t2 = document.getElementById('sb-panel-timer');
      if (t1) { t1.innerText = timeStr; t1.style.display = 'block'; }
      if (t2) { t2.innerText = timeStr; t2.style.display = 'block'; }
      window.showboxTimerInterval = setInterval(tickShowboxTimer, 1000);
    }

      el.style.left = 'auto';
      el.style.display = 'block';
      window.coffeeFleeCount = 0;
      speak("Take it easy. Drink coffee.");
      clearTimeout(window.coffeeTimer);
      window.coffeeTimer = setTimeout(() => { el.style.display = 'none'; }, 20000);
    };

    window.fleeCoffee = () => {
      window.coffeeFleeCount++;
      const el = document.getElementById('coffee-overlay');
      if (window.coffeeFleeCount >= 3) {
        el.style.display = 'none';
        clearTimeout(window.coffeeTimer);
        return;
      }
      el.style.transition = 'all 0.15s cubic-bezier(0.25, 1, 0.5, 1)';
      const maxX = Math.max(10, window.innerWidth - el.offsetWidth - 20);
      const maxY = Math.max(10, window.innerHeight - el.offsetHeight - 20);
      const rx = Math.max(10, Math.floor(Math.random() * maxX));
      const ry = Math.max(10, Math.floor(Math.random() * maxY));
      el.style.bottom = 'auto';
      el.style.right = 'auto';
      el.style.left = rx + 'px';
      el.style.top = ry + 'px';
    };
    window.showUfoAttack = () => {
      const o = document.getElementById('ufo-overlay');
      o.style.display = 'flex';
      setTimeout(() => { o.style.display = 'none'; }, 600000);
    };
    window.showGhost = () => {
      const o = document.getElementById('ghost-overlay');
      const newGhost = o.cloneNode(true);
      o.parentNode.replaceChild(newGhost, o);
      newGhost.style.display = 'flex';
      setTimeout(() => { newGhost.style.display = 'none'; }, 120000);
    };

    // ── Init ──
    (async () => {
      try {
        checkTimers();
        await discoverPort();
        if (!API) {
          document.getElementById('content').innerHTML = '<div class="empty" style="padding:80px 20px"><h2 style="color:var(--error);margin-bottom:10px">Hub unreachable (No API)</h2><p>Server nicht gefunden. Öffne http://127.0.0.1:3002/ im Browser.</p></div>';
          return;
        }
        await loadAgents();
        updateLamps(agents);
        showWarRoom();
      _trackInterval(async () => {
        const res = await api('GET', '/agents');
        agents = Array.isArray(res) ? res : (res?.agents || []);
        const searchInput = document.getElementById('agent-search');
        renderAgentList(searchInput ? searchInput.value : '');
        updateStats();
        updateLamps(agents);
      }, 3000);
      _trackInterval(refreshChat, 5000);
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty" style="padding:80px 20px"><h2 style="color:red">UI Error</h2><p>${err.message}</p></div>`;
      }

      // Layer Animation
      let currentLayer = 0;
      const totalLayers = 10;
      window.showboxActive = false;
      let showboxInterval = null;
      let showboxTimeout = null;
      window.activeShowboxIndex = -1;
      window.showboxSpeed = window.showboxSpeed || 30000;

    function resizeShowboxText(sbText, sbLayer) {
      let size = 80;
      sbText.style.fontSize = size + 'px';
      while((sbText.scrollHeight > sbLayer.clientHeight - 6 || sbText.scrollWidth > sbLayer.clientWidth - 6) && size > 8) {
        size--;
        sbText.style.fontSize = size + 'px';
      }
    }
    function updateShowboxText(sbText, sbLayer, showboxSteps, step) {
      sbText.innerHTML = showboxSteps[step];
      resizeShowboxText(sbText, sbLayer);
      sbText.style.opacity = 1;
    }
    window.triggerShowbox = (showboxIndex) => {
        if (document.getElementById('showbox-panel')) { selectPanelShowbox(showboxIndex); return; }
        if (window.showboxActive && window.activeShowboxIndex === showboxIndex) { window.closeShowbox(); return; }
        if(showboxInterval) clearInterval(showboxInterval);
        if(showboxTimeout) clearTimeout(showboxTimeout);
        
        window.activeShowboxIndex = showboxIndex;
        if (!window.showboxes) window.showboxes = [["<span style='color:red;'>Keine themes.js gefunden!</span>"]];
        const showboxSteps = window.showboxes[showboxIndex] || window.showboxes[0];
        window.showboxActive = true;
        let step = 0;
        
        document.querySelectorAll('[id^="layer-"]').forEach(l => l.classList.remove('active'));
        const sbLayer = document.getElementById('layer-showbox');
        const sbText = document.getElementById('showbox-text');

        const clock = document.getElementById('showbox-clock');
        if (clock) clock.style.display = window.showboxTimeEnabled ? 'block' : 'none';
        updateShowboxClocks();

        const updateText = () => updateShowboxText(sbText, sbLayer, showboxSteps, step);
        sbText.style.opacity = 0;
        showboxTimeout = setTimeout(updateText, 100);
        sbLayer.classList.add('active');

        showboxInterval = setInterval(() => {
          step++;
          if (step >= showboxSteps.length) { window.closeShowbox(); return; }
          sbText.style.opacity = 0;
          showboxTimeout = setTimeout(updateText, 300);
        }, window.showboxSpeed);
      };

      window.closeShowbox = () => {
        if(showboxInterval) {
          clearInterval(showboxInterval);
          showboxInterval = null;
        }
        if(showboxTimeout) {
          clearTimeout(showboxTimeout);
          showboxTimeout = null;
        }
        window.activeShowboxIndex = -1;
        window.showboxActive = false;
        const sbLayer = document.getElementById('layer-showbox');
        if(sbLayer) sbLayer.classList.remove('active');
        const curr = document.getElementById(`layer-${currentLayer}`);
        if(curr) curr.classList.add('active');
      };

      _trackInterval(() => {
        if (window.showboxActive) return;
        const oldL = document.getElementById(`layer-${currentLayer}`);
        if(oldL) oldL.classList.remove('active');
        currentLayer = (currentLayer + 1) % totalLayers;
        const newL = document.getElementById(`layer-${currentLayer}`);
        if(newL) newL.classList.add('active');
      }, 5000);
    })();

    // ── Showbox Center ──
    let panelShowboxPlaying = false;
    let panelShowboxMesseModus = false;
    let panelShowboxInterval = null;
    let activePanelShowboxIndex = 0;
    let activePanelSlideIndex = 0;

    function buildShowboxHeaderHTML() {

          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button class="btn-primary" onclick="togglePanelShowboxPlay()" id="sb-play-btn" style="min-width:80px;">▶ Play</button>
            <button class="btn-primary" onclick="prevPanelSlide()">◀ Back</button>
            <button class="btn-primary btn-next-pulse" onclick="nextPanelSlide()">Next ▶</button>

              <span style="font-size:0.8rem; color:var(--text-muted);">Speed:</span>

    async function showShowboxPanel() {
      selectedId = null;
      if (panelShowboxInterval) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = null;
        panelShowboxPlaying = false;
      }
      document.getElementById('content').innerHTML = buildShowboxPanelHTML();
      const speedSec = Math.round(window.showboxSpeed / 1000);
      document.getElementById('sb-speed-slider').value = speedSec;
      document.getElementById('sb-speed-val').innerText = speedSec + 's';
      document.getElementById('sb-messe-modus').checked = panelShowboxMesseModus;
      selectPanelShowbox(activePanelShowboxIndex);
    }

    function selectPanelShowbox(idx) {
      if (panelShowboxInterval) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = null;
        panelShowboxPlaying = false;
        const btn = document.getElementById('sb-play-btn');
        if (btn) {
          btn.innerText = '▶ Play';
          btn.style.background = 'var(--primary)';
        }
      }
      activePanelShowboxIndex = idx;
      activePanelSlideIndex = 0;
      for (let i = 0; i < 7; i++) {
        const btn = document.getElementById(`sb-group-${i}`);
        if (btn) {
          if (i === idx) {
            btn.style.background = 'rgba(0, 150, 255, 0.2)';
            btn.style.borderColor = 'var(--cyan)';
            btn.style.color = 'var(--cyan)';
          } else {
            btn.style.background = 'rgba(255,255,255,0.05)';
            btn.style.borderColor = 'rgba(255,255,255,0.1)';
            btn.style.color = 'white';
          }
        }
      }
      const currentSlides = window.showboxes[idx] || [];
      document.getElementById('sb-editor').value = JSON.stringify(currentSlides, null, 2);
      renderPanelSlide();
      renderPanelSlidesList();
    }

    function renderPanelSlide() {
      const screenContent = document.getElementById('sb-screen-content');
      const indicator = document.getElementById('sb-slide-indicator');
      if (!screenContent) return;
      const currentSlides = window.showboxes[activePanelShowboxIndex] || [];
      if (currentSlides.length === 0) {
        screenContent.innerHTML = "<span style='color:red;'>Keine Slides vorhanden.</span>";
        indicator.innerText = "0 / 0";
        return;
      }
      if (activePanelSlideIndex >= currentSlides.length) activePanelSlideIndex = 0;
      if (activePanelSlideIndex < 0) activePanelSlideIndex = currentSlides.length - 1;
      screenContent.style.opacity = 0;
      screenContent.style.transform = 'scale(0.95)';
      setTimeout(() => {
        screenContent.innerHTML = currentSlides[activePanelSlideIndex];
        const screen = document.getElementById('sb-screen');
        let size = 48;
        screenContent.style.fontSize = size + 'px';
        while ((screenContent.scrollHeight > screen.clientHeight - 80 || screenContent.scrollWidth > screen.clientWidth - 80) && size > 12) {
          size -= 2;
          screenContent.style.fontSize = size + 'px';
        }
        screenContent.style.opacity = 1;
        screenContent.style.transform = 'scale(1)';
        indicator.innerText = `Folie ${activePanelSlideIndex + 1} / ${currentSlides.length}`;
      }, 200);
      const items = document.querySelectorAll('.sb-slide-item');
      items.forEach((item, i) => {
        if (i === activePanelSlideIndex) {
          item.style.background = 'rgba(0, 150, 255, 0.15)';
          item.style.borderColor = 'var(--cyan)';
        } else {
          item.style.background = 'rgba(255,255,255,0.02)';
          item.style.borderColor = 'rgba(255,255,255,0.05)';
        }
      });
    }

    function renderPanelSlidesList() {
      const list = document.getElementById('sb-slides-list');
      if (!list) return;
      const currentSlides = window.showboxes[activePanelShowboxIndex] || [];
      list.innerHTML = currentSlides.map((slide, i) => `
        <div class="sb-slide-item" onclick="jumpToPanelSlide(${i})" style="padding:10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:6px; font-size:0.8rem; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:all 0.2s;">
          <strong>Folie ${i+1}:</strong> ${esc(slide.replace(/<[^>]*>/g, ''))}
        </div>
      `).join('');
      const items = list.querySelectorAll('.sb-slide-item');
      if (items[activePanelSlideIndex]) {
        items[activePanelSlideIndex].style.background = 'rgba(0, 150, 255, 0.15)';
        items[activePanelSlideIndex].style.borderColor = 'var(--cyan)';
      }
    }

    function jumpToPanelSlide(idx) {
      activePanelSlideIndex = idx;
      renderPanelSlide();
    }

    function prevPanelSlide() {
      activePanelSlideIndex--;
      renderPanelSlide();
    }

    function nextPanelSlide() {
      const currentSlides = window.showboxes[activePanelShowboxIndex] || [];
      activePanelSlideIndex++;
      if (activePanelSlideIndex >= currentSlides.length) {
        if (panelShowboxMesseModus) {
          activePanelShowboxIndex = (activePanelShowboxIndex + 1) % 7;
          selectPanelShowbox(activePanelShowboxIndex);
          return;
        } else {
          activePanelSlideIndex = 0;
        }
      }
      renderPanelSlide();
    }

    function togglePanelShowboxPlay() {
      const btn = document.getElementById('sb-play-btn');
      if (panelShowboxPlaying) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = null;
        panelShowboxPlaying = false;
        btn.innerText = '▶ Play';
        btn.style.background = 'var(--primary)';
      } else {
        panelShowboxPlaying = true;
        btn.innerText = '⏸ Pause';
        btn.style.background = '#ffaa00';
        panelShowboxInterval = setInterval(() => {
          nextPanelSlide();
        }, window.showboxSpeed);
      }
    }

    function toggleMesseModus(val) {
      panelShowboxMesseModus = val;
    }

    function updatePanelShowboxSpeed(val) {
      window.showboxSpeed = val * 1000;
      let display = val + 's';
      if (val >= 60) {
        const m = Math.floor(val / 60);
        const s = val % 60;
        display = s > 0 ? `${m}m ${s}s` : `${m}min`;
      }
      document.getElementById('sb-speed-val').innerText = display;
      if (panelShowboxPlaying) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = setInterval(() => {
          nextPanelSlide();
        }, window.showboxSpeed);
      }
    }

    async function savePanelShowboxContent() {
      try {
        const text = document.getElementById('sb-editor').value;
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error("JSON muss ein Array sein.");
        window.showboxes[activePanelShowboxIndex] = parsed;
        renderPanelSlide();
        renderPanelSlidesList();
        const themesRes = await api('GET', '/showbox/themes');
        if (themesRes) {
          const cleanJs = `window.showboxes = ${JSON.stringify(window.showboxes, null, 2)};`;
          await api('POST', '/showbox/themes', { content: cleanJs });
          alert("Erfolgreich auf Server und Client gespeichert!");
        } else {
          alert("Clientseitig aktualisiert, Server konnte nicht erreicht werden.");
        }
      } catch (err) {
        alert("Fehler beim Speichern: " + err.message);
      }
    }

      if (confirm("Möchtest du diese Showbox wirklich auf die Werkseinstellungen zurücksetzen?")) {

                <div style="display:flex; gap:10px; margin-bottom:10px;">
                  <button class="btn-primary" id="lang-btn-de" onclick="setSystemLanguage('de')" style="flex:1; padding:5px; font-size:0.75rem;">Deutsch</button>
                  <button class="btn-primary" id="lang-btn-en" onclick="setSystemLanguage('en')" style="flex:1; padding:5px; font-size:0.75rem;">English</button>
                </div>
              </div>
              <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:10px;">
                <h3 style="margin-bottom:5px;">FTP Auto-Deploy</h3>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.85rem; accent-color:var(--primary);">
                  <input type="checkbox" id="auto-deploy-checkbox" onchange="toggleFtpAutoDeploy(this.checked)" style="width:16px; height:16px;">
                  <span>Webseiten automatisch hochladen</span>
                </label>
              </div>
              <div id="system-info-panel" style="font-size:0.85rem; padding:12px; border-radius:6px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05);">
                Loading System Info...
              </div>
            </div>
            <div style="flex:2; min-width: 400px; background:var(--bg-card); padding:20px; border-radius:var(--radius); border:1px solid rgba(255,255,255,0.1);">
              <h3>Agent Assignment</h3>
              <div id="llm-agents-list" style="margin-bottom:20px; max-height:400px; overflow-y:auto; padding-right:10px;">Loading Agents...</div>
              <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="saveAgentLLMs()">Save Agent Settings</button>
                <button class="btn-primary" onclick="api('POST', '/restart')" style="background:#cc3333;">Restart Server</button>
              </div>
            </div>
          </div>
        </div>
      `;
      loadLLMConfig();
    }

    let globalKeys = [];
    async function setSystemLanguage(lang) {
      try {
        await api('POST', '/admin/language', { language: lang });
        document.getElementById('lang-btn-de').style.borderColor = lang === 'de' ? 'var(--primary)' : 'rgba(255,255,255,0.2)';
        document.getElementById('lang-btn-de').style.background = lang === 'de' ? 'rgba(0,150,255,0.2)' : 'transparent';
        document.getElementById('lang-btn-en').style.borderColor = lang === 'en' ? 'var(--primary)' : 'rgba(255,255,255,0.2)';
        document.getElementById('lang-btn-en').style.background = lang === 'en' ? 'rgba(0,150,255,0.2)' : 'transparent';
      } catch (e) {
        console.error("Failed to set language", e);
      }
    }

    async function loadLanguageState() {
      try {
        const langRes = await api('GET', '/admin/language');
        const lang = langRes?.language || 'en';
        document.getElementById('lang-btn-de').style.borderColor = lang === 'de' ? 'var(--primary)' : 'rgba(255,255,255,0.2)';
        document.getElementById('lang-btn-de').style.background = lang === 'de' ? 'rgba(0,150,255,0.2)' : 'transparent';
        document.getElementById('lang-btn-en').style.borderColor = lang === 'en' ? 'var(--primary)' : 'rgba(255,255,255,0.2)';
        document.getElementById('lang-btn-en').style.background = lang === 'en' ? 'rgba(0,150,255,0.2)' : 'transparent';
      } catch (e) {
        console.error("Language loading error", e);
      }
    }
    async function toggleFtpAutoDeploy(val) {
      try {
        await api('POST', '/admin/autodeploy', { auto_deploy: val });
      } catch (e) {
        console.error("Failed to toggle FTP auto-deploy", e);
      }
    }
    async function loadFtpAutoDeployState() {
      try {
        const res = await api('GET', '/admin/autodeploy');
        const active = res?.auto_deploy || false;
        const cb = document.getElementById('auto-deploy-checkbox');
        if (cb) cb.checked = active;
      } catch (e) {
        console.error("FTP auto-deploy load error", e);
      }
    }
    async function loadSystemInfoState() {
      try {
        const sysInfo = await api('GET', '/system/info');
        if (sysInfo) {
          let warnHtml = '';
          if (sysInfo.is_intel) {
            warnHtml = `
              <div style="margin-top:10px; padding:10px; background:rgba(255,170,0,0.15); border:1px solid #ffaa00; border-radius:6px; color:#ffaa00; font-size:0.8rem; line-height:1.3;">
                ⚠️ <strong>Intel CPU detected (${sysInfo.cpu})</strong><br>
                Local models > 4B parameters run slowly here. We recommend using <strong>Gemma 2:2b</strong> or <strong>Llama 3.2</strong>.
              </div>
            `;
          }
          document.getElementById('system-info-panel').innerHTML = `
            <strong>💻 System Info:</strong><br>
            • CPU: ${sysInfo.cpu}<br>
            • RAM: ${sysInfo.ram}<br>
            ${warnHtml}
          `;
        }
      } catch (e) {
        console.error("System info error", e);
        document.getElementById('system-info-panel').innerHTML = "System Info not available.";
      }
    }
    function loadLLMAgentsListState(agentsRes, llmAgentsRes, models, providers) {
      let html = '';
      if (agentsRes && Array.isArray(agentsRes)) {
        agentsRes.forEach(a => {
           let safeAgentsRes = llmAgentsRes || {};
           let conf = safeAgentsRes[(a.name || '').toLowerCase()] || {};
           let pSel = conf.provider || 'deepseek';
           let mSel = conf.model || 'deepseek-chat';
           
           html += `<div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; padding:8px; background:rgba(255,255,255,0.05); border-radius:8px; font-size:0.9rem;">
             <div style="width:120px; font-weight:bold; overflow:hidden; text-overflow:ellipsis;">${a.name}</div>
             <select id="prov-${a.name}" onchange="updateModels('${a.name}')" style="background:var(--bg); color:white; border:1px solid rgba(255,255,255,0.2); padding:4px; border-radius:4px; width:120px;">
               ${providers.map(p => `<option value="${p}" ${p === pSel ? 'selected':''}>${p}</option>`).join('')}
             </select>
             <select id="mod-${a.name}" style="background:var(--bg); color:white; border:1px solid rgba(255,255,255,0.2); padding:4px; border-radius:4px; flex:1; min-width:150px;">
               ${(models[pSel]||[]).map(m => `<option value="${m}" ${m === mSel ? 'selected':''}>${m}</option>`).join('')}
             </select>
             <button class="btn-primary" onclick="testAgentLLM('${a.name}')" style="padding:4px 10px; font-size:0.8rem;">Test</button>
             <div id="lamp-${a.name}" style="width:12px; height:12px; border-radius:50%; background:gray; box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>
           </div>`;
        });
      }
      document.getElementById('llm-agents-list').innerHTML = html;
    }
    async function loadLLMConfig() {
      await loadLanguageState();
      await loadSystemInfoState();
      await loadFtpAutoDeployState();

      const keysRes = await api('GET', '/llm/keys');
      if (keysRes) {
        globalKeys = Object.keys(keysRes).length > 0 ? Object.values(keysRes) : [];
        if (globalKeys.length > 0 && globalKeys[0].key) {
           document.getElementById('llm-keys-input').value = globalKeys.map(k => k.key).join('\n');
           renderKeyStatus(globalKeys);
        }
      }

      const agentsRes = await api('GET', '/agents');
      const llmAgentsRes = await api('GET', '/llm/agents');
      
      const providers = ['deepseek', 'openrouter', 'lokal'];
      let models = {
        'deepseek': ['deepseek-chat', 'deepseek-reasoner'],
        'openrouter': ['deepseek/deepseek-v4-flash:free', 'qwen/qwen3-coder:free', 'meta-llama/llama-3.3-70b-instruct:free'],
        'lokal': ['llama3', 'mistral', 'qwen2', 'phi3', 'llama3.2', 'gemma2']
      };
      try {
        const availableModels = await api('GET', '/llm/available_models');
        if (availableModels && availableModels.deepseek) {
          models = availableModels;
        }
      } catch (e) {
        console.error("Failed to load available models", e);
      }

      loadLLMAgentsListState(agentsRes, llmAgentsRes, models, providers);
      window.llmModelsMap = models;
    }

    window.updateModels = function(aName) {
      const p = document.getElementById(`prov-${aName}`).value;
      const modSelect = document.getElementById(`mod-${aName}`);
      const mods = window.llmModelsMap[p] || [];
      modSelect.innerHTML = mods.map(m => `<option value="${m}">${m}</option>`).join('');
    };

    async function saveAndTestKeys() {
      const input = document.getElementById('llm-keys-input').value;
      const rawKeys = input.split('\n').map(k => k.trim()).filter(k => k);
      
      document.getElementById('llm-keys-status').innerHTML = 'Testing Keys...';
      
      let testedKeys = [];
      let nextId = Date.now();
      
      for(let k of rawKeys) {
        let prov = 'deepseek';
        if (k.startsWith('sk-or-')) prov = 'openrouter';
        
        let res = await api('POST', '/llm/test', { key: k, provider: prov });
        testedKeys.push({
          id: 'k_' + (nextId++),
          key: k,
          provider: prov,
          valid: res && res.valid,
          info: res ? res.info : 'Error'
        });
      }
      
      let toSave = {};
      testedKeys.forEach(k => toSave[k.id] = k);
      await api('POST', '/llm/keys', toSave);
      
      globalKeys = testedKeys;
      renderKeyStatus(testedKeys);
      loadLLMConfig();
    }

    function renderKeyStatus(keys) {
      let h = '';
      keys.forEach((k, idx) => {
        let c = k.valid ? 'var(--green)' : '#ff3333';
        h += `<div style="color:${c}; margin-bottom:5px;">${k.valid ? '✅' : '❌'} Key ${idx+1} (${k.provider}) ${k.info !== 'OK' ? '('+k.info.substring(0,20)+')' : ''}</div>`;
      });
      document.getElementById('llm-keys-status').innerHTML = h;
    }

    async function saveAgentLLMs() {
      const agentsRes = await api('GET', '/agents');
      let config = {};
      if (agentsRes && Array.isArray(agentsRes)) {
        agentsRes.forEach(a => {
          let p = document.getElementById(`prov-${a.name}`);
          let m = document.getElementById(`mod-${a.name}`);
          if(p && m) {
            config[a.name.toLowerCase()] = {
              provider: p.value,
              model: m.value
            };
          }
        });
      }
      await api('POST', '/llm/agents', config);
      alert('Agent settings saved successfully!');
    }

    async function testAgentLLM(aName) {
      const p = document.getElementById(`prov-${aName}`).value;
      const m = document.getElementById(`mod-${aName}`).value;
      const lamp = document.getElementById(`lamp-${aName}`);
      
      lamp.style.background = 'yellow';
      lamp.style.boxShadow = '0 0 8px yellow';
      
      let res = await api('POST', '/llm/test_agent', { agent: aName, provider: p, model: m });
      if (res && res.valid) {
        lamp.style.background = '#39ff14';
        lamp.style.boxShadow = '0 0 10px #39ff14';
      } else {
        lamp.style.background = '#ff3333';
        lamp.style.boxShadow = '0 0 10px #ff3333';
        if (res && res.info) alert(`Error testing ${aName}: ` + res.info);
      }
    }
  </script>
</body>

</html>
