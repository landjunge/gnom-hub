    function onChatKey(e) {
      const dd = document.getElementById('ac-dropdown');
      if (!dd) return;
      const items = dd.querySelectorAll('.ac-item');
      if (dd.classList.contains('show') && items.length) {
        if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('active', i === acIdx)); return; }
        if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx - 1, 0); items.forEach((el, i) => el.classList.toggle('active', i === acIdx)); return; }
        if (e.key === 'Tab') { e.preventDefault(); pickAc(items[acIdx >= 0 ? acIdx : 0]?.textContent.replace(/^@\s?/, '') || ''); return; }
        if (e.key === 'Enter' && acIdx >= 0) { e.preventDefault(); pickAc(items[acIdx]?.textContent.replace(/^@\s?/, '') || ''); return; }
        if (e.key === 'Escape') { dd.classList.remove('show'); return; }
      } else {
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          const ta = document.getElementById('chat-input');
          if (ta) {
            try {
              const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
              if (history.length > 0) {
                if (window.chatHistoryIdx === undefined) {
                  window.chatHistoryIdx = -1;
                  window.chatHistoryDraft = "";
                }
                if (e.key === 'ArrowUp') {
                  e.preventDefault();
                  if (window.chatHistoryIdx === -1) {
                    window.chatHistoryDraft = ta.value;
                    window.chatHistoryIdx = history.length - 1;
                  } else if (window.chatHistoryIdx > 0) {
                    window.chatHistoryIdx--;
                  } else {
                    return;
                  }
                  ta.value = history[window.chatHistoryIdx];
                  ta.selectionStart = ta.selectionEnd = ta.value.length;
                } else if (e.key === 'ArrowDown') {
                  e.preventDefault();
                  if (window.chatHistoryIdx === -1) {
                    return;
                  } else if (window.chatHistoryIdx < history.length - 1) {
                    window.chatHistoryIdx++;
                    ta.value = history[window.chatHistoryIdx];
                  } else {
                    window.chatHistoryIdx = -1;
                    ta.value = window.chatHistoryDraft;
                  }
                  ta.selectionStart = ta.selectionEnd = ta.value.length;
                }
              }
            } catch (err) {
              console.error(err);
            }
          }
        }
      }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    }

    function handleShowboxSpeedCommand(m, ta) {
      const speedVal = parseFloat(m.substring(15).trim());
      if (!isNaN(speedVal) && speedVal > 0) {
        window.showboxSpeed = speedVal * 1000;
        if (window.activeShowboxIndex >= 0 && window.showboxActive) {
          const idx = window.activeShowboxIndex;
          window.closeShowbox();
          setTimeout(() => window.triggerShowbox(idx), 100);
        }
        toast(`Showbox Speed: ${speedVal}s`, 'success');
      } else {
        toast('Ungültiger Speed-Wert!', 'error');
      }
      ta.value = '';
    }
    function handleShowboxLoadCommand(m, ta) {
      const showName = m.substring(9).trim();
      if (window.activeShowboxIndex >= 0) {
        const s = document.createElement('script');
        s.src = showName + '.js';
        s.onload = () => {
          if (window.loadedShowbox) {
            const idx = window.activeShowboxIndex;
            window.showboxes[idx] = window.loadedShowbox;
            window.closeShowbox();
            setTimeout(() => window.triggerShowbox(idx), 100);
          }
        };
        document.head.appendChild(s);
        toast(`Loading Showbox: ${showName}`, 'success');
      } else {
        toast('Please activate a Showbox first!', 'error');
      }
      ta.value = '';
    }
    function handleShowboxTimeCommand(m, ta, enable) {
      window.showboxTimeEnabled = enable;
      const c1 = document.getElementById('showbox-clock');
      const c2 = document.getElementById('sb-panel-clock');
      if (c1) c1.style.display = enable ? 'block' : 'none';
      if (c2) c2.style.display = enable ? 'block' : 'none';
      if (enable) updateShowboxClocks();
      ta.value = '';
      toast(enable ? '🕒 Showbox Clock Enabled' : '🕒 Showbox Clock Disabled', enable ? 'success' : 'info');
      return true;
    }
    function handleShowboxTimerCommand(m, ta) {
      if (m === '@showbox timer off') {
        stopShowboxTimer();
        ta.value = '';
        toast('🕒 Showbox Timer Disabled', 'info');
        return true;
      }
      const parts = m.substring(15).trim().split(/\s+/);
      const val = parseFloat(parts[0]);
      if (!isNaN(val)) {
        const unit = parts[1] || 'min';
        const secs = unit.startsWith('min') ? Math.round(val * 60) : Math.round(val);
        startShowboxTimer(secs);
        ta.value = '';
        toast(`🕒 Showbox Timer set for ${val} ${unit}`, 'success');
        return true;
      }
      return false;
    }
    function handleChatCommands(msg, ta) {
      const m = msg.toLowerCase();
      if (m === '@tts on') { const cb = document.getElementById('tts-enabled'); if (cb) cb.checked = true; ta.value = ''; toast('🗣️ TTS Aktiviert', 'success'); return true; }
      if (m === '@tts off') { const cb = document.getElementById('tts-enabled'); if (cb) cb.checked = false; stopTTS(); ta.value = ''; toast('🔇 TTS Deaktiviert', 'info'); return true; }
      if (m === '@tts') { const cb = document.getElementById('tts-enabled'); if (cb) { cb.checked = !cb.checked; if (!cb.checked) stopTTS(); toast(cb.checked ? '🗣️ TTS Aktiviert' : '🔇 TTS Deaktiviert', cb.checked ? 'success' : 'info'); } ta.value = ''; return true; }
      if (m === '/ufo') { if (window.showUfoAttack) window.showUfoAttack(); return true; }
      if (m === '/ghost') { if (window.showGhost) window.showGhost(); return true; }
      if (m === '/coffee') { if (window.showCoffeeBreak) window.showCoffeeBreak(); return true; }
      if (m === '@showbox time on') return handleShowboxTimeCommand(m, ta, true);
      if (m === '@showbox time off') return handleShowboxTimeCommand(m, ta, false);
      if (m.startsWith('@showbox timer')) return handleShowboxTimerCommand(m, ta);
      if (m.startsWith('@showbox speed ')) {
        handleShowboxSpeedCommand(m, ta);
        return true;
      }
      if (m.startsWith('@showbox ')) {
        handleShowboxLoadCommand(m, ta);
        return true;
      }
      return false;
    }
    function addToChatHistory(msg) {
      if (!msg) return;
      try {
        let history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        if (history.length === 0 || history[history.length - 1] !== msg) {
          history.push(msg);
          if (history.length > 50) history.shift();
          localStorage.setItem('chatHistory', JSON.stringify(history));
        }
      } catch (e) {
        console.error(e);
      }
      window.chatHistoryIdx = -1;
      window.chatHistoryDraft = "";
    }
    async function sendChat() {
      const ta = document.getElementById('chat-input');
      if (!ta) return;
      const msg = ta.value.trim();
      if (!msg) return;
      addToChatHistory(msg);
      if (handleChatCommands(msg, ta)) return;
      ta.value = '';

      document.getElementById('ac-dropdown')?.classList.remove('show');
      const res = await api('POST', '/chat', { content: msg });
      if (res) {
        if (res.status === 'role_set') toast(`👑 ${res.agent} → ${res.role}`, 'success');
        else if (res.status === 'idea_saved') toast('💡 Idea saved', 'success');
        else if (res.status === 'job_created') toast(`📋 Job → ${res.general}: ${res.task?.substring(0, 60)}`, 'success');
        else if (res.msg) toast(`⚠️ ${res.msg}`, 'error');
        else if (res.status === 'cleared') toast('🗑 Chat cleared', 'success');
        else if (res.status === 'agents') toast(`📊 ${res.agents.map(a => a.name + '(' + a.role + ')').join(', ')}`, 'info');
        else { const target = res.target ? `→ ${res.target}` : `→ ${(res.asked || []).join(', ') || 'nobody'}`; toast(`${res.mode === 'brainstorm' ? '🧠' : res.mode === 'research' ? '🔍' : '💬'} ${target}`, 'success'); }
        refreshChat(); loadAgents();
      } else { toast('Hub unreachable', 'error'); }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function parseShowboxInMsg(m) {
      let rawContent = m.content || "";
      let showBoxFound = false;
      let showData = null;
      const showboxMatch = rawContent.match(/<SHOWBOX(?::(\d+))?>([\s\S]*?)<\/SHOWBOX>/);
      const mid = m.id || Math.random().toString(36).slice(2);
      
      if (showboxMatch) {
         showBoxFound = true;
         rawContent = rawContent.replace(showboxMatch[0], '').trim();
         if (!window._processedShowboxes.has(mid)) {
             window._processedShowboxes.add(mid);
             try { 
               showData = JSON.parse(showboxMatch[2]); 
               if (showboxMatch[1] !== undefined) {
                   showData._targetIdx = parseInt(showboxMatch[1], 10) - 1; // 1-based to 0-based
               }
             } 
             catch(e) { console.error("SHOWBOX parse error", e); }
         }
      }
      return { rawContent, showBoxFound, showData };
    }

    function handleShowboxTrigger(showData, sender) {
      let slides = showData;
      if (showData && !Array.isArray(showData) && Array.isArray(showData.slides)) {
          slides = showData.slides;
          if (showData._targetIdx !== undefined) slides._targetIdx = showData._targetIdx;
      }
      if (slides && Array.isArray(slides) && slides.length > 0) {
         setTimeout(() => {
             let targetIdx = window.activeShowboxIndex >= 0 ? window.activeShowboxIndex : 0;
             if (slides._targetIdx !== undefined && slides._targetIdx >= 0 && slides._targetIdx < window.showboxes.length) {
                 targetIdx = slides._targetIdx;
             }
             window.showboxes[targetIdx] = slides;
             if (window.closeShowbox) window.closeShowbox();
             setTimeout(() => { if (window.triggerShowbox) window.triggerShowbox(targetIdx, sender); }, 100);
         }, 300);
      }
    }

    function renderChatMessageHTML(m) {
      const isUser = m.metadata?.sender === 'user';
      const name = isUser ? 'You' : (m.metadata?.sender || 'System');
      const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
      const c = isUser ? 'var(--primary)' : agentColor(name);
      const nameColor = isUser ? 'var(--primary)' : (name.toLowerCase().startsWith('testag') ? '#0066FF' : 'inherit');
      const mid = m.id || Math.random().toString(36).slice(2);
      
      const { rawContent, showBoxFound, showData } = parseShowboxInMsg(m);
      let safe = esc(rawContent);
      if (showBoxFound) {
         const targetText = (showData && showData._targetIdx !== undefined) ? ` Button ${showData._targetIdx + 1}` : '';
         safe += `<div style="color:var(--cyan);font-size:0.8em;margin-top:8px;">[ 🎬 Showbox Triggered${targetText} ]</div>`;
      }
      
      handleShowboxTrigger(showData, name);

      safe = safe.replace(/\[SOUL:\s*([\s\S]*?)\]/g, '<div style="font-size:0.6rem; color:var(--bg-surface); opacity:0.5; margin-top:4px;">[SOUL: $1]</div>');
      safe = safe.replace(/\n/g, '<br>');
      return `<div class="chat-msg ${isUser ? 'user' : 'agent'}" style="border-left-color:${c};">
    <div class="chat-meta"><span class="agent-name" style="color:${nameColor}">${esc(name)}</span><span><button class="copy-btn" onclick="copyMsg('${mid}')" title="Copy">📋</button><button class="copy-btn del-btn" onclick="deleteChatMsg('${mid}')" title="Delete">🗑</button>${time}</span></div>
    <div class="mem-content" id="msg-${mid}">${safe}</div></div>`;
    }

    async function refreshChat() {
      const el = document.getElementById('chat-display');
      if (!el) return;
      const msgs = await api('GET', '/chat?limit=20');

      const dataStr = JSON.stringify(msgs || []);
      if (window._lastChatData === dataStr) return;
      window._lastChatData = dataStr;

      const st = el.scrollTop;
      const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;

      if (!msgs || !msgs.length) { el.innerHTML = '<div class="empty">No messages yet.</div>'; return; }
      const sorted = msgs.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));
      window._processedShowboxes = window._processedShowboxes || new Set();

      el.innerHTML = sorted.map(renderChatMessageHTML).join('');

      if (wasAtBottom || !window._chatInitialized) {
        el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
        window._chatInitialized = true;
      } else {
        el.scrollTop = st;
      }

      if (!window._spokenIds) window._spokenIds = new Set();
      sorted.filter(m => m.metadata?.sender !== 'user' && !window._spokenIds.has(m.id)).forEach(m => {
        window._spokenIds.add(m.id);
        speak(`${m.metadata?.sender || 'System'} sagt: ${m.content}`, m.metadata?.sender || 'System');
      });
    }

    // ── TTS Queue ──
    const _ttsQ = []; let _ttsBusy = false;
    function stopTTS() {
      speechSynthesis.cancel();
      _ttsQ.length = 0;
      _ttsBusy = false;
      const btn = document.getElementById('stop-tts-btn');
      if (btn) btn.style.display = 'none';
    }

    async function deleteChatMsg(id) {
      await api('DELETE', `/memory/${id}`);
      stopTTS();
      window._lastChatData = null; // force re-render
      refreshChat();
    }

    function getVoiceForAgent(agentName, lang) {
      if (typeof speechSynthesis === 'undefined') return null;
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return null;
      const langPrefix = lang.split('-')[0].toLowerCase();
      let filtered = voices.filter(v => v.lang.toLowerCase().startsWith(langPrefix));
      if (!filtered.length) filtered = voices;
      let hash = 0;
      for (let i = 0; i < agentName.length; i++) {
        hash = agentName.charCodeAt(i) + ((hash << 5) - hash);
      }
      return filtered[Math.abs(hash) % filtered.length];
    }

    async function speak(text, agentId = '') {
      if (!document.getElementById('tts-enabled')?.checked) return;
      _ttsQ.push({ text, agentId });
      if (_ttsBusy) return;
      _ttsBusy = true;
      const stopBtn = document.getElementById('stop-tts-btn');
      if (stopBtn) stopBtn.style.display = 'block';

      while (_ttsQ.length) {
        const { text: t, agentId: a } = _ttsQ.shift();
        speechSynthesis.cancel();
        try {
          const r = await fetch(`${API}/audio/tts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: t, agent_id: a }) });
          if (r.ok && r.headers.get('content-type')?.includes('audio')) {
            const audio = new Audio(URL.createObjectURL(await r.blob()));
            await new Promise(ok => { audio.onended = ok; audio.onerror = ok; audio.play(); }); continue;
          }
        } catch { }
        const u = new SpeechSynthesisUtterance(t); u.lang = 'de-DE'; u.rate = 1.0;
        const voice = getVoiceForAgent(a || 'System', u.lang);
        if (voice) u.voice = voice;
        await new Promise(ok => { u.onend = ok; u.onerror = ok; speechSynthesis.speak(u); });
      }
      _ttsBusy = false;
      if (stopBtn) stopBtn.style.display = 'none';
    }

    // ── STT ──
    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR();
      recognition.continuous = true; recognition.lang = 'de-DE';
      recognition.onresult = (e) => {
        let text = '';
        for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript + ' ';
        const inp = document.getElementById('chat-input');
        if (inp) inp.value = text.trim();
      };
      recognition.onerror = () => { const b = document.getElementById('mic-btn'); if (b) { b.classList.remove('active'); b.innerText = 'Rec'; } };
      recognition.onend = () => { const b = document.getElementById('mic-btn'); if (b) { b.classList.remove('active'); b.innerText = 'Rec'; } };
    }
    function toggleSTT() {
      const btn = document.getElementById('mic-btn');
      if (!recognition) { toast('Browser does not support voice input', 'error'); return; }
      if (btn.classList.contains('active')) {
        recognition.stop();
        btn.classList.remove('active');
        btn.innerText = 'Rec';
      } else {
        recognition.start();
        btn.classList.add('active');
        btn.innerText = 'Stop';
      }
    }

    // ── Status Lamps ──
    let _lastInternals = '';
    function updateLamps(hubAgents) {
      const el = document.getElementById('status-lamps');
      if (!hubAgents) return;

      // 4 System-Agenten als Lämpchen
      const sysNames = ['soulag', 'generalag', 'securityag', 'watchdogag'];
      const hiddenSys = [
        { name: 'SoulAG', status: 'online' },
        { name: 'GeneralAG', status: 'online' },
        { name: 'SecurityAG', status: 'online' },
        { name: 'WatchdogAG', status: 'online' }
      ];

      let displayAgents = [...hiddenSys.filter(h => !hubAgents.some(a => a.name === h.name)), ...hubAgents];
      displayAgents = displayAgents.filter(a => sysNames.includes((a.name || '').toLowerCase()));

      const names = displayAgents.map(a => a.name).join(',');

      if (_lastInternals !== names) {
        el.innerHTML = displayAgents.map((a, i) => {
          const dur = (2.5 + Math.random() * 2.0).toFixed(2);   // 2.5s – 4.5s
          const dly = (-(Math.random() * 6.0)).toFixed(2);       // -0 … -6s offset
          const col = agentColor(a.name);
          return `<div class="lamp" data-ag="${a.name}" title="${a.name}" style="color:${col};background:${col};--dur:${dur}s;--delay:${dly}s"></div>`;
        }).join('');
        _lastInternals = names;
      }

      el.querySelectorAll('.lamp').forEach(l => {
        const key = l.dataset.ag;
        const agent = displayAgents.find(a => a.name === key);
        const st = agent?.status || 'offline';
        l.className = st === 'busy' ? 'lamp busy' : st === 'online' ? 'lamp on' : 'lamp';
      });
    }

    // ── Coffee & UFO Reminders ──
    function checkTimers() {
      const now = Date.now();

      // Coffee & UFO disabled per user request

      // Ghost (6 hours and 6 minutes)
      const lastGhost = localStorage.getItem('last_ghost_time');
      if (!lastGhost) {
        localStorage.setItem('last_ghost_time', now);

    // ── Interval cleanup registry ──
    const _intervalIds = [];
    function _trackInterval(fn, ms) { const id = setInterval(fn, ms); _intervalIds.push(id); return id; }
    window.addEventListener('beforeunload', () => {
      _intervalIds.forEach(id => clearInterval(id));
      if (window.showboxTimerInterval) clearInterval(window.showboxTimerInterval);
      if (typeof showboxInterval !== 'undefined' && showboxInterval) clearInterval(showboxInterval);
      if (typeof panelShowboxInterval !== 'undefined' && panelShowboxInterval) clearInterval(panelShowboxInterval);
    });

    _trackInterval(checkTimers, 60000); // Check every minute

    window.showboxTimeEnabled = false;
    function updateShowboxClocks() {
      if (!window.showboxTimeEnabled) return;
      const now = new Date();
      const timeStr = now.toLocaleTimeString();
      const clock1 = document.getElementById('showbox-clock');
      const clock2 = document.getElementById('sb-panel-clock');
      if (clock1) clock1.innerText = timeStr;
      if (clock2) clock2.innerText = timeStr;
    }
    _trackInterval(updateShowboxClocks, 1000);

    window.showboxTimerInterval = null;
    window.showboxTimerRemaining = 0;
    function stopShowboxTimer() {
      if (window.showboxTimerInterval) {
        clearInterval(window.showboxTimerInterval);
        window.showboxTimerInterval = null;
      }
      const t1 = document.getElementById('showbox-timer');
      const t2 = document.getElementById('sb-panel-timer');
      if (t1) t1.style.display = 'none';
      if (t2) t2.style.display = 'none';
      document.getElementById('layer-showbox')?.classList.remove('timer-timeout-pulse');
      document.getElementById('sb-screen')?.classList.remove('timer-timeout-pulse');
    }
    function formatShowboxTimer(s) {
      const min = Math.floor(s / 60).toString().padStart(2, '0');
      const sec = (s % 60).toString().padStart(2, '0');
      return `${min}:${sec}`;
    }
    function tickShowboxTimer() {
      if (window.showboxTimerRemaining > 0) {
        window.showboxTimerRemaining--;
        const timeStr = formatShowboxTimer(window.showboxTimerRemaining);
        const t1 = document.getElementById('showbox-timer');
        const t2 = document.getElementById('sb-panel-timer');
        if (t1) { t1.innerText = timeStr; t1.style.display = 'block'; }
        if (t2) { t2.innerText = timeStr; t2.style.display = 'block'; }
      }
      if (window.showboxTimerRemaining === 0) {
        clearInterval(window.showboxTimerInterval);
        window.showboxTimerInterval = null;
        document.getElementById('layer-showbox')?.classList.add('timer-timeout-pulse');
        document.getElementById('sb-screen')?.classList.add('timer-timeout-pulse');
      }
    }
    function startShowboxTimer(secs) {
      stopShowboxTimer();
      window.showboxTimerRemaining = secs;
      const timeStr = formatShowboxTimer(secs);
      const t1 = document.getElementById('showbox-timer');
      const t2 = document.getElementById('sb-panel-timer');
      if (t1) { t1.innerText = timeStr; t1.style.display = 'block'; }
      if (t2) { t2.innerText = timeStr; t2.style.display = 'block'; }
      window.showboxTimerInterval = setInterval(tickShowboxTimer, 1000);
    }

    window.coffeeTimer = null;
    window.coffeeFleeCount = 0;
    window.showCoffeeBreak = () => {
      const el = document.getElementById('coffee-overlay');
      el.style.transition = 'none';
      el.style.bottom = '30px';
      el.style.right = '30px';
      el.style.top = 'auto';
      el.style.left = 'auto';
      el.style.display = 'block';
      window.coffeeFleeCount = 0;
      speak("Take it easy. Drink coffee.");
      clearTimeout(window.coffeeTimer);
      window.coffeeTimer = setTimeout(() => { el.style.display = 'none'; }, 20000);
    };

    window.fleeCoffee = () => {
      window.coffeeFleeCount++;
      const el = document.getElementById('coffee-overlay');
      if (window.coffeeFleeCount >= 3) {
        el.style.display = 'none';
        clearTimeout(window.coffeeTimer);
        return;
      }
      el.style.transition = 'all 0.15s cubic-bezier(0.25, 1, 0.5, 1)';
      const maxX = Math.max(10, window.innerWidth - el.offsetWidth - 20);
      const maxY = Math.max(10, window.innerHeight - el.offsetHeight - 20);
      const rx = Math.max(10, Math.floor(Math.random() * maxX));
      const ry = Math.max(10, Math.floor(Math.random() * maxY));
      el.style.bottom = 'auto';
      el.style.right = 'auto';
      el.style.left = rx + 'px';
      el.style.top = ry + 'px';
    };
    window.showUfoAttack = () => {
      const o = document.getElementById('ufo-overlay');
      o.style.display = 'flex';
      setTimeout(() => { o.style.display = 'none'; }, 600000);
    };
    window.showGhost = () => {
      const o = document.getElementById('ghost-overlay');
      const newGhost = o.cloneNode(true);
      o.parentNode.replaceChild(newGhost, o);
      newGhost.style.display = 'flex';
      setTimeout(() => { newGhost.style.display = 'none'; }, 120000);
    };

    // ── Init ──
    (async () => {
      try {
        checkTimers();
        await discoverPort();
        if (!API) {
          document.getElementById('content').innerHTML = '<div class="empty" style="padding:80px 20px"><h2 style="color:var(--error);margin-bottom:10px">Hub unreachable (No API)</h2><p>Server nicht gefunden. Öffne http://127.0.0.1:3002/ im Browser.</p></div>';
          return;
        }
        await loadAgents();
        await loadActivePreset();
        updateLamps(agents);
        showWarRoom();
      _trackInterval(async () => {
        const res = await api('GET', '/agents');
        agents = Array.isArray(res) ? res : (res?.agents || []);
        const searchInput = document.getElementById('agent-search');
        renderAgentList(searchInput ? searchInput.value : '');
        updateStats();
        updateLamps(agents);
      }, 3000);
      _trackInterval(refreshChat, 5000);
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty" style="padding:80px 20px"><h2 style="color:red">UI Error</h2><p>${err.message}</p></div>`;
      }

      // Layer Animation
      let currentLayer = 0;
      const totalLayers = 10;
      window.showboxActive = false;
      let showboxInterval = null;
      let showboxTimeout = null;
      window.activeShowboxIndex = -1;
      window.showboxSpeed = window.showboxSpeed || 30000;

    function resizeShowboxText(sbText, sbLayer) {
      let size = 32;
      sbText.style.fontSize = size + 'px';
      while((sbText.scrollHeight > sbLayer.clientHeight - 10 || sbText.scrollWidth > sbLayer.clientWidth - 10) && size > 12) {
        size--;
        sbText.style.fontSize = size + 'px';
      }
    }
    function isImportantShowboxContent(content) {
      if (!content) return false;
      if (Array.isArray(content)) {
        return content.some(slide => isImportantShowboxContent(slide));
      }
      if (typeof content === 'object') {
        if (content.important || content.priority === 'high' || content.priority === 'critical') return true;
        if (content.slides) return isImportantShowboxContent(content.slides);
        return isImportantShowboxContent(JSON.stringify(content));
      }
      const text = String(content).toLowerCase();
      const importantKeywords = ['error', 'fehler', 'warn', 'wichtig', 'alarm', 'critical', 'achtung', 'fail', 'alert', 'success', 'erfolg', 'priorität', 'urgent', 'dringend', '!', 'warning', 'danger', 'gefahr', 'sicherheits', 'security'];
      return importantKeywords.some(kw => text.includes(kw));
    }
    function updateShowboxText(sbText, sbLayer, showboxSteps, step) {
      const content = showboxSteps[step];
      sbText.innerHTML = content;
      resizeShowboxText(sbText, sbLayer);
      sbText.style.opacity = 1;

      const showboxEl = document.getElementById('showbox');
      if (showboxEl) {
        showboxEl.style.setProperty('--showbox-glow-color', '');
        showboxEl.classList.remove('glow-important', 'glow-agent');
        
        if (isImportantShowboxContent(content)) {
          const sender = window.activeShowboxSender || '';
          const sysNames = ['system', 'generalag', 'soulag', 'securityag', 'watchdogag', ''];
          const isAgent = sender && !sysNames.includes(sender.toLowerCase());
          
          if (isAgent) {
            const color = agentColor(sender);
            showboxEl.style.setProperty('--showbox-glow-color', color);
            showboxEl.classList.add('glow-agent');
          } else {
            showboxEl.classList.add('glow-important');
          }
        }
      }
    }
    window.triggerShowbox = (showboxIndex, sender) => {
        if (document.getElementById('showbox-panel')) { selectPanelShowbox(showboxIndex); return; }
        if (window.showboxActive && window.activeShowboxIndex === showboxIndex) { window.closeShowbox(); return; }
        if(showboxInterval) clearInterval(showboxInterval);
        if(showboxTimeout) clearTimeout(showboxTimeout);
        
        window.activeShowboxIndex = showboxIndex;
        window.activeShowboxSender = sender || '';
        if (!window.showboxes) window.showboxes = [["<span style='color:red;'>Keine themes.js gefunden!</span>"]];
        const showboxSteps = window.showboxes[showboxIndex] || window.showboxes[0];
        window.showboxActive = true;
        let step = 0;
        
        document.querySelectorAll('[id^="layer-"]').forEach(l => l.classList.remove('active'));
        const sbLayer = document.getElementById('layer-showbox');
        const sbText = document.getElementById('showbox-text');

        const clock = document.getElementById('showbox-clock');
        if (clock) clock.style.display = window.showboxTimeEnabled ? 'block' : 'none';
        updateShowboxClocks();

        const updateText = () => updateShowboxText(sbText, sbLayer, showboxSteps, step);
        sbText.style.opacity = 0;
        showboxTimeout = setTimeout(updateText, 100);
        sbLayer.classList.add('active');

        showboxInterval = setInterval(() => {
          step++;
          if (step >= showboxSteps.length) { window.closeShowbox(); return; }
          sbText.style.opacity = 0;
          showboxTimeout = setTimeout(updateText, 300);
        }, window.showboxSpeed);
      };

      window.closeShowbox = () => {
        if(showboxInterval) {
          clearInterval(showboxInterval);
          showboxInterval = null;
        }
        if(showboxTimeout) {
          clearTimeout(showboxTimeout);
          showboxTimeout = null;
        }
        window.activeShowboxIndex = -1;
        window.showboxActive = false;
        const showboxEl = document.getElementById('showbox');
        if (showboxEl) {
          showboxEl.classList.remove('glow-important', 'glow-agent');
          showboxEl.style.setProperty('--showbox-glow-color', '');
        }
        const sbLayer = document.getElementById('layer-showbox');
        if(sbLayer) sbLayer.classList.remove('active');
        const curr = document.getElementById(`layer-${currentLayer}`);
        if(curr) curr.classList.add('active');
      };

      _trackInterval(() => {
        if (window.showboxActive) return;
        const oldL = document.getElementById(`layer-${currentLayer}`);
        if(oldL) oldL.classList.remove('active');
        currentLayer = (currentLayer + 1) % totalLayers;
        const newL = document.getElementById(`layer-${currentLayer}`);
        if(newL) newL.classList.add('active');
      }, 5000);
    })();

    // ── Showbox Center ──
    let panelShowboxPlaying = false;
    let panelShowboxMesseModus = false;
    let panelShowboxInterval = null;
    let activePanelShowboxIndex = 0;
    let activePanelSlideIndex = 0;

    function buildShowboxHeaderHTML() {
      return `
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <h2><button class="btn-primary" onclick="showWarRoom()" style="margin-right:15px; padding: 4px 10px; font-size:0.8rem; vertical-align: middle;">◀ Zurück</button>🎬 Showbox Center</h2>
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <button class="btn-primary" onclick="togglePanelShowboxPlay()" id="sb-play-btn" style="min-width:80px;">▶ Play</button>
            <button class="btn-primary" onclick="prevPanelSlide()">◀ Back</button>
            <button class="btn-primary btn-next-pulse" onclick="nextPanelSlide()">Next ▶</button>
            <label style="font-size:0.85rem; color:var(--text-muted); display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none;">
              <input type="checkbox" id="sb-messe-modus" onchange="toggleMesseModus(this.checked)"> Exhibition Mode
            </label>
            <div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.05);">
              <span style="font-size:0.8rem; color:var(--text-muted);">Speed:</span>
              <input type="range" id="sb-speed-slider" min="30" max="120" step="5" value="${window.showboxSpeed / 1000}" onchange="updatePanelShowboxSpeed(this.value)" style="width:70px; cursor:pointer;">
              <span id="sb-speed-val" style="font-size:0.85rem; color:var(--cyan); min-width:25px;">${window.showboxSpeed >= 60000 ? Math.floor(window.showboxSpeed/60000) + 'm' : (window.showboxSpeed/1000) + 's'}</span>
            </div>
          </div>
        </div>
      `;
    }
    function buildShowboxScreenColHTML() {
      const showClock = window.showboxTimeEnabled ? 'block' : 'none';
      const showTimer = (window.showboxTimerRemaining && window.showboxTimerRemaining > 0) ? 'block' : 'none';
      return `
        <div style="display:flex; flex-direction:column; gap:10px;">
          <div id="sb-screen" style="flex:1; background:radial-gradient(circle, #101424 0%, #070912 100%); border:1px solid rgba(0, 150, 255, 0.15); border-radius:12px; display:flex; justify-content:center; align-items:center; padding:20px; box-shadow:inset 0 0 40px rgba(0, 150, 255, 0.1); position:relative; overflow:hidden;">
            <div id="sb-screen-content" style="color:white; text-align:center; font-weight:bold; font-size:40px; line-height:1.3; transition: opacity 0.3s ease, transform 0.3s ease; word-break:break-word; max-width:90%;">

    function buildShowboxEditorColHTML() {
      return `
        <div style="background:var(--bg-card); border:1px solid rgba(255,255,255,0.1); border-radius:var(--radius); padding:15px; display:flex; flex-direction:column; gap:15px; min-height:0; overflow-y:auto;">
          <div>
            <h3 style="margin-bottom:5px;">Showbox-Editor</h3>
            <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">Passe die Slides für die gewählte Showbox an (HTML erlaubt):</p>
            <textarea id="sb-editor" style="width:100%; height:180px; background:var(--bg); border:1px solid rgba(255,255,255,0.2); color:white; padding:10px; border-radius:6px; font-family:monospace; font-size:0.85rem; resize:vertical;"></textarea>

    function buildShowboxPanelHTML() {
      return `
        <div class="panel" id="showbox-panel" style="display:flex; flex-direction:column; gap:20px; height:100%; box-sizing:border-box;">
          ${buildShowboxHeaderHTML()}
          <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px; flex:1; min-height:0;">
            ${buildShowboxScreenColHTML()}

          </div>
        </div>
      `;
    }
    async function showShowboxPanel() {
      selectedId = null;
      if (panelShowboxInterval) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = null;
        panelShowboxPlaying = false;
      }
      document.getElementById('content').innerHTML = buildShowboxPanelHTML();
      const speedSec = Math.round(window.showboxSpeed / 1000);
      document.getElementById('sb-speed-slider').value = speedSec;
      document.getElementById('sb-speed-val').innerText = speedSec + 's';
      document.getElementById('sb-messe-modus').checked = panelShowboxMesseModus;
      selectPanelShowbox(activePanelShowboxIndex);
    }

    function selectPanelShowbox(idx) {
      if (panelShowboxInterval) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = null;
        panelShowboxPlaying = false;
        const btn = document.getElementById('sb-play-btn');
        if (btn) {
          btn.innerText = '▶ Play';
          btn.style.background = 'var(--primary)';
        }
      }
      activePanelShowboxIndex = idx;
      activePanelSlideIndex = 0;
      for (let i = 0; i < 7; i++) {
        const btn = document.getElementById(`sb-group-${i}`);
        if (btn) {
          if (i === idx) {
            btn.style.background = 'rgba(0, 150, 255, 0.2)';
            btn.style.borderColor = 'var(--cyan)';
            btn.style.color = 'var(--cyan)';
          } else {
            btn.style.background = 'rgba(255,255,255,0.05)';
            btn.style.borderColor = 'rgba(255,255,255,0.1)';
            btn.style.color = 'white';
          }
        }
      }
      const currentSlides = window.showboxes[idx] || [];
      document.getElementById('sb-editor').value = JSON.stringify(currentSlides, null, 2);
      renderPanelSlide();
      renderPanelSlidesList();
    }

    function renderPanelSlide() {
      const screenContent = document.getElementById('sb-screen-content');
      const indicator = document.getElementById('sb-slide-indicator');
      if (!screenContent) return;
      const currentSlides = window.showboxes[activePanelShowboxIndex] || [];
      if (currentSlides.length === 0) {
        screenContent.innerHTML = "<span style='color:red;'>Keine Slides vorhanden.</span>";
        indicator.innerText = "0 / 0";
        return;
      }
      if (activePanelSlideIndex >= currentSlides.length) activePanelSlideIndex = 0;
      if (activePanelSlideIndex < 0) activePanelSlideIndex = currentSlides.length - 1;
      screenContent.style.opacity = 0;
      screenContent.style.transform = 'scale(0.95)';
      setTimeout(() => {
        screenContent.innerHTML = currentSlides[activePanelSlideIndex];
        const screen = document.getElementById('sb-screen');
        let size = 40;
        screenContent.style.fontSize = size + 'px';
        while ((screenContent.scrollHeight > screen.clientHeight - 40 || screenContent.scrollWidth > screen.clientWidth - 40) && size > 16) {
          size -= 2;
          screenContent.style.fontSize = size + 'px';
        }
        screenContent.style.opacity = 1;
        screenContent.style.transform = 'scale(1)';
        indicator.innerText = `Folie ${activePanelSlideIndex + 1} / ${currentSlides.length}`;
      }, 200);
      const items = document.querySelectorAll('.sb-slide-item');
      items.forEach((item, i) => {
        if (i === activePanelSlideIndex) {
          item.style.background = 'rgba(0, 150, 255, 0.15)';
          item.style.borderColor = 'var(--cyan)';
        } else {
          item.style.background = 'rgba(255,255,255,0.02)';
          item.style.borderColor = 'rgba(255,255,255,0.05)';
        }
      });
    }

    function renderPanelSlidesList() {
      const list = document.getElementById('sb-slides-list');
      if (!list) return;
      const currentSlides = window.showboxes[activePanelShowboxIndex] || [];
      list.innerHTML = currentSlides.map((slide, i) => `
        <div class="sb-slide-item" onclick="jumpToPanelSlide(${i})" style="padding:6px 10px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:6px; font-size:0.72rem; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:all 0.2s;">
          <strong>Folie ${i+1}:</strong> ${esc(slide.replace(/<[^>]*>/g, ''))}
        </div>
      `).join('');
      const items = list.querySelectorAll('.sb-slide-item');
      if (items[activePanelSlideIndex]) {
        items[activePanelSlideIndex].style.background = 'rgba(0, 150, 255, 0.15)';
        items[activePanelSlideIndex].style.borderColor = 'var(--cyan)';
      }
    }

    function jumpToPanelSlide(idx) {
      activePanelSlideIndex = idx;
      renderPanelSlide();
    }

    function prevPanelSlide() {
      activePanelSlideIndex--;
      renderPanelSlide();
    }

    function nextPanelSlide() {
      const currentSlides = window.showboxes[activePanelShowboxIndex] || [];
      activePanelSlideIndex++;
      if (activePanelSlideIndex >= currentSlides.length) {
        if (panelShowboxMesseModus) {
          activePanelShowboxIndex = (activePanelShowboxIndex + 1) % 7;
          selectPanelShowbox(activePanelShowboxIndex);
          return;
        } else {
          activePanelSlideIndex = 0;
        }
      }
      renderPanelSlide();
    }

    function togglePanelShowboxPlay() {
      const btn = document.getElementById('sb-play-btn');
      if (panelShowboxPlaying) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = null;
        panelShowboxPlaying = false;
        btn.innerText = '▶ Play';
        btn.style.background = 'var(--primary)';
      } else {
        panelShowboxPlaying = true;
        btn.innerText = '⏸ Pause';
        btn.style.background = '#ffaa00';
        panelShowboxInterval = setInterval(() => {
          nextPanelSlide();
        }, window.showboxSpeed);
      }
    }

    function toggleMesseModus(val) {
      panelShowboxMesseModus = val;
    }

    function updatePanelShowboxSpeed(val) {
      window.showboxSpeed = val * 1000;
      let display = val + 's';
      if (val >= 60) {
        const m = Math.floor(val / 60);
        const s = val % 60;
        display = s > 0 ? `${m}m ${s}s` : `${m}min`;
      }
      document.getElementById('sb-speed-val').innerText = display;
      if (panelShowboxPlaying) {
        clearInterval(panelShowboxInterval);
        panelShowboxInterval = setInterval(() => {
          nextPanelSlide();
        }, window.showboxSpeed);
      }
    }

    async function savePanelShowboxContent() {
      const btn = document.getElementById('save-showbox-btn');
      const origText = btn ? btn.innerText : 'Speichern';
      const origBg = btn ? btn.style.background : '';
      
      try {
        const text = document.getElementById('sb-editor').value;
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error("JSON muss ein Array sein.");
        window.showboxes[activePanelShowboxIndex] = parsed;
        renderPanelSlide();
        renderPanelSlidesList();
        const themesRes = await api('GET', '/showbox/themes');
        if (themesRes) {
          const cleanJs = `window.showboxes = ${JSON.stringify(window.showboxes, null, 2)};`;
          await api('POST', '/showbox/themes', { content: cleanJs });
          if (btn) {
            btn.innerText = 'Gespeichert! ✓';
            btn.style.background = '#39ff14';
            btn.style.color = '#000';
          }
          toast("Erfolgreich auf Server und Client gespeichert!", "success");
        } else {
          if (btn) {
            btn.innerText = 'Server Offline!';
            btn.style.background = '#ffa500';
          }
          toast("Clientseitig aktualisiert, Server konnte nicht erreicht werden.", "warning");
        }
      } catch (err) {
        if (btn) {
          btn.innerText = 'Fehler!';
          btn.style.background = '#ff3333';
        }
        toast("Fehler beim Speichern: " + err.message, "error");
      }
      if (btn) {
        setTimeout(() => {
          btn.innerText = origText;
          btn.style.background = origBg;
          btn.style.color = '';
        }, 1500);
      }
    }

    async function resetPanelShowboxDefault() {
      if (confirm("Möchtest du diese Showbox wirklich auf die Werkseinstellungen zurücksetzen?")) {
        window.location.reload();
      }
    }

    function getAgentCapsHtml(pSel, mSel) {
      const capConfig = [
        { name: 'text', color: '#39ff14', title: 'Text Chat' },
        { name: 'vision', color: '#00e5ff', title: 'Vision' },
        { name: 'image', color: '#ff007f', title: 'Bildgenerierung' },
        { name: 'audio', color: '#ffa500', title: 'Audio' },
        { name: 'tools', color: '#b026ff', title: 'Tools (Function Calling)' }
      ];
      let activeCaps = [];
      if (pSel === 'auto') {
        let providersToCheck = [];
        if (mSel === 'stage_1') {
          activeCaps = ['text', 'vision', 'tools'];
        } else if (mSel === 'stage_2') {
          providersToCheck = ['openrouter', 'lokal'];
        } else if (mSel === 'stage_3') {
          providersToCheck = ['deepseek', 'gemini', 'openrouter', 'mistral', 'openai', 'lokal'];
        } else {
          providersToCheck = ['anthropic', 'openai', 'gemini', 'deepseek', 'openrouter', 'mistral', 'lokal'];
        }
        if (providersToCheck.length > 0) {
          if (providersToCheck.includes('lokal')) {
            activeCaps = ['text', 'vision', 'tools'];
          }
          (globalKeys || []).forEach(k => {
            if (providersToCheck.includes(k.provider) && k.valid) {
              if (k.caps && Array.isArray(k.caps)) {
                k.caps.forEach(c => {
                  if (!activeCaps.includes(c)) {
                    activeCaps.push(c);
                  }
                });
              }
            }
          });
        }
      } else if (pSel === 'lokal') {
        activeCaps = ['text', 'vision', 'tools'];
      } else {
        (globalKeys || []).forEach(k => {
          if (k.provider === pSel && k.valid) {
            if (k.caps && Array.isArray(k.caps)) {
              k.caps.forEach(c => {
                if (!activeCaps.includes(c)) {
                  activeCaps.push(c);
                }
              });
            }
          }
        });
      }
      return capConfig.map(c => {
        let hasCap = activeCaps.includes(c.name);
        let bg = hasCap ? c.color : '#222';
        let border = hasCap ? `1px solid ${c.color}` : '1px solid rgba(255,255,255,0.1)';
        let boxS = hasCap ? `0 0 4px ${c.color}` : 'none';
        return `<span style="width:8px; height:8px; border-radius:50%; background:${bg}; border:${border}; box-shadow:${boxS}; display:inline-block; flex-shrink:0;" title="${c.title}: ${hasCap ? 'Ja' : 'Nein'}"></span>`;
      }).join('');
    }

           let pSel = conf.provider || 'deepseek';

           // Ensure model selection is registered in local options map to prevent default override

           html += `<div style="display:flex; align-items:center; gap:6px; margin-bottom:4px; padding:4px 8px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); border-radius:6px; font-size:0.8rem;">

    async function loadLLMConfig() {
      await loadLanguageState();
      await loadSystemInfoState();
      await loadFtpAutoDeployState();

      const keysRes = await api('GET', '/llm/keys');
      if (keysRes) {
        globalKeys = Object.keys(keysRes).length > 0 ? Object.values(keysRes) : [];
        renderKeyStatus(globalKeys);
        if (globalKeys.length > 0) {
           document.getElementById('llm-keys-input').value = globalKeys.map(k => {
             if (!k.key) return '';
             const keyName = k.label ? k.label + "=" : (k.provider ? k.provider.toUpperCase() + "_API_KEY=" : "");
             const displayKey = window.showKeysFull ? k.key : maskKey(k.key);
             return keyName + displayKey;
           }).filter(k => k).join('\n');
        }
      }

      const agentsRes = await api('GET', '/agents');
      const llmAgentsRes = await api('GET', '/llm/agents');
      
      const providers = ['auto', 'deepseek', 'openrouter', 'openai', 'anthropic', 'gemini', 'mistral', 'lokal'];
      let models = {
        'auto': ['stage_1', 'stage_2', 'stage_3', 'stage_4'],
        'deepseek': ['deepseek-chat', 'deepseek-reasoner'],
        'openrouter': ['deepseek/deepseek-v4-flash:free', 'qwen/qwen3-coder:free', 'meta-llama/llama-3.3-70b-instruct:free'],
        'openai': ['gpt-4o', 'gpt-4o-mini', 'o1-mini', 'o1-preview'],
        'anthropic': ['claude-3-5-sonnet-20241022', 'claude-3-5-haiku-20241022', 'claude-3-opus-20240229'],
        'gemini': ['gemini-1.5-pro', 'gemini-1.5-flash', 'gemini-2.0-flash-exp'],
        'mistral': ['mistral-large-latest', 'pixtral-large-latest', 'codestral-latest'],
        'lokal': ['llama3', 'mistral', 'qwen2', 'phi3', 'llama3.2', 'gemma2']
      };
      loadLLMAgentsListState(agentsRes, llmAgentsRes, models, providers);
      window.llmModelsMap = models;

      // Fetch available models asynchronously in the background so the UI doesn't hang
      api('GET', '/llm/available_models').then(availableModels => {
        if (availableModels) {
          models = { ...models, ...availableModels };
          window.llmModelsMap = models;
          // Dynamically update each agent's model dropdown with working ones, preserving selection if still present
          if (agentsRes && Array.isArray(agentsRes)) {
            agentsRes.forEach(a => {
              const provSel = document.getElementById(`prov-${a.name}`);
              const modSelect = document.getElementById(`mod-${a.name}`);
              if (provSel && modSelect) {
                const currentProv = provSel.value;
                const currentMod = modSelect.value;
                const dbMod = modSelect.getAttribute('data-db-model') || currentMod;
                const mods = models[currentProv] || [];
                modSelect.innerHTML = mods.map(m => `<option value="${m}">${getModelDisplayName(currentProv, m)}</option>`).join('');
                if (mods.includes(dbMod)) {
                  modSelect.value = dbMod;
                } else if (mods.includes(currentMod)) {
                  modSelect.value = currentMod;
                } else if (mods.length > 0) {
                  modSelect.value = mods[0];
                }
                window.updateAgentCaps(a.name);
              }
            });
          }
        }
      }).catch(e => {
        console.error("Failed to load available models asynchronously", e);
      }).finally(() => {
        if (window.loadRoutingInsights) {
          window.loadRoutingInsights();
        }
      });
    }

    window.updateAgentCaps = function(aName) {
      const p = document.getElementById(`prov-${aName}`).value;
      const m = document.getElementById(`mod-${aName}`).value;
      const capsContainer = document.getElementById(`caps-agent-${aName}`);
      if (capsContainer) {
        capsContainer.innerHTML = getAgentCapsHtml(p, m);
      }
    };

    window.updateModels = function(aName) {
      const p = document.getElementById(`prov-${aName}`).value;
      const modSelect = document.getElementById(`mod-${aName}`);
      const mods = window.llmModelsMap[p] || [];
      modSelect.innerHTML = mods.map(m => `<option value="${m}">${getModelDisplayName(p, m)}</option>`).join('');
      
      window.updateAgentCaps(aName);
    };

    function maskKey(key) {
      if (!key) return '';
      if (key.length <= 12) return '••••••••';
      const prefix = key.substring(0, 8);
      const suffix = key.substring(key.length - 4);
      return `${prefix}••••••••••••${suffix}`;
    }

    window.toggleKeysVisibility = function(show) {
      window.showKeysFull = show;
      if (globalKeys.length > 0) {
        document.getElementById('llm-keys-input').value = globalKeys.map(k => {
          if (!k.key) return '';
          const keyName = k.label ? k.label + "=" : (k.provider ? k.provider.toUpperCase() + "_API_KEY=" : "");
          const displayKey = window.showKeysFull ? k.key : maskKey(k.key);
          return keyName + displayKey;
        }).filter(k => k).join('\n');
      }
      renderKeyStatus(globalKeys);
    };

    function cleanKey(line) {
      let raw = line.trim();
      if (raw.startsWith("export ")) {
        raw = raw.substring(7).trim();
      }
      if (raw.includes("=")) {
        raw = raw.split("=")[1].trim();
      } else if (raw.includes(":")) {
        raw = raw.split(":")[1].trim();
      }
      raw = raw.replace(/^['"]|['"]$/g, '').trim();
      raw = raw.replace(/^[-*+•]\s*/, '').trim();
      raw = raw.replace(/\s*(#|\/\/).*$/, '').trim();
      raw = raw.replace(/\s*\(.*?\)\s*$/, '').trim();
      return raw;
    }

    function detectProvider(line, cleanedKey) {
      const upper = line.toUpperCase();
      if (upper.includes("OPENROUTER")) return "openrouter";
      if (upper.includes("DEEPSEEK")) return "deepseek";
      if (upper.includes("ANTHROPIC") || upper.includes("CLAUDE")) return "anthropic";
      if (upper.includes("GEMINI") || upper.includes("GOOGLE")) return "gemini";
      if (upper.includes("OPENAI")) return "openai";
      if (upper.includes("MISTRAL")) return "mistral";
      if (upper.includes("ELEVEN") || upper.includes("11LABS")) return "elevenlabs";
      if (upper.includes("BRAVE")) return "brave";
      
      if (cleanedKey.startsWith("sk-or-")) return "openrouter";
      if (cleanedKey.startsWith("sk-ant-")) return "anthropic";
      if (cleanedKey.startsWith("AIzaSy")) return "gemini";
      if (cleanedKey.startsWith("BS-")) return "brave";
      if (/^[0-9a-fA-F]{32}$/.test(cleanedKey)) return "elevenlabs";
      return null;
    }

    async function saveAndTestKeys() {
      const input = document.getElementById('llm-keys-input').value;
      const rawLines = input.split('\n').map(k => k.trim()).filter(k => k);
      
      document.getElementById('llm-keys-status').innerHTML = 'Testing & assigning keys...';
      
      let testedKeys = [];
      let nextId = Date.now();
      
      for(let line of rawLines) {
        let isMasked = line.includes('•') || line.includes('*') || line.includes('...');
        let k = cleanKey(line);
        if (!k) continue;
        
        let label = '';
        if (line.includes('=')) {
          label = line.split('=')[0].trim();
          label = label.replace(/^#\s*UNGÜLTIG:\s*/i, '').replace(/^#\s*/, '').trim();
        }
        
        let existing = null;
        if (isMasked) {
          existing = globalKeys.find(gk => maskKey(gk.key) === k);
        } else {
          existing = globalKeys.find(gk => gk.key === k);
        }
        
        if (existing) {
          if (label && (!existing.label || existing.label !== label)) {
            existing.label = label;
          }
          testedKeys.push(existing);
        } else {
          let p = detectProvider(line, k);
          let res = await api('POST', '/llm/test', { key: k, provider: p, label: label });
          testedKeys.push({
            id: 'k_' + (nextId++),
            key: k,
            provider: res ? (res.provider || p || 'unknown') : (p || 'unknown'),
            valid: res && res.valid,
            info: res ? res.info : 'Error',
            caps: res && res.caps ? res.caps : [],
            label: label || (res && res.provider ? res.provider.toUpperCase() + '_API_KEY' : 'API_KEY')
          });
        }
      }
      
      let toSave = {};
      testedKeys.forEach(k => toSave[k.id] = k);
      await api('POST', '/llm/keys', toSave);
      
      // Auto-assign keys
      await api('POST', '/llm/auto_assign');
      
      globalKeys = testedKeys;
      renderKeyStatus(testedKeys);
      loadLLMConfig();
    }


    function renderKeyStatus(keys) {
      let h = '';
      keys.forEach((k, idx) => {
        let mainColor = k.valid ? '#39ff14' : '#ff3333';
        let keyObscured = (k.key && !window.showKeysFull) ? maskKey(k.key) : (k.key || 'Unknown');
        
        let capsHtml = '';
        const capConfig = [
          { name: 'text', color: '#39ff14', title: 'Text Chat' },
          { name: 'vision', color: '#00e5ff', title: 'Vision' },
          { name: 'image', color: '#ff007f', title: 'Bildgenerierung' },
          { name: 'audio', color: '#ffa500', title: 'Audio (TTS)' },
          { name: 'web', color: '#00ffcc', title: 'Web Suche' },
          { name: 'tools', color: '#b026ff', title: 'Tools (Function Calling)' }
        ];
        
        capConfig.forEach(c => {
          let hasCap = k.caps && k.caps.includes(c.name);
          let bg = hasCap ? c.color : '#222';
          let border = hasCap ? `1px solid ${c.color}` : '1px solid rgba(255,255,255,0.1)';
          let boxS = hasCap ? `0 0 4px ${c.color}` : 'none';
          capsHtml += `<span style="width:6px; height:6px; border-radius:50%; background:${bg}; border:${border}; box-shadow:${boxS}; display:inline-block; margin-left:3px; flex-shrink:0;" title="${c.title}: ${hasCap ? 'Ja' : 'Nein'}"></span>`;
        });

        h += `
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:0.72rem; background:rgba(255,255,255,0.02); padding:3px 6px; border-radius:4px; border:1px solid rgba(255,255,255,0.05);">
            <div style="width:8px; height:8px; border-radius:50%; background:${mainColor}; box-shadow:0 0 3px ${mainColor}; flex-shrink:0;" title="${k.valid ? 'Gültig' : 'Ungültig'}"></div>
            <div style="flex-grow:1; font-family:monospace; overflow:hidden; text-overflow:ellipsis;" title="${keyObscured}">${k.label ? k.label + ': ' : ''}${keyObscured} (${getProviderDisplayName(k.provider) || 'Unbekannt'})</div>
            <div style="display:flex; gap:2px; align-items:center; flex-shrink:0;">${capsHtml}</div>
          </div>
        `;
      });
      document.getElementById('llm-keys-status').innerHTML = h || '<div style="color:var(--text-muted)">Keine Keys hinterlegt.</div>';
    }

    window.runRoutingWithProgress = async function(agents, routeActionPromise) {
      const banner = document.getElementById('routing-progress-banner');
      const text = document.getElementById('routing-progress-text');
      const pct = document.getElementById('routing-progress-percentage');
      const spinner = document.getElementById('routing-banner-spinner');
      
      if (banner) {
        banner.style.display = 'flex';
        banner.style.background = 'rgba(0,229,255,0.08)';
        banner.style.borderColor = 'rgba(0,229,255,0.2)';
        if (text) {
          text.innerText = 'Auto-routing läuft: Mappe Agenten zu optimalen LLMs...';
          text.style.color = '#00e5ff';
        }
        if (pct) {
          pct.innerText = '0%';
          pct.style.color = 'rgba(0,229,255,0.7)';
        }
        if (spinner) {
          spinner.style.display = 'block';
          spinner.style.borderColor = 'rgba(0,229,255,0.3)';
          spinner.style.borderTopColor = '#00e5ff';
        }
      }
      
      try {
        // 1. Run the route assignment action
        await routeActionPromise;
        
        // 2. Reload the UI config to reflect changes in dropdowns
        await loadLLMConfig();
        
        // 3. Test agents in parallel with progress updates
        let completed = 0;
        const total = agents.length;
        if (total === 0) {
          if (pct) pct.innerText = '100%';
        }
        
        const testPromises = agents.map(async (a) => {
          const provSelect = document.getElementById(`prov-${a.name}`);
          const modSelect = document.getElementById(`mod-${a.name}`);
          const p = provSelect ? provSelect.value : 'auto';
          const m = modSelect ? modSelect.value : 'stage_3';
          
          // Show status lamp as yellow/testing
          const lamp = document.getElementById(`lamp-${a.name}`);
          if (lamp) {
            lamp.style.background = 'yellow';
            lamp.style.boxShadow = '0 0 8px yellow';
            lamp.title = 'Test läuft...';
          }
          
          try {
            let res = await api('POST', '/llm/test_agent', { agent: a.name, provider: p, model: m });
            if (lamp) {
              if (res && res.valid) {
                lamp.style.background = '#39ff14';
                lamp.style.boxShadow = '0 0 10px #39ff14';
                let detail = (res.resolved_provider && res.resolved_model) ? ` (${getProviderDisplayName(res.resolved_provider)} - ${res.resolved_model})` : '';
                lamp.title = `Test erfolgreich${detail}`;
              } else {
                lamp.style.background = '#ff3333';
                lamp.style.boxShadow = '0 0 10px #ff3333';
                lamp.title = res ? (res.info || 'Test fehlgeschlagen') : 'Fehler';
              }
            }
          } catch (e) {
            if (lamp) {
              lamp.style.background = '#ff3333';
              lamp.style.boxShadow = '0 0 10px #ff3333';
              lamp.title = 'Verbindungsfehler';
            }
          }
          
          completed++;
          const percent = Math.round((completed / total) * 100);
          if (pct) {
            pct.innerText = `${percent}%`;
          }
        });
        
        await Promise.all(testPromises);
        
        // 4. Update banner to success state
        if (banner) {
          banner.style.background = 'rgba(57,255,20,0.08)';
          banner.style.borderColor = 'rgba(57,255,20,0.2)';
          if (text) {
            text.innerText = `Auto-routing abgeschlossen! ${total} Agenten erfolgreich verifiziert.`;
            text.style.color = '#39ff14';
          }
          if (pct) {
            pct.innerText = '100%';
            pct.style.color = 'rgba(57,255,20,0.7)';
          }
          if (spinner) {
            spinner.style.display = 'none';
          }
          
          // Refresh insights list
          await loadRoutingInsights();
          
          // Fade out banner after 3 seconds
          setTimeout(() => {
            banner.style.display = 'none';
          }, 3000);
        }
      } catch (err) {
        console.error("Routing progress error", err);
        if (banner) {
          banner.style.background = 'rgba(255,51,51,0.08)';
          banner.style.borderColor = 'rgba(255,51,51,0.2)';
          if (text) {
            text.innerText = 'Fehler beim Auto-routing.';
            text.style.color = '#ff3333';
          }
          if (spinner) spinner.style.display = 'none';
          setTimeout(() => { banner.style.display = 'none'; }, 4000);
        }
      }
    };

    window.setAllAgentsToStage = async function(stage) {
      const agents = window.llmAgentsListGlobal || [];
      const overridePromise = (async () => {
        let config = {};
        agents.forEach(a => {
          config[a.name.toLowerCase()] = {
            provider: 'auto',
            model: stage
          };
        });
        await api('POST', '/llm/agents', config);
      })();
      
      await window.runRoutingWithProgress(agents, overridePromise);
    };

    window.autoRouteAllAgents = async function() {
      const agents = window.llmAgentsListGlobal || [];
      await window.runRoutingWithProgress(agents, api('POST', '/llm/auto_assign'));
    };

    window.loadRoutingInsights = async function() {
      const container = document.getElementById('routing-insights-panel');
      if (!container) return;
      
      try {
        const insights = await api('GET', '/llm/routing_insights');
        if (insights && Array.isArray(insights) && insights.length > 0) {
          container.style.display = 'block';
          
          let html = `
            <div style="display:flex; flex-direction:column; gap:6px;">
          `;
          
          insights.forEach(ins => {
            let badgeColor = '#888';
            let badgeBg = 'rgba(255,255,255,0.02)';
            let borderLeft = '3px solid rgba(255,255,255,0.2)';
            let badgeText = ins.status;
            let actionHtml = '';
            let iconSvg = '';
            
            if (ins.status === 'optimal') {
              badgeColor = '#39ff14';
              badgeBg = 'rgba(57,255,20,0.02)';
              borderLeft = '3px solid #39ff14';
              badgeText = 'Optimiert';
              iconSvg = `<svg style="width:12px; height:12px; fill:#39ff14; flex-shrink:0;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
            } else if (ins.status === 'upgrade_available') {
              badgeColor = '#00e5ff';
              badgeBg = 'rgba(0,229,255,0.04)';
              borderLeft = '3px solid #00e5ff';
              badgeText = 'Upgrade';
              iconSvg = `<svg style="width:12px; height:12px; fill:#00e5ff; flex-shrink:0; filter: drop-shadow(0 0 2px #00e5ff);" viewBox="0 0 24 24"><path d="M2 13h6v8h8v-8h6L12 3 2 13z"/></svg>`;
              actionHtml = `<button onclick="applyUpgrade('${ins.agent}', '${ins.optimal_provider}', '${ins.optimal_model}')" class="btn-primary" style="font-size:0.7rem; padding:2px 6px; margin-left:auto; background:#00e5ff; color:#000; border-radius:4px; font-weight:bold; border:none; cursor:pointer;">Anwenden</button>`;
            } else if (ins.status === 'manual_override') {
              badgeColor = '#ffa500';
              badgeBg = 'rgba(255,165,0,0.02)';
              borderLeft = '3px solid #ffa500';
              badgeText = 'Override';
              iconSvg = `<svg style="width:12px; height:12px; fill:#ffa500; flex-shrink:0;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>`;
              actionHtml = `<button onclick="applyUpgrade('${ins.agent}', '${ins.optimal_provider}', '${ins.optimal_model}')" class="btn-primary" style="font-size:0.7rem; padding:2px 6px; margin-left:auto; background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.8); border-radius:4px; cursor:pointer;">Reset</button>`;
            }
            
            html += `
              <div style="display:flex; align-items:center; gap:8px; padding:4px 8px; background:${badgeBg}; border:1px solid rgba(255,255,255,0.03); border-left:${borderLeft}; border-radius:4px; font-size:0.72rem; line-height:1.3; transition:all 0.2s ease; overflow:hidden;" onmouseover="this.style.background='rgba(255,255,255,0.04)';" onmouseout="this.style.background='${badgeBg}';">
                <div style="display:flex; align-items:center; gap:4px; width:80px; font-weight:bold; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; color:#fff;">
                  ${iconSvg}
                  <span>${ins.agent}</span>
                </div>
                <div style="flex-grow:1; color:rgba(255,255,255,0.65); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${ins.explanation}">${ins.explanation}</div>
                <div style="display:flex; align-items:center; gap:6px; flex-shrink:0; margin-left:auto;">
                  <span style="font-size:0.6rem; font-weight:bold; padding:1px 4px; border-radius:3px; border:1px solid ${badgeColor}33; color:${badgeColor}; font-family:monospace; background:rgba(0,0,0,0.2);">${badgeText.toUpperCase()}</span>
                  ${actionHtml}
                </div>
              </div>
            `;
          });
          
          html += `</div>`;
          container.innerHTML = html;
        } else {
          container.style.display = 'none';
        }
      } catch (e) {
        console.error("Failed to load routing insights", e);
        container.style.display = 'none';
      }
    };

    window.applyUpgrade = async function(aName, pvd, mdl) {
      const pSelect = document.getElementById(`prov-${aName}`);
      if (pSelect) {
        pSelect.value = pvd;
        window.updateModels(aName);
        const mSelect = document.getElementById(`mod-${aName}`);
        if (mSelect) {
          mSelect.value = mdl;
          window.updateAgentCaps(aName);
        }
      }
      
      const lamp = document.getElementById(`lamp-${aName}`);
      if (lamp) {
        lamp.style.background = 'yellow';
        lamp.style.boxShadow = '0 0 8px yellow';
      }
      
      await saveAgentLLMs();
      await testAgentLLM(aName);
      await loadRoutingInsights();
    };

    async function saveAgentLLMs() {
      const btn = document.getElementById('save-agents-btn');
      const origText = btn ? btn.innerText : 'Save Agent Settings';
      const origBg = btn ? btn.style.background : '';
      
      const agentsRes = await api('GET', '/agents');
      let config = {};
      if (agentsRes && Array.isArray(agentsRes)) {
        agentsRes.forEach(a => {
          let p = document.getElementById(`prov-${a.name}`);
          let m = document.getElementById(`mod-${a.name}`);
          if(p && m) {
            config[a.name.toLowerCase()] = {
              provider: p.value,
              model: m.value
            };
          }
        });
      }
      const res = await api('POST', '/llm/agents', config);
      if (res) {
        if (btn) {
          btn.innerText = 'Saved! ✓';
          btn.style.background = '#39ff14';
          btn.style.color = '#000';
        }
        toast('Agent settings saved successfully!', 'success');
      } else {
        if (btn) {
          btn.innerText = 'Error saving';
          btn.style.background = '#ff3333';
        }
        toast('Failed to save agent settings.', 'error');
      }
      if (btn) {
        setTimeout(() => {
          btn.innerText = origText;
          btn.style.background = origBg;
          btn.style.color = '';
        }, 1500);
      }
    }

    async function testAgentLLM(aName) {
      const p = document.getElementById(`prov-${aName}`).value;
      const m = document.getElementById(`mod-${aName}`).value;
      const lamp = document.getElementById(`lamp-${aName}`);
      
      lamp.style.background = 'yellow';
      lamp.style.boxShadow = '0 0 8px yellow';
      lamp.title = 'Test läuft...';
      
      let res = await api('POST', '/llm/test_agent', { agent: aName, provider: p, model: m });
      if (res && res.valid) {
        lamp.style.background = '#39ff14';
        lamp.style.boxShadow = '0 0 10px #39ff14';
        let detail = (res.resolved_provider && res.resolved_model) ? ` (${getProviderDisplayName(res.resolved_provider)} - ${res.resolved_model})` : '';
        lamp.title = `Test erfolgreich${detail}`;
        
        if (p === 'auto' && res.resolved_provider && res.resolved_model) {
          const provSelect = document.getElementById(`prov-${aName}`);
          if (provSelect) {
            provSelect.value = res.resolved_provider;
            window.updateModels(aName);
            const modSelect = document.getElementById(`mod-${aName}`);
            if (modSelect) {
              modSelect.value = res.resolved_model;
              window.updateAgentCaps(aName);
            }
          }
        }
      } else {
        lamp.style.background = '#ff3333';
        lamp.style.boxShadow = '0 0 10px #ff3333';
        let detail = (res && res.resolved_provider && res.resolved_model) ? ` (Tried ${getProviderDisplayName(res.resolved_provider)} - ${res.resolved_model})` : '';
        lamp.title = (res && res.info) ? `Fehler: ${res.info}${detail}` : `Test fehlgeschlagen${detail}`;
        
        if (p === 'auto' && res && res.resolved_provider && res.resolved_model) {
          const provSelect = document.getElementById(`prov-${aName}`);
          if (provSelect) {
            provSelect.value = res.resolved_provider;
            window.updateModels(aName);
            const modSelect = document.getElementById(`mod-${aName}`);
            if (modSelect) {
              modSelect.value = res.resolved_model;
              window.updateAgentCaps(aName);
            }
          }
        }
      }
    }
  </script>
