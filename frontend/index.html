<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnom-Hub</title>
<style>
/* ═══════════════════════════════════════════
   GNOM-HUB — Premium Glassmorphism UI
   ═══════════════════════════════════════════ */
/* Font loaded via <link> in HTML for non-blocking */

:root {
  --bg-deep: #05050A;
  --bg-surface: #0C0E17;
  --bg-card: rgba(16, 20, 32, 0.7);
  --bg-input: rgba(10, 12, 20, 0.9);
  --glass-border: rgba(91, 156, 246, 0.15);
  --glass-border-hover: rgba(91, 156, 246, 0.4);
  --primary: #0A1128;
  --primary-light: #1A233A;
  --primary-glow: rgba(0, 150, 255, 0.4);
  --green: #39FF14;
  --green-dim: rgba(57, 255, 20, 0.15);
  --red: #FF007F;
  --red-dim: rgba(255, 0, 127, 0.15);
  --blue: #0066FF;
  --blue-dim: rgba(0, 102, 255, 0.15);
  --text: #eef1f6;
  --text-dim: #6b7a90;
  --text-muted: #3d4a5c;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-deep);
  background-image:
    radial-gradient(ellipse at 10% 20%, rgba(176, 38, 255, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(0, 229, 255, 0.08) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  margin: 0; padding: 0;
}

/* ── Status Lamps ── */
.status-lamps {
  display: flex; justify-content: center; gap: 5px;
  padding: 3px 0; background: rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.lamp {
  width: 70px; height: 7px; border-radius: 3.5px;
  opacity: 0.1; transition: all 0.4s; position: relative;
}
.lamp.on {
  opacity: 1;
  animation: lamp-breathe 2s ease-in-out infinite;
}
.lamp.busy {
  opacity: 1;
  animation: lamp-pulse 0.7s ease-in-out infinite;
}
@keyframes lamp-breathe {
  0%, 100% { opacity: 0.5; box-shadow: 0 0 4px currentColor; }
  50% { opacity: 1; box-shadow: 0 0 12px currentColor, 0 0 24px currentColor; }
}
@keyframes lamp-pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; box-shadow: 0 0 16px currentColor, 0 0 32px currentColor; }
}

/* ── Header ── */
header {
  background: rgba(12, 15, 24, 0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--glass-border);
  padding: 10px 24px;
  display: flex; justify-content: space-between; align-items: center;
}
.logo {
  display: flex; align-items: center; gap: 10px; cursor: pointer;
  transition: var(--transition);
}
.logo:hover { opacity: 0.85; }
.logo-mark {
  width: 32px; height: 32px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #0A1128, #050814);
  border: 1px solid rgba(0,150,255,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 800; color: #fff;
  box-shadow: 0 2px 12px var(--primary-glow);
}
.logo-text {
  font-size: 1.2rem; font-weight: 800; letter-spacing: 2px;
  color: #fff;
  text-shadow: 0 0 12px rgba(0, 150, 255, 0.8), 0 0 24px rgba(0, 150, 255, 0.4);
}
.header-right { display: flex; align-items: center; gap: 16px; }
.header-stats {
  display: flex; gap: 20px; font-size: 0.78rem; color: var(--text-dim);
  letter-spacing: 0.5px;
}
.header-stats span { color: var(--primary); font-weight: 600; }

/* ── Buttons ── */
button {
  font-family: inherit; cursor: pointer;
  border: 1px solid var(--glass-border); background: transparent;
  color: var(--text); padding: 7px 16px; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 500;
  transition: var(--transition);
}
button:hover {
  border-color: var(--glass-border-hover);
  background: var(--primary-glow);
}
.btn-primary {
  background: linear-gradient(135deg, #0A1128, #050814);
  border-color: rgba(0,150,255,0.4); color: #fff; font-weight: 600;
  box-shadow: 0 2px 12px var(--primary-glow);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--primary-glow);
}
.btn-danger { color: var(--red); border-color: rgba(255,82,82,0.3); }
.btn-danger:hover { background: var(--red-dim); border-color: var(--red); }

/* ── Layout ── */
.main {
  display: grid; grid-template-columns: 300px 1fr;
  height: calc(100vh - 51px);
}

/* ── Sidebar ── */
.sidebar {
  background: rgba(10, 13, 22, 0.95);
  border-right: 1px solid var(--glass-border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.sidebar-search input {
  width: 100%; padding: 9px 12px;
  background: var(--bg-input); border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 0.82rem; font-family: inherit;
  transition: var(--transition); outline: none;
}
.sidebar-search input:focus { border-color: var(--primary); }
.sidebar-search input::placeholder { color: var(--text-muted); }
.agent-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
.agent-list::-webkit-scrollbar { width: 4px; }
.agent-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

/* ── Agent Cards ── */
.agent-card {
  background: var(--bg-card);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius); padding: 10px 14px;
  margin-bottom: 6px; cursor: pointer;
  transition: var(--transition);
  border-left: 3px solid transparent;
}
.agent-card:hover {
  background: rgba(20, 24, 38, 0.9);
  border-color: rgba(255, 255, 255, 0.15);
}
.agent-card.active {
  background: rgba(61, 220, 132, 0.04);
  border-color: var(--glass-border);
}
.agent-card h3 {
  font-size: 0.88rem; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 3px;
}
.agent-card .desc {
  font-size: 0.72rem; color: var(--text-dim);
  margin-bottom: 6px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.agent-card .meta { display: flex; gap: 6px; flex-wrap: wrap; }
.agent-card.small { padding: 8px 10px; margin-bottom: 4px; }
.agent-card.small h3 { font-size: 0.75rem; margin-bottom: 2px; }
.agent-card.small .desc { font-size: 0.62rem; margin-bottom: 4px; }
.agent-card.small .meta { gap: 4px; }
.agent-card.small .badge { padding: 1px 5px; font-size: 0.6rem; }

/* ── Dots & Badges ── */
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  display: inline-block; flex-shrink: 0;
}
.dot.on {
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: dot-pulse 2.5s ease-in-out infinite;
}
.dot.off { background: var(--red); }
@keyframes dot-pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
}
.badge {
  font-size: 0.65rem; font-weight: 500;
  padding: 2px 8px; border-radius: 10px;
  background: rgba(255,255,255,0.06); color: var(--text-dim);
  letter-spacing: 0.3px;
}
.badge.port { background: var(--green-dim); color: var(--green); }
.badge.role { background: rgba(176,38,255,0.2); color: #B026FF; font-weight: 600; }
.badge.role.general { background: rgba(255,0,127,0.15); color: #FF007F; }
.badge.role.summarizer { background: var(--blue-dim); color: var(--blue); }
.war-room-badge {
  background: linear-gradient(135deg, var(--primary), var(--primary-light)) !important;
  color: var(--bg-deep) !important; font-weight: 700 !important;
  animation: badge-glow 2s ease-in-out infinite;
}
@keyframes badge-glow {
  0%, 100% { box-shadow: 0 0 4px var(--primary-glow); }
  50% { box-shadow: 0 0 12px var(--primary-glow); }
}

/* ── Content Area ── */
.content {
  overflow-y: auto; padding: 20px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.06) transparent;
}
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

/* ── Panels ── */
.panel {
  background: var(--bg-card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 16px;
}
.panel h2 {
  font-size: 1rem; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; letter-spacing: 0.5px;
}
.panel h2 .actions { display: flex; gap: 8px; }

/* ── War Room Chat ── */
#chat-display {
  height: 60vh; overflow-y: auto;
  background: rgba(4, 6, 12, 0.6);
  border: 1px solid rgba(255,255,255,0.04);
  padding: 12px; border-radius: var(--radius);
  margin-bottom: 12px;
  display: flex; flex-direction: column; gap: 6px;
}
#chat-display::-webkit-scrollbar { width: 4px; }
#chat-display::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }

.chat-msg {
  padding: 10px 14px; border-radius: var(--radius-sm);
  background: rgba(20, 24, 38, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-left: 3px solid transparent;
  max-width: 85%; font-size: 0.84rem; line-height: 1.5;
  word-break: break-word; margin-bottom: 6px;
  animation: msg-in 0.25s ease-out;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.chat-msg.user {
  background: rgba(61, 220, 132, 0.05);
  align-self: flex-end;
}
.chat-msg.agent {
  align-self: flex-start;
}
.chat-meta {
  font-size: 0.68rem; color: var(--text-muted);
  margin-bottom: 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.agent-name { font-weight: 700; }
.copy-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 0.7rem; padding: 1px 3px;
  opacity: 0.3; transition: var(--transition);
}
.copy-btn:hover { opacity: 1; color: var(--primary); }

/* ── Chat Input ── */
.chat-bar { display: flex; gap: 8px; align-items: flex-end; }
.chat-input-wrap { position: relative; flex: 1; }
#chat-input {
  width: 100%; min-height: 70px; max-height: 200px; resize: vertical;
  background: var(--bg-input);
  border: 1px solid rgba(0, 150, 255, 0.4);
  color: var(--text); padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem; font-family: inherit; line-height: 1.5;
  outline: none; transition: var(--transition);
}
#chat-input:focus { border-color: var(--primary); }
#chat-input::placeholder { color: var(--text-muted); }

/* ── Autocomplete ── */
.ac-dropdown {
  position: absolute; bottom: 100%; left: 0;
  background: rgba(18, 22, 36, 0.98);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  max-height: 180px; overflow-y: auto;
  z-index: 100; min-width: 200px;
  display: none;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}
.ac-dropdown.show { display: block; }
.ac-item {
  padding: 8px 14px; cursor: pointer;
  font-size: 0.82rem; color: var(--text-dim);
  transition: var(--transition);
}
.ac-item:hover, .ac-item.active {
  background: rgba(61, 220, 132, 0.1); color: var(--text);
}

/* ── Mic Button ── */
#mic-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: transparent; border: 1px solid var(--glass-border);
  font-size: 1.1rem; cursor: pointer;
  transition: var(--transition); flex-shrink: 0;
}
#mic-btn:hover { border-color: var(--primary); }
#mic-btn.active {
  background: var(--red); border-color: var(--red);
  box-shadow: 0 0 16px rgba(255,82,82,0.4);
  animation: mic-pulse 1.2s ease-in-out infinite;
}
@keyframes mic-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

/* ── Chat Hints ── */
.chat-hints {
  font-size: 0.65rem; color: var(--text-muted);
  padding: 6px 2px; display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 6px;
}
.chat-hints span {
  background: rgba(255,255,255,0.04);
  color: var(--blue); padding: 2px 6px;
  border-radius: 4px; font-family: 'SF Mono', monospace;
  font-size: 0.62rem;
}

/* ── Memory Items ── */
.mem-item {
  background: rgba(8, 10, 18, 0.7);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius-sm); padding: 12px;
  margin-bottom: 6px;
  transition: var(--transition);
}
.mem-item:hover { border-color: rgba(255,255,255,0.08); }
.mem-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px; font-size: 0.72rem; color: var(--text-muted);
}
.mem-content {
  font-size: 0.84rem; line-height: 1.5;
  white-space: pre-wrap; word-break: break-word;
}
.mem-item textarea {
  width: 100%; background: var(--bg-input);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text); padding: 8px; border-radius: 6px;
  font-size: 0.84rem; resize: vertical; min-height: 60px;
  font-family: inherit; outline: none;
}
.add-mem { display: flex; gap: 8px; margin-bottom: 14px; }
.add-mem textarea {
  flex: 1; background: var(--bg-input);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text); padding: 9px 12px; border-radius: var(--radius-sm);
  font-size: 0.84rem; resize: vertical; min-height: 50px;
  font-family: inherit; outline: none; transition: var(--transition);
}
.add-mem textarea:focus { border-color: var(--primary); }
.mem-search { margin-bottom: 10px; }
.mem-search input {
  width: 100%; padding: 9px 12px;
  background: var(--bg-input); border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 0.82rem; font-family: inherit;
  outline: none; transition: var(--transition);
}
.mem-search input:focus { border-color: var(--primary); }

/* ── Agent Detail ── */
.status-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.status-row .label { font-size: 0.82rem; color: var(--text-dim); }
.empty { color: var(--text-muted); font-size: 0.84rem; padding: 24px; text-align: center; }

/* ── Modal ── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  display: none; justify-content: center; align-items: center;
  z-index: 100;
}
.modal-bg.show { display: flex; }
.modal {
  background: rgba(18, 22, 36, 0.98);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 24px;
  width: 420px; max-width: 90vw;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  animation: modal-in 0.2s ease-out;
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal h2 { margin-bottom: 16px; font-size: 1.05rem; font-weight: 600; }
.modal label {
  display: block; font-size: 0.78rem; color: var(--text-dim);
  margin: 12px 0 4px; letter-spacing: 0.3px;
}
.modal input {
  width: 100%; padding: 9px 12px;
  background: var(--bg-input); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm); color: var(--text);
  font-size: 0.84rem; font-family: inherit; outline: none;
  transition: var(--transition);
}
.modal input:focus { border-color: var(--primary); }
.modal .btns {
  display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
}

/* ── iframe ── */
iframe {
  width: 100%; height: calc(100vh - 140px);
  border: none; border-radius: var(--radius-sm);
  background: rgba(0,0,0,0.3);
}

/* ── Toasts ── */
.toast-container {
  position: fixed; top: 16px; right: 16px;
  z-index: 200; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 0.8rem; color: #fff;
  animation: toast-in 0.3s ease-out;
  max-width: 380px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}
.toast.success { background: rgba(46,125,50,0.9); border-left: 2px solid var(--green); }
.toast.error { background: rgba(198,40,40,0.9); border-left: 2px solid var(--red); }
.toast.info { background: rgba(21,101,192,0.9); border-left: 2px solid var(--blue); }
@keyframes toast-in {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ── Flash Animation ── */
@keyframes flash-primary {
  0% { background: rgba(226,168,86,0.2); }
  100% { background: transparent; }
}
.nudge-active { animation: flash-primary 0.8s ease-out; }

/* ── Scrollbar global ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

</style>
</head>
<body>
<div class="status-lamps" id="status-lamps"></div>
<header>
  <div class="logo" onclick="showWarRoom()">
    <div class="logo-mark">G</div>
    <div class="logo-text">GNOM-HUB</div>
  </div>
  <div class="header-right">
    <div class="header-stats">
      Agents: <span id="s-agents">0</span>
      Memory: <span id="s-memory">0</span>
    </div>
    <button class="btn-primary" onclick="openAddAgent()">+ Agent</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="agent-search" placeholder="Agenten suchen…" oninput="filterAgents(this.value)">
    </div>
    <div class="agent-list" id="agent-list"></div>
  </div>

  <div class="content" id="content">
    <!-- War Room rendered here by showWarRoom() -->
  </div>
</div>

<!-- Register Agent Modal -->
<div class="modal-bg" id="modal-add">
  <div class="modal">
    <h2>Agent registrieren</h2>
    <label>Name</label>
    <input id="add-name" placeholder="z.B. Hermes">
    <label>Port</label>
    <input id="add-port" type="number" placeholder="z.B. 9119">
    <label>Beschreibung</label>
    <input id="add-desc" placeholder="z.B. Chat-Agent">
    <div class="btns">
      <button onclick="closeModal('modal-add')">Abbrechen</button>
      <button class="btn-primary" onclick="doRegister()">Registrieren</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toasts"></div>

<script>
/* ═══════════════════════════════════════════
   GNOM-HUB — Core Logic
   ═══════════════════════════════════════════ */

// ── Toast ──
function toast(msg, type='info') {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(() => t.remove(), 300); }, 3500);
}

// ── API Discovery ──
let API = '';
let agents = [];
let selectedId = null;

async function discoverPort() {
  if (location.protocol !== 'file:') { API = location.origin + '/api'; return; }
  for (const p of [3002, 3001, 3000]) {
    try {
      const r = await fetch(`http://127.0.0.1:${p}/api/stats`, {signal: AbortSignal.timeout(800)});
      if (r.ok) { API = `http://127.0.0.1:${p}/api`; return; }
    } catch(e) {}
  }
}

async function api(method, path, body) {
  try {
    const opts = {method, headers: {'Content-Type':'application/json'}};
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    if (!r.ok) throw new Error(r.status);
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  } catch(e) { console.error('API:', path, e); return null; }
}

// ── Colors ──
const P_COLORS = ['#00E5FF', '#B026FF', '#FF007F', '#39FF14', '#FF3366', '#8A2BE2', '#0066FF', '#00FF9D', '#FF9900', '#FFD700', '#FF1493', '#00FA9A', '#1E90FF', '#FF4500', '#00FFFF'];
const KNOWN_COLORS = {
  'generalag': '#00FFFF',    // Cyan
  'summarizerag': '#FF00FF', // Magenta
  'cronjobag': '#FFA500',    // Orange
  'backupag': '#00FF00',     // Lime Green
  'skillsag': '#FFFF00',     // Yellow
  'soulag': '#FF0000',       // Red
  'watchdogag': '#FF69B4',   // Hot Pink
  'tinyag': '#FFFFFF',       // White
  'testag1': '#0000FF',      // Pure Blue
  'testag2': '#800080',      // Deep Purple
  'testag3': '#008080',      // Teal
  'hermes-agent': '#8B4513'  // Brown
};
function agentColor(name) {
  if (!name) return '#00E5FF';
  const n = name.toLowerCase();
  if (KNOWN_COLORS[n]) return KNOWN_COLORS[n];
  let h = 5381; for (let i = 0; i < name.length; i++) h = ((h << 5) + h) + name.charCodeAt(i);
  return P_COLORS[Math.abs(h) % P_COLORS.length];
}
function groupColor(g) {
  if (!g) return null;
  let h = 5381; for (let i = 0; i < g.length; i++) h = ((h << 5) + h) + g.charCodeAt(i);
  return P_COLORS[Math.abs(h) % P_COLORS.length];
}

// ── Agents ──
async function loadAgents() {
  const res = await api('GET', '/agents');
  agents = Array.isArray(res) ? res : (res?.agents || []);
  updateStats();
  renderAgentList();
}

function renderAgentList(filter = '') {
  const el = document.getElementById('agent-list');
  const f = filter.toLowerCase();
  let filtered = f ? agents.filter(a => a.name.toLowerCase().includes(f)) : agents;
  
  // Hide the Hermes gateway from the UI entirely
  filtered = filtered.filter(a => !a.name.toLowerCase().includes('hermes'));

  if (!filtered.length) { el.innerHTML = '<div class="empty">Keine Agenten.</div>'; return; }

  const renderCard = (a) => {
    const on = a.status === 'online';
    const role = a.role && a.role !== 'normal' ? a.role : '';
    const roleIcon = role === 'general' ? ' 👑' : role === 'summarizer' ? ' 📋' : '';
    const c = agentColor(a.name);
    const isTestAG = a.name.toLowerCase().startsWith('testag');
    const nameColor = isTestAG ? '#0066FF' : 'inherit';
    const smallClass = isTestAG ? 'small' : '';
    return `<div class="agent-card ${smallClass} ${a.id === selectedId ? 'active' : ''}" id="card-${a.id}" onclick="selectAgent('${a.id}')" style="border-left-color:${c};">
      <h3><span class="dot ${on?'on':'off'}"></span><span style="color:${nameColor}">${a.name}</span>${roleIcon}</h3>
      <div class="desc">${a.description || '–'}</div>
      <div class="meta"><span class="badge">${on?'online':'offline'}</span>${a.port?`<span class="badge port">:${a.port}</span>`:''}${role?`<span class="badge role ${role}">${role}</span>`:''}</div>
    </div>`;
  };

  el.innerHTML = filtered.map(renderCard).join('');
}

function filterAgents(q) { renderAgentList(q); }

// ── Agent Detail ──
async function selectAgent(id) {
  selectedId = id;
  renderAgentList(document.getElementById('agent-search').value);
  const agent = agents.find(a => a.id === id);
  if (!agent) return;

  const on = agent.status === 'online';
  const port = agent.port;
  const openUiBtn = port ? `<button onclick="openAgentUI('${agent.name}','${port}')">🖥 Open UI</button>` : '';
  const nudgeBtn = on ? `<button onclick="doNudge('${agent.id}')">📢 Nudge</button>` : '';
  const ls = agent.last_seen ? new Date(agent.last_seen).toLocaleString() : '–';

  document.getElementById('content').innerHTML = `
    <div class="panel">
      <h2>${agent.name} <div class="actions">
        ${openUiBtn} ${nudgeBtn}
        <button onclick="toggleStatus('${agent.id}','${agent.status}')">${on ? '⏹ Offline' : '▶ Online'}</button>
        <button class="btn-danger" onclick="deleteAgent('${agent.id}')">Löschen</button>
      </div></h2>
      <div class="status-row">
        <span class="dot ${on?'on':'off'}"></span><span class="label">${on?'Online':'Offline'}</span>
        ${port ? `<span class="badge port">:${port}</span>` : ''}
        <span class="label">Last seen: ${ls}</span>
      </div>
    </div>
    <div class="panel">
      <h2>Memory <div class="actions">
        <button class="btn-danger" onclick="clearMemory('${agent.id}')">Alle löschen</button>
      </div></h2>
      <div class="add-mem">
        <textarea id="new-mem" placeholder="Neuen Memory-Eintrag…"></textarea>
        <button class="btn-primary" onclick="addMemory('${agent.id}')" style="align-self:flex-end">Speichern</button>
      </div>
      <div class="mem-search"><input placeholder="Memories durchsuchen…" oninput="searchAgentMem('${agent.id}',this.value)"></div>
      <div id="mem-list"><div class="empty">Lade…</div></div>
    </div>
    <div id="agent-ui-frame"></div>`;
  loadAgentMemory(agent.id);
}

async function loadAgentMemory(agentId) {
  const el = document.getElementById('mem-list');
  const mems = await api('GET', `/agents/${agentId}/memory`);
  renderMemories(el, mems);
}

async function searchAgentMem(agentId, q) {
  const el = document.getElementById('mem-list');
  if (!q) return loadAgentMemory(agentId);
  const all = await api('GET', `/agents/${agentId}/memory`);
  const filtered = (all||[]).filter(m => (m.content||'').toLowerCase().includes(q.toLowerCase()));
  renderMemories(el, filtered);
}

function renderMemories(el, mems) {
  if (!mems || !mems.length) { el.innerHTML = '<div class="empty">Keine Einträge.</div>'; return; }
  el.innerHTML = mems.map(m => {
    const d = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
    return `<div class="mem-item" id="mem-${m.id}">
      <div class="mem-head"><span>${d}</span><div>
        <button onclick="editMem('${m.id}')">✏</button>
        <button class="btn-danger" onclick="deleteMem('${m.id}')">✕</button>
      </div></div>
      <div class="mem-content" id="mc-${m.id}">${m.content||''}</div>
    </div>`;
  }).join('');
}

async function addMemory(agentId) {
  const ta = document.getElementById('new-mem');
  const c = ta.value.trim();
  if (!c) return;
  await api('POST', '/memory', {agent_id: agentId, content: c});
  ta.value = '';
  loadAgentMemory(agentId);
  updateStats();
}

function editMem(id) {
  const el = document.getElementById('mc-' + id);
  const old = el.innerText;
  el.innerHTML = `<textarea id="ed-${id}">${old}</textarea>
    <div style="margin-top:6px;display:flex;gap:6px;justify-content:flex-end">
      <button onclick="selectAgent(selectedId)">Abbrechen</button>
      <button class="btn-primary" onclick="saveMem('${id}')">Speichern</button>
    </div>`;
}

async function saveMem(id) {
  const c = document.getElementById('ed-' + id).value;
  await fetch(API + `/memory/${id}?content=${encodeURIComponent(c)}`, {method:'PUT'});
  selectAgent(selectedId);
}

async function deleteMem(id) {
  await api('DELETE', `/memory/${id}`);
  selectAgent(selectedId);
  updateStats();
}

async function clearMemory(agentId) {
  if (!confirm('Alle Memories löschen?')) return;
  await api('DELETE', `/agents/${agentId}/memory`);
  selectAgent(selectedId);
  updateStats();
}

// ── Agent Actions ──
async function toggleStatus(id, current) {
  const next = current === 'online' ? 'offline' : 'online';
  await fetch(API + `/agents/${id}/status?status=${next}`, {method:'PUT'});
  await loadAgents();
  selectAgent(id);
}

async function deleteAgent(id) {
  if (!confirm('Agent und alle Memories löschen?')) return;
  await api('DELETE', `/agents/${id}`);
  selectedId = null;
  showWarRoom();
  await loadAgents();
}

function openAgentUI(name, port) {
  const frame = document.getElementById('agent-ui-frame');
  if (frame.innerHTML) { frame.innerHTML = ''; return; }
  frame.innerHTML = `<div class="panel"><h2>🖥 ${name} <div class="actions"><button onclick="document.getElementById('agent-ui-frame').innerHTML=''">Schließen</button>
    <button onclick="window.open('http://127.0.0.1:${port}','_blank')">↗ Tab</button></div></h2>
    <iframe src="http://127.0.0.1:${port}"></iframe></div>`;
}

// ── Register ──
function openAddAgent() { document.getElementById('modal-add').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
async function doRegister() {
  const n = document.getElementById('add-name').value.trim();
  const p = parseInt(document.getElementById('add-port').value) || 0;
  const d = document.getElementById('add-desc').value.trim();
  if (!n || !p) { alert('Name und Port sind Pflicht.'); return; }
  await api('POST', '/agents/register', {name: n, port: p, description: d});
  document.getElementById('add-name').value = '';
  document.getElementById('add-port').value = '';
  document.getElementById('add-desc').value = '';
  closeModal('modal-add');
  await loadAgents();
}

// ── Nudge ──
async function doNudge(id) {
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('nudge-active'); setTimeout(() => card.classList.remove('nudge-active'), 800); }
  await api('POST', `/agents/${id}/nudge`);
}

// ── Stats ──
async function updateStats() {
  const s = await api('GET', '/stats');
  if (s) {
    document.getElementById('s-agents').textContent = s.agents ?? agents.length;
    document.getElementById('s-memory').textContent = s.memory ?? 0;
  }
}

// ── Autocomplete ──
const BUILTIN_CMDS = ['bs','general','summarizer','normal','recherche','job','idea','status','clear'];
let acIdx = -1;

function onChatInput(ta) {
  const dd = document.getElementById('ac-dropdown');
  if (!dd) return;
  const val = ta.value, m = val.match(/@(\w*)$/);
  if (!m) { dd.classList.remove('show'); return; }
  const q = m[1].toLowerCase();
  const agentNames = agents.map(a => a.name);
  const all = [...BUILTIN_CMDS, ...agentNames].filter(n => n.toLowerCase().startsWith(q));
  if (!all.length || (all.length === 1 && all[0].toLowerCase() === q)) { dd.classList.remove('show'); return; }
  acIdx = -1;
  dd.innerHTML = all.map(n => `<div class="ac-item" onmousedown="pickAc('${n}')">${BUILTIN_CMDS.includes(n) ? '@'+n : '@ '+n}</div>`).join('');
  dd.classList.add('show');
}

function pickAc(name) {
  const ta = document.getElementById('chat-input');
  ta.value = ta.value.replace(/@\w*$/, '@' + name + ' ');
  document.getElementById('ac-dropdown').classList.remove('show');
  ta.focus();
}

function onChatKey(e) {
  const dd = document.getElementById('ac-dropdown');
  if (!dd) return;
  const items = dd.querySelectorAll('.ac-item');
  if (dd.classList.contains('show') && items.length) {
    if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('active', i===acIdx)); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx-1, 0); items.forEach((el,i) => el.classList.toggle('active', i===acIdx)); return; }
    if (e.key === 'Tab' || (e.key === 'Enter' && acIdx >= 0)) { e.preventDefault(); pickAc(items[acIdx]?.textContent.replace(/^@\s?/,'') || ''); return; }
    if (e.key === 'Escape') { dd.classList.remove('show'); return; }
  }
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

// ── Chat ──
async function sendChat() {
  const ta = document.getElementById('chat-input');
  if (!ta) return;
  const msg = ta.value.trim();
  if (!msg) return;
  ta.value = '';
  document.getElementById('ac-dropdown')?.classList.remove('show');
  const res = await api('POST', '/chat', {content: msg});
  if (res) {
    if (res.status === 'role_set') toast(`👑 ${res.agent} → ${res.role}`, 'success');
    else if (res.status === 'idea_saved') toast('💡 Idee gespeichert', 'success');
    else if (res.status === 'job_created') toast(`📋 Job → ${res.general}: ${res.task?.substring(0,60)}`, 'success');
    else if (res.msg) toast(`⚠️ ${res.msg}`, 'error');
    else if (res.status === 'cleared') toast('🗑 Chat geleert', 'success');
    else if (res.status === 'agents') toast(`📊 ${res.agents.map(a => a.name+'('+a.role+')').join(', ')}`, 'info');
    else { const target = res.target ? `→ ${res.target}` : `→ ${(res.asked||[]).join(', ') || 'niemand'}`; toast(`${res.mode==='brainstorm'?'🧠':res.mode==='recherche'?'🔍':'💬'} ${target}`, 'success'); }
    refreshChat(); loadAgents();
  } else { toast('Hub nicht erreichbar', 'error'); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function refreshChat() {
  const el = document.getElementById('chat-display');
  if (!el) return;
  const msgs = await api('GET', '/chat?limit=20');
  
  // Prevent DOM rebuild if messages haven't changed
  const dataStr = JSON.stringify(msgs || []);
  if (window._lastChatData === dataStr) return;
  window._lastChatData = dataStr;

  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;

  if (!msgs || !msgs.length) { el.innerHTML = '<div class="empty">Noch keine Nachrichten.</div>'; return; }
  const sorted = msgs.sort((a,b) => (a.timestamp||'').localeCompare(b.timestamp||''));
  el.innerHTML = sorted.map(m => {
    const isUser = m.metadata?.sender === 'user';
    const name = isUser ? 'Du' : (m.metadata?.sender || 'System');
    const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '';
    const c = isUser ? 'var(--primary)' : agentColor(name);
    const nameColor = isUser ? 'var(--primary)' : (name.toLowerCase().startsWith('testag') ? '#0066FF' : 'inherit');
    const mid = m.id || Math.random().toString(36).slice(2);
    const safe = esc(m.content).replace(/\n/g, '<br>');
    return `<div class="chat-msg ${isUser?'user':'agent'}" style="border-left-color:${c};">
      <div class="chat-meta"><span class="agent-name" style="color:${nameColor}">${esc(name)}</span><span><button class="copy-btn" onclick="copyMsg('${mid}')" title="Kopieren">📋</button>${time}</span></div>
      <div class="mem-content" id="msg-${mid}">${safe}</div></div>`;
  }).join('');
  
  if (wasAtBottom || !window._chatInitialized) {
    el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
    window._chatInitialized = true;
  }

  // TTS
  if (!window._spokenIds) window._spokenIds = new Set();
  sorted.filter(m => m.metadata?.sender !== 'user' && !window._spokenIds.has(m.id)).forEach(m => {
    window._spokenIds.add(m.id);
    speak(`${m.metadata?.sender || 'System'} sagt: ${m.content}`);
  });
}

function copyMsg(id) {
  const el = document.getElementById('msg-' + id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = el.parentElement.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✅'; setTimeout(() => btn.textContent = '📋', 1200); }
  });
}

// ── TTS Queue ──
const _ttsQ = []; let _ttsBusy = false;
async function speak(text, agentId='') {
  if (!document.getElementById('tts-enabled')?.checked) return;
  _ttsQ.push({text, agentId});
  if (_ttsBusy) return;
  _ttsBusy = true;
  while (_ttsQ.length) {
    const {text: t, agentId: a} = _ttsQ.shift();
    speechSynthesis.cancel();
    try {
      const r = await fetch(`${API}/audio/tts`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text:t, agent_id:a})});
      if (r.ok && r.headers.get('content-type')?.includes('audio')) {
        const audio = new Audio(URL.createObjectURL(await r.blob()));
        await new Promise(ok => { audio.onended = ok; audio.onerror = ok; audio.play(); }); continue;
      }
    } catch {}
    const u = new SpeechSynthesisUtterance(t); u.lang = 'de-DE'; u.rate = 1.0;
    await new Promise(ok => { u.onend = ok; u.onerror = ok; speechSynthesis.speak(u); });
  }
  _ttsBusy = false;
}

// ── STT ──
let recognition;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true; recognition.lang = 'de-DE';
  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript + ' ';
    const inp = document.getElementById('chat-input');
    if (inp) inp.value = text.trim();
  };
  recognition.onerror = () => document.getElementById('mic-btn')?.classList.remove('active');
  recognition.onend = () => document.getElementById('mic-btn')?.classList.remove('active');
}
function toggleSTT() {
  const btn = document.getElementById('mic-btn');
  if (!recognition) { toast('Browser unterstützt keine Spracheingabe', 'error'); return; }
  if (btn.classList.contains('active')) { recognition.stop(); btn.classList.remove('active'); }
  else { recognition.start(); btn.classList.add('active'); }
}

// ── Status Lamps ──
let _lastInternals = '';
function updateLamps(hubAgents) {
  const el = document.getElementById('status-lamps');
  if (!hubAgents) return;
  
  const names = hubAgents.map(a => a.name).join(',');
  if (_lastInternals !== names) {
    el.innerHTML = hubAgents.map(a => {
      const d = (Math.random() * 2).toFixed(2);
      const col = agentColor(a.name);
      return `<div class="lamp" data-ag="${a.name}" title="${a.name}" style="color:${col};background:${col};animation-delay:-${d}s"></div>`;
    }).join('');
    _lastInternals = names;
  }
  
  el.querySelectorAll('.lamp').forEach(l => {
    const key = l.dataset.ag;
    const agent = hubAgents.find(a => a.name === key);
    const st = agent?.status || 'offline';
    l.className = st === 'busy' ? 'lamp busy' : st === 'online' ? 'lamp on' : 'lamp';
  });
}

  }
  await loadAgents();

    renderAgentList(document.getElementById('agent-search').value);
    updateStats();
    updateLamps(agents);
  }, 10000);
  setInterval(refreshChat, 3000);
})();
