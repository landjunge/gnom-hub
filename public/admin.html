<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnom-Hub Admin — Agent Management</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg-panel: rgba(15, 20, 25, 0.7);
      --bg-card: rgba(20, 25, 30, 0.8);
      --bg-input: rgba(0, 0, 0, 0.5);
      --border: rgba(255, 255, 255, 0.1);
      --border-bright: rgba(255, 255, 255, 0.2);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --text-bright: #ffffff;
      --cyan: #06b6d4;
      --cyan-dim: rgba(6, 182, 212, 0.1);
      --emerald: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --radius: 8px;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    body { 
      background-color: #050505; 
      color: var(--text); 
      font-family: var(--font-sans); 
      margin: 0; 
      padding: 0; 
      overflow-y: scroll;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--cyan);
    }
    .admin-layout { 
      padding: 30px; 
      max-width: 1200px; 
      margin: 0 auto; 
    }
    .admin-grid { 
      display: grid; 
      grid-template-columns: 2fr 1fr; 
      gap: 25px; 
    }
    @media (max-width: 900px) { 
      .admin-grid { grid-template-columns: 1fr; } 
    }
    .panel { 
      background: var(--bg-panel); 
      border: 1px solid var(--border); 
      border-radius: var(--radius); 
      backdrop-filter: blur(20px); 
      display: flex;
      flex-direction: column;
    }
    .panel-header { 
      padding: 15px 20px; 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      background: rgba(255,255,255,0.02);
    }
    .panel-header h2 { 
      margin: 0;
      font-family: var(--font-mono); 
      font-size: 13px; 
      letter-spacing: 1.5px; 
      color: var(--cyan); 
    }
    .panel-body { 
      padding: 20px; 
    }
    
    /* Agent List Styles */
    .agent-row { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      padding: 15px; 
      border-radius: var(--radius); 
      border: 1px solid var(--border); 
      margin-bottom: 10px; 
      background: var(--bg-card); 
      transition: all 0.2s; 
    }
    .agent-row:hover { 
      border-color: var(--border-bright); 
      transform: translateY(-1px);
    }
    .agent-row .icon { 
      font-size: 24px; 
      width: 40px; 
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .agent-row .info { 
      flex: 1; 
      min-width: 0; 
    }
    .agent-row .info .name { 
      font-weight: 600; 
      font-size: 15px; 
      color: var(--text-bright);
    }
    .agent-row .info .detail { 
      font-size: 12px; 
      color: var(--text-dim); 
      font-family: var(--font-mono); 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      margin-top: 5px; 
    }
    .dot { 
      width: 8px; 
      height: 8px; 
      border-radius: 50%; 
      flex-shrink: 0; 
    }
    .dot.on { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
    .dot.off { background: var(--red); box-shadow: 0 0 8px var(--red); }
    
    .agent-row .actions { 
      display: flex; 
      gap: 8px; 
      flex-shrink: 0; 
    }
    
    /* Buttons */
    .btn { 
      padding: 8px 14px; 
      border-radius: 6px; 
      border: 1px solid var(--border); 
      background: rgba(255,255,255,0.03); 
      color: var(--text-bright); 
      font-size: 12px; 
      font-weight: 500;
      cursor: pointer; 
      font-family: var(--font-sans); 
      transition: all 0.2s; 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:hover { 
      background: rgba(255,255,255,0.08); 
    }
    .btn-start { border-color: var(--emerald); color: var(--emerald); background: rgba(16,185,129,0.1); }
    .btn-start:hover { background: rgba(16,185,129,0.2); }
    .btn-stop { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.1); }
    .btn-stop:hover { background: rgba(239,68,68,0.2); }
    .btn-restart { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.1); }
    .btn-restart:hover { background: rgba(245,158,11,0.2); }
    .btn-webui { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
    .btn-webui:hover { background: rgba(6,182,212,0.2); }
    .btn-delete { border-color: transparent; color: var(--text-dim); padding: 8px; }
    .btn-delete:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* Form Styles */
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-row { 
      display: flex; 
      gap: 12px; 
      margin-bottom: 12px; 
    }
    .form-control { 
      width: 100%; 
      padding: 10px 14px; 
      border-radius: 6px; 
      background: var(--bg-input); 
      border: 1px solid var(--border); 
      color: var(--text-bright); 
      font-family: var(--font-sans); 
      font-size: 13px; 
      outline: none; 
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-control:focus { 
      border-color: var(--cyan); 
    }
    .form-control::placeholder { 
      color: rgba(255,255,255,0.2); 
    }

    /* Autocomplete */
    .search-wrapper { position: relative; margin-bottom: 25px; }
    .search-icon { position: absolute; left: 14px; top: 12px; font-size: 14px; opacity: 0.5; }
    .search-input { padding-left: 40px !important; border-color: var(--cyan) !important; box-shadow: 0 0 10px rgba(6,182,212,0.1); font-size: 14px !important; }
    .autocomplete-list { 
      position: absolute; 
      top: 100%; 
      left: 0; 
      right: 0; 
      z-index: 100; 
      background: rgba(20, 25, 30, 0.95); 
      border: 1px solid var(--cyan); 
      border-top: none; 
      border-radius: 0 0 8px 8px; 
      max-height: 250px; 
      overflow-y: auto; 
      display: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .autocomplete-item { 
      padding: 12px 15px; 
      cursor: pointer; 
      border-bottom: 1px solid rgba(255,255,255,0.05); 
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .autocomplete-item:hover { 
      background: rgba(6,182,212,0.15); 
    }
    .autocomplete-item:last-child { 
      border-bottom: none; 
    }
    
    .status-msg {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }

    /* Log Output */
    .log-box {
      background: #000;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      height: 150px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log-line { margin-bottom: 4px; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 2px; }
    .log-ok { color: var(--emerald); }
    .log-err { color: var(--red); }
    .log-warn { color: var(--amber); }

  </style>
</head>
<body>
  <header class="header">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 20px;">⚙️</span>
      <h1>GNOM-HUB ADMIN</h1>
    </div>
    <div style="color: var(--text-dim); font-family: var(--font-mono); font-size: 13px;" id="clock">--:--:--</div>
  </header>

  <div class="admin-layout">
    <div class="admin-grid">
      
      <!-- LEFT COLUMN: AGENT OVERVIEW -->
      <div class="panel">
        <div class="panel-header">
          <h2>◆ LAUFENDE AGENTEN</h2>
          <button class="btn" onclick="refreshAgents()">⟳ Refresh</button>
        </div>
        <div class="panel-body" id="agentList">
          <div style="color: var(--text-dim); text-align: center; padding: 40px 0;">Agenten werden geladen...</div>
        </div>
        
        <div class="panel-header" style="border-top: 1px solid var(--border); border-bottom: none; margin-top: auto;">
          <h2>◆ SYSTEM LOG</h2>
        </div>
        <div class="panel-body" style="padding-top: 0;">
          <div class="log-box" id="systemLog"></div>
        </div>
      </div>

      <!-- RIGHT COLUMN: ADD AGENT -->
      <div class="panel">
        <div class="panel-header">
          <h2>◆ NEUEN AGENTEN HINZUFÜGEN</h2>
        </div>
        <div class="panel-body">
          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="agentSearch" class="form-control search-input" placeholder="Suchen (z.B. Hermes, Cortex, Paperclip)..." autocomplete="off">
            <div id="autocompleteList" class="autocomplete-list"></div>
          </div>

          <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.03);">
            <div class="form-row">
              <div style="flex: 2;">
                <label>Agent ID</label>
                <input id="formId" class="form-control" placeholder="z.B. hermes">
              </div>
              <div style="flex: 3;">
                <label>Anzeige-Name</label>
                <input id="formName" class="form-control" placeholder="z.B. Hermes">
              </div>
              <div style="flex: 1;">
                <label>Icon</label>
                <input id="formIcon" class="form-control" placeholder="🔮">
              </div>
            </div>

            <div class="form-row">
              <div style="flex: 1;">
                <label>Backend Port</label>
                <input id="formPort" type="number" class="form-control" placeholder="z.B. 8787">
              </div>
              <div style="flex: 1;">
                <label>WebUI Port (Optional)</label>
                <input id="formWebUI" type="number" class="form-control" placeholder="z.B. 13100">
              </div>
            </div>

            <div class="form-group">
              <label>Ordner / Pfad</label>
              <input id="formDir" class="form-control" placeholder="z.B. ~/.hermes">
            </div>

            <div class="form-group">
              <label>Start-Befehl</label>
              <input id="formCmd" class="form-control" placeholder="z.B. hermes --gateway">
            </div>

            <button type="button" class="btn btn-start" style="width: 100%; padding: 12px; font-size: 14px; margin-top: 10px;" onclick="event.preventDefault(); saveAgent()">
              + Agent in die Registry aufnehmen
            </button>
            <div id="saveResult" class="status-msg"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

<script>
// ==== DATA FROM AGENTS.MD ====
const AGENT_PRESETS = [
  { id: 'hermes',      name: 'Hermes',           icon: '🔮', port: 8787,  webui_port: '', dir: '~/.hermes', start_cmd: 'hermes --gateway', desc: 'AI Gateway & Agent Runtime' },
  { id: 'cortex',      name: 'Cortex Hub',       icon: '🧠', port: 3002,  webui_port: 3102, dir: '~/Documents/AG-Flega/cortex', start_cmd: 'cd ~/Documents/AG-Flega/cortex && node index.js', desc: 'Zentrales Gedächtnis & Filter' },
  { id: 'openclaw',    name: 'OpenClaw',         icon: '🐾', port: null,  webui_port: '', dir: '~/.openclaw', start_cmd: 'openclaw', desc: 'Autonomer Agent + Telegram' },
  { id: 'paperclip',   name: 'Paperclip',        icon: '📎', port: 3100,  webui_port: 13100, dir: '~/workspace/paperclip', start_cmd: 'cd ~/workspace/paperclip && pnpm run dev', desc: 'Task-Management & Plattform' },
  { id: 'antigravity', name: 'Antigravity',      icon: '🧪', port: null,  webui_port: '', dir: '/Applications/Antigravity.app', start_cmd: 'open -a Antigravity', desc: 'Google IDE Agent' },
  { id: 'tandem',      name: 'Tandem',           icon: '🌐', port: 8765,  webui_port: '', dir: '~/hermes-webui/tandem-browser', start_cmd: 'cd ~/hermes-webui/tandem-browser && npm start', desc: 'Electron AI Browser' },
];

// ==== CLOCK ====
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE');
}, 1000);

// ==== API HELPER ====
async function api(url, opts = {}) {
  try {
    const res = await fetch(url, { headers: {'Content-Type':'application/json'}, ...opts });
    return await res.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

function esc(s) { 
  const d = document.createElement('div'); 
  d.textContent = s; 
  return d.innerHTML; 
}

function systemLog(msg, type='ok') {
  const el = document.getElementById('systemLog');
  const time = new Date().toLocaleTimeString('de-DE');
  el.innerHTML = `<div class="log-line log-${type}">[${time}] ${esc(msg)}</div>` + el.innerHTML;
}

// ==== AGENT MANAGEMENT ====
let agentsConfig = {};

async function refreshAgents() {
  const listEl = document.getElementById('agentList');
  listEl.innerHTML = '<div style="color: var(--text-dim); text-align: center; padding: 20px;">Lade...</div>';
  
  const [config, statusResp] = await Promise.all([
    api('/api/agents/config'),
    api('/api/status')
  ]);

  if (!config) {
    listEl.innerHTML = '<div style="color: var(--red); padding: 20px;">Fehler beim Laden der Agenten.</div>';
    return;
  }

  agentsConfig = config;
  const liveAgents = statusResp.agents || [];
  
  try {
    let html = '';
    const entries = Object.entries(config);
    
    if (entries.length === 0) {
      html = '<div style="color: var(--text-dim); text-align: center; padding: 40px 0;">Keine Agenten in der Registry vorhanden.</div>';
    } else {
      for (const [id, meta] of entries) {
        // Match against live status from /api/status (which now does real port checks)
        const liveInfo = liveAgents.find(a => a.id && a.id.toLowerCase() === id.toLowerCase());
        const isRunning = liveInfo ? (liveInfo.status === 'running' || liveInfo.portAlive === true) : false;
        const statusLabel = isRunning ? 'Aktiv' : 'Gestoppt';
        
        const portText = meta.port ? `Port ${meta.port}` : 'Kein Port';
        const webuiText = meta.webui_port ? ` · WebUI ${meta.webui_port}` : '';
        
        html += `
          <div class="agent-row">
            <div class="icon">${meta.icon || '🤖'}</div>
            <div class="info">
              <div class="name">${esc(meta.name)} <span style="font-size:11px; color:var(--text-dim); font-weight:normal;">(${esc(id)})</span></div>
              <div class="detail">
                <span class="dot ${isRunning ? 'on' : 'off'}"></span>
                <span>${statusLabel}</span>
                <span style="opacity:0.5; margin:0 5px;">|</span>
                <span>${portText}${webuiText}</span>
              </div>
            </div>
            <div class="actions">
              <button type="button" class="btn btn-start" onclick="event.preventDefault(); agentAction('start', '${esc(id)}')">▶ Start</button>
              <button type="button" class="btn btn-stop" onclick="event.preventDefault(); agentAction('stop', '${esc(id)}')">⏹ Stop</button>
              <button type="button" class="btn btn-restart" onclick="event.preventDefault(); agentAction('restart', '${esc(id)}')">⟳ Restart</button>
              ${meta.webui_port ? `<button type="button" class="btn btn-webui" onclick="event.preventDefault(); window.open('http://localhost:${meta.webui_port}', '_blank')">🌐 Open WebUI</button>` : ''}
              <button type="button" class="btn btn-delete" id="delBtn_${esc(id)}" onclick="event.preventDefault(); requestDelete('${esc(id)}')">🗑</button>
            </div>
          </div>
        `;
      }
    }
    
    listEl.innerHTML = html;
  } catch(e) {
    listEl.innerHTML = `<div style="color: var(--red); text-align: center; padding: 40px 0;">Render-Fehler: ${esc(e.message)}</div>`;
    systemLog(`Render-Fehler: ${e.message}`, 'err');
  }
}

async function agentAction(action, id) {
  systemLog(`Sende ${action.toUpperCase()} Signal an ${id}...`, 'warn');
  const r = await api('/api/agents/action', {
    method: 'POST',
    body: JSON.stringify({ action, agent_id: id })
  });
  
  if (r.ok) {
    systemLog(`Erfolg: ${r.message}`, 'ok');
  } else {
    systemLog(`Fehler bei ${action} (${id}): ${r.error}`, 'err');
  }
  
  // Refresh UI shortly after action to show state changes
  setTimeout(refreshAgents, 1500);
}

let deleteTimeouts = {};

function requestDelete(id) {
  const btn = document.getElementById(`delBtn_${id}`);
  if (!btn) return;
  
  if (btn.dataset.confirming === 'true') {
    // Zweiter Klick: Tatsächlich löschen
    clearTimeout(deleteTimeouts[id]);
    removeAgent(id);
  } else {
    // Erster Klick: Nachfragen
    btn.dataset.confirming = 'true';
    btn.innerHTML = '⚠️ Sicher?';
    btn.style.color = 'var(--red)';
    btn.style.background = 'rgba(239,68,68,0.1)';
    
    // Nach 3 Sekunden abbrechen
    deleteTimeouts[id] = setTimeout(() => {
      const resetBtn = document.getElementById(`delBtn_${id}`);
      if (resetBtn) {
        resetBtn.dataset.confirming = 'false';
        resetBtn.innerHTML = '🗑';
        resetBtn.style.color = '';
        resetBtn.style.background = '';
      }
    }, 3000);
  }
}

async function removeAgent(id) {
  const r = await api(`/api/agents/config/${id}`, { method: 'DELETE' });
  if (r.ok) {
    systemLog(`Agent ${id} aus Registry gelöscht.`, 'ok');
    refreshAgents();
  } else {
    systemLog(`Löschen fehlgeschlagen: ${r.error}`, 'err');
  }
}

// ==== AUTOCOMPLETE & FORM ====
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('agentSearch');
  const autocompleteList = document.getElementById('autocompleteList');

  searchInput.addEventListener('input', function() {
    const val = this.value.toLowerCase().trim();
    autocompleteList.innerHTML = '';
    
    if (!val) {
      autocompleteList.style.display = 'none';
      return;
    }

    const matches = AGENT_PRESETS.filter(a => 
      a.name.toLowerCase().includes(val) || 
      a.id.toLowerCase().includes(val) ||
      (a.desc && a.desc.toLowerCase().includes(val))
    );
    
    if (matches.length > 0) {
      autocompleteList.style.display = 'block';
      matches.forEach(agent => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.innerHTML = `
          <div style="font-size:20px;">${agent.icon}</div>
          <div>
            <div style="font-weight:600; font-size:14px;">${agent.name} <span style="font-size:11px; color:var(--text-dim); font-weight:normal;">(${agent.id})</span></div>
            <div style="font-size:11px; color:var(--text-dim);">${agent.desc}</div>
          </div>
        `;
        
        item.addEventListener('click', () => {
          searchInput.value = agent.name;
          autocompleteList.style.display = 'none';
          
          // Auto-fill fields
          document.getElementById('formId').value = agent.id;
          document.getElementById('formName').value = agent.name;
          document.getElementById('formIcon').value = agent.icon;
          document.getElementById('formPort').value = agent.port || '';
          document.getElementById('formWebUI').value = agent.webui_port || '';
          document.getElementById('formDir').value = agent.dir || '';
          document.getElementById('formCmd').value = agent.start_cmd || '';
          
          systemLog(`${agent.name} aus Vorlage geladen.`, 'ok');
        });
        
        autocompleteList.appendChild(item);
      });
    } else {
      autocompleteList.style.display = 'none';
    }
  });

  // Hide autocomplete when clicking outside
  document.addEventListener('click', function (e) {
    if (e.target !== searchInput) {
      autocompleteList.style.display = 'none';
    }
  });
});

async function saveAgent() {
  const id = document.getElementById('formId').value.trim();
  const name = document.getElementById('formName').value.trim();
  const icon = document.getElementById('formIcon').value.trim() || '🤖';
  const portVal = document.getElementById('formPort').value.trim();
  const webuiVal = document.getElementById('formWebUI').value.trim();
  const dir = document.getElementById('formDir').value.trim();
  const start_cmd = document.getElementById('formCmd').value.trim();
  
  const resEl = document.getElementById('saveResult');

  if (!id || !name) {
    resEl.innerHTML = '<span style="color:var(--red);">❌ ID und Name sind zwingend erforderlich!</span>';
    return;
  }

  const payload = { 
    id, 
    name, 
    icon, 
    port: portVal ? parseInt(portVal) : null,
    webui_port: webuiVal ? parseInt(webuiVal) : null,
    dir,
    start_cmd,
    color: '#06b6d4'
  };

  const r = await api('/api/agents/config', {
    method: 'POST',
    body: JSON.stringify(payload)
  });

  if (r.ok) {
    resEl.innerHTML = `<span style="color:var(--emerald);">✓ Agent ${esc(name)} erfolgreich gespeichert!</span>`;
    systemLog(`Agent ${name} (${id}) wurde in der Registry gespeichert.`, 'ok');
    
    // Clear form
    document.getElementById('formId').value = '';
    document.getElementById('formName').value = '';
    document.getElementById('formIcon').value = '';
    document.getElementById('formPort').value = '';
    document.getElementById('formWebUI').value = '';
    document.getElementById('formDir').value = '';
    document.getElementById('formCmd').value = '';
    document.getElementById('agentSearch').value = '';
    
    setTimeout(() => { resEl.innerHTML = ''; }, 3000);
    refreshAgents();
  } else {
    resEl.innerHTML = `<span style="color:var(--red);">❌ Fehler: ${r.error}</span>`;
    systemLog(`Fehler beim Speichern von ${name}: ${r.error}`, 'err');
  }
}

// Init
refreshAgents();
systemLog('Admin-Panel initialisiert.', 'ok');
</script>
</body>
</html>
