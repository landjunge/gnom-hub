<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductor Admin — Agent Management</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { overflow: auto; }
    .admin-layout { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
    .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); backdrop-filter: blur(20px); overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .panel-header h2 { font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; color: var(--cyan); }
    .panel-body { padding: 16px; max-height: 500px; overflow-y: auto; }
    .panel-body.compact { padding: 8px 16px; }
    .agent-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 8px; background: var(--bg-card); transition: border-color 0.2s; }
    .agent-row:hover { border-color: var(--border-bright); }
    .agent-row .icon { font-size: 20px; width: 32px; text-align: center; }
    .agent-row .info { flex: 1; min-width: 0; }
    .agent-row .info .name { font-weight: 600; font-size: 13px; }
    .agent-row .info .detail { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); display: flex; gap: 8px; align-items: center; margin-top: 2px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot.on { background: var(--emerald); box-shadow: 0 0 6px var(--emerald); }
    .dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .agent-row .actions { display: flex; gap: 4px; flex-shrink: 0; }
    .sm-btn { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 11px; cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; white-space: nowrap; }
    .sm-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
    .sm-btn.danger:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.1); }
    .sm-btn.success:hover { border-color: var(--emerald); color: var(--emerald); background: rgba(16,185,129,0.1); }
    .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .form-row input, .form-row select { flex: 1; padding: 8px 12px; border-radius: var(--radius); background: var(--bg-input); border: 1px solid var(--border); color: var(--text-bright); font-family: var(--font-sans); font-size: 12px; outline: none; }
    .form-row input:focus { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
    .form-row input::placeholder { color: var(--text-dim); }
    .log-area { font-family: var(--font-mono); font-size: 11px; line-height: 1.7; color: var(--text-dim); max-height: 300px; overflow-y: auto; }
    .log-line { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-line.ok { color: var(--emerald); }
    .log-line.err { color: var(--red); }
    .log-line.warn { color: var(--amber); }
    .proc-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px; font-family: var(--font-mono); align-items: center; }
    .proc-row .pid { color: var(--cyan); width: 60px; }
    .proc-row .cpu { color: var(--amber); width: 45px; }
    .proc-row .mem { color: var(--purple); width: 45px; }
    .proc-row .cmd { flex: 1; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .port-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px; font-family: var(--font-mono); align-items: center; }
    .port-row .pname { color: var(--cyan); width: 100px; }
    .port-row .ppid { color: var(--text-dim); width: 60px; }
    .port-row .paddr { flex: 1; color: var(--emerald); }
    .back-link { color: var(--cyan); text-decoration: none; font-size: 13px; font-family: var(--font-mono); }
    .back-link:hover { text-decoration: underline; }
    .test-result { margin-top: 8px; padding: 8px 12px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 12px; }
    .test-result.ok { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--emerald); }
    .test-result.fail { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <header class="header">
    <div class="header-left">
      <div class="logo"><span class="logo-icon">🔧</span><h1>CONDUCTOR ADMIN</h1></div>
      <a href="/" class="back-link">← Zurück zum Chat</a>
    </div>
    <div class="header-right">
      <div class="header-clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="admin-layout">
    <div class="admin-grid">
      <!-- ===== AGENT STATUS ===== -->
      <div class="panel">
        <div class="panel-header">
          <h2>◆ AGENT STATUS</h2>
          <button class="sm-btn" onclick="refreshAgents()">⟳ Refresh</button>
        </div>
        <div class="panel-body" id="agentList">Lade…</div>
      </div>

      <!-- ===== ADD AGENT ===== -->
      <div class="panel">
        <div class="panel-header"><h2>◆ AGENT HINZUFÜGEN</h2></div>
        <div class="panel-body">
          <div class="form-row"><input id="newId" placeholder="ID (z.B. myagent)"><input id="newName" placeholder="Name"></div>
          <div class="form-row"><input id="newIcon" placeholder="Icon" value="🤖"><input id="newPort" placeholder="Port" type="number"></div>
          <div class="form-row"><input id="newColor" placeholder="Farbe" value="#64748b"><input id="newDesc" placeholder="Beschreibung"></div>
          <div class="form-row"><button class="sm-btn success" onclick="addAgent()" style="flex:none;padding:8px 20px;">✓ Hinzufügen</button></div>
          <div id="addResult"></div>
        </div>
      </div>

      <!-- ===== KILL PROCESS ===== -->
      <div class="panel">
        <div class="panel-header"><h2>◆ PROZESS MANAGEMENT</h2></div>
        <div class="panel-body">
          <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px;">Prozesse killen nach PID, Name oder Port.</p>
          <div class="form-row">
            <input id="killPid" placeholder="PID">
            <select id="killSig"><option value="TERM">SIGTERM</option><option value="9">SIGKILL (-9)</option></select>
            <button class="sm-btn danger" onclick="killByPid()">Kill PID</button>
          </div>
          <div class="form-row">
            <input id="killName" placeholder="Prozessname (z.B. hermes)">
            <button class="sm-btn danger" onclick="killByName()">Kill Name</button>
          </div>
          <div class="form-row">
            <input id="killPort" placeholder="Port (z.B. 8787)" type="number">
            <button class="sm-btn danger" onclick="killByPort()">Port freimachen</button>
          </div>
          <div class="log-area" id="killLog"></div>
        </div>
      </div>

      <!-- ===== CONNECTION TEST ===== -->
      <div class="panel">
        <div class="panel-header"><h2>◆ VERBINDUNGSTEST</h2></div>
        <div class="panel-body">
          <div class="form-row">
            <input id="testUrl" placeholder="URL (z.B. http://localhost:8787)">
            <button class="sm-btn success" onclick="testConnection()">Test</button>
          </div>
          <button class="sm-btn" onclick="testAllAgents()" style="margin-bottom:10px;width:100%;">⚡ Alle Agenten testen</button>
          <div id="testResults"></div>
        </div>
      </div>

      <!-- ===== RUNNING PROCESSES ===== -->
      <div class="panel">
        <div class="panel-header">
          <h2>◆ LAUFENDE PROZESSE</h2>
          <button class="sm-btn" onclick="refreshProcesses()">⟳ Refresh</button>
        </div>
        <div class="panel-body compact" id="procList">Lade…</div>
      </div>

      <!-- ===== LISTENING PORTS ===== -->
      <div class="panel">
        <div class="panel-header">
          <h2>◆ BELEGTE PORTS</h2>
          <button class="sm-btn" onclick="refreshPorts()">⟳ Refresh</button>
        </div>
        <div class="panel-body compact" id="portList">Lade…</div>
      </div>
    </div>
  </div>

<script>
// ---- Clock ----
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);

// ---- Helpers ----
async function api(url, opts = {}) {
  const r = await fetch(url, { headers: {'Content-Type':'application/json'}, ...opts });
  return r.json();
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function log(id, msg, cls='') {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="log-line ${cls}">${new Date().toLocaleTimeString('de-DE')} — ${esc(msg)}</div>` + el.innerHTML;
}

// ---- Agent Status ----
let agentsConfig = {};
async function refreshAgents() {
  const [config, statusResp] = await Promise.all([
    api('/api/agents/config'),
    api('/api/status'),
  ]);
  agentsConfig = config;
  const agents = statusResp.agents || [];
  const statusMap = {};
  for (const a of agents) { statusMap[a.agent_name.toLowerCase()] = a; }

  let html = '';
  for (const [id, meta] of Object.entries(config)) {
    const s = agents.find(a => a.agent_name.toLowerCase().includes(id)) || {};
    const running = s.status === 'running';
    html += `<div class="agent-row">
      <span class="icon">${meta.icon}</span>
      <div class="info">
        <div class="name">${esc(meta.name)} <span style="color:var(--text-dim);font-size:10px;font-family:var(--font-mono);">(${id})</span></div>
        <div class="detail">
          <span class="dot ${running?'on':'off'}"></span>
          ${running?'Running':'Stopped'}
          ${meta.port ? '· :'+meta.port : ''}
        </div>
      </div>
      <div class="actions">
        ${meta.port ? `<button class="sm-btn success" onclick="testSingle('http://localhost:${meta.port}','${esc(meta.name)}')">Test</button>` : ''}
        <button class="sm-btn" onclick="agentAction('restart','${id}')">⟳</button>
        <button class="sm-btn" onclick="agentAction('start','${id}')">▶</button>
        <button class="sm-btn" onclick="agentAction('stop','${id}')">⏹</button>
        ${meta.port ? `<button class="sm-btn danger" onclick="if(confirm('Port ${meta.port} freimachen?'))killPortDirect(${meta.port})">☠</button>` : ''}
        <button class="sm-btn danger" onclick="if(confirm('Agent ${esc(meta.name)} entfernen?'))removeAgent('${id}')">✕</button>
      </div>
    </div>`;
  }
  document.getElementById('agentList').innerHTML = html || '<div style="color:var(--text-dim);">Keine Agenten.</div>';
}

async function agentAction(action, id) {
  log('killLog', `${action} → ${id}…`, 'warn');
  const r = await api(`/api/agents/config`, { method: 'POST' }).catch(() => null);
  // Use Cortex agent launcher if available
  try {
    await api(`http://localhost:3002/api/agentlauncher/${action}`, { method: 'POST', body: JSON.stringify({ agent_id: id }) });
    log('killLog', `${action} ${id}: gesendet`, 'ok');
  } catch (e) {
    log('killLog', `${action} ${id}: ${e.message}`, 'err');
  }
  setTimeout(refreshAgents, 2000);
}

async function removeAgent(id) {
  await api(`/api/agents/config/${id}`, { method: 'DELETE' });
  refreshAgents();
}

// ---- Add Agent ----
async function addAgent() {
  const id = document.getElementById('newId').value.trim().toLowerCase();
  const name = document.getElementById('newName').value.trim();
  if (!id || !name) { document.getElementById('addResult').textContent = '❌ ID und Name nötig'; return; }
  const r = await api('/api/agents/config', { method: 'POST', body: JSON.stringify({
    id, name,
    icon: document.getElementById('newIcon').value.trim() || '🤖',
    port: parseInt(document.getElementById('newPort').value) || null,
    color: document.getElementById('newColor').value.trim() || '#64748b',
    desc: document.getElementById('newDesc').value.trim(),
  })});
  if (r.ok) {
    document.getElementById('addResult').innerHTML = '<span style="color:var(--emerald);">✓ Hinzugefügt</span>';
    ['newId','newName','newDesc','newPort'].forEach(x => document.getElementById(x).value = '');
    refreshAgents();
  } else {
    document.getElementById('addResult').textContent = '❌ ' + (r.error || 'Fehler');
  }
}

// ---- Kill ----
async function killByPid() {
  const pid = document.getElementById('killPid').value.trim();
  const sig = document.getElementById('killSig').value;
  if (!pid) return;
  const r = await api('/api/admin/kill/pid', { method:'POST', body: JSON.stringify({ pid: parseInt(pid), signal: sig }) });
  log('killLog', r.ok ? r.message : `Fehler: ${r.error}`, r.ok ? 'ok' : 'err');
  document.getElementById('killPid').value = '';
}

async function killByName() {
  const name = document.getElementById('killName').value.trim();
  if (!name) return;
  const r = await api('/api/admin/kill/name', { method:'POST', body: JSON.stringify({ name, signal: document.getElementById('killSig').value }) });
  log('killLog', r.ok ? r.message : `Fehler: ${r.error}`, r.ok ? 'ok' : 'err');
  document.getElementById('killName').value = '';
}

async function killByPort() {
  const port = document.getElementById('killPort').value.trim();
  if (!port) return;
  const r = await api('/api/admin/kill/port', { method:'POST', body: JSON.stringify({ port: parseInt(port) }) });
  log('killLog', r.ok ? r.message : `Fehler: ${r.error}`, r.ok ? 'ok' : 'err');
  document.getElementById('killPort').value = '';
  setTimeout(refreshPorts, 1000);
}

async function killPortDirect(port) {
  const r = await api('/api/admin/kill/port', { method:'POST', body: JSON.stringify({ port }) });
  log('killLog', r.ok ? r.message : `Fehler: ${r.error}`, r.ok ? 'ok' : 'err');
  setTimeout(() => { refreshAgents(); refreshPorts(); }, 1500);
}

// ---- Connection Test ----
async function testConnection() {
  const url = document.getElementById('testUrl').value.trim();
  if (!url) return;
  document.getElementById('testResults').innerHTML = '<div style="color:var(--text-dim);">Testing…</div>';
  const r = await api('/api/admin/test', { method:'POST', body: JSON.stringify({ url }) });
  showTestResult(url, r);
}

function showTestResult(label, r) {
  const ok = r.reachable;
  document.getElementById('testResults').innerHTML += `<div class="test-result ${ok?'ok':'fail'}">
    ${ok?'✓':'✕'} ${esc(label)} — ${ok ? `HTTP ${r.status} (${r.ms}ms)` : (r.error || 'Nicht erreichbar')}
  </div>`;
}

async function testSingle(url, name) {
  document.getElementById('testResults').innerHTML = '<div style="color:var(--text-dim);">Testing…</div>';
  const r = await api('/api/admin/test', { method:'POST', body: JSON.stringify({ url }) });
  document.getElementById('testResults').innerHTML = '';
  showTestResult(`${name} (${url})`, r);
}

async function testAllAgents() {
  document.getElementById('testResults').innerHTML = '<div style="color:var(--text-dim);">Teste alle Agenten…</div>';
  const config = await api('/api/agents/config');
  document.getElementById('testResults').innerHTML = '';
  for (const [id, meta] of Object.entries(config)) {
    if (!meta.port) continue;
    const url = `http://localhost:${meta.port}`;
    const r = await api('/api/admin/test', { method:'POST', body: JSON.stringify({ url }) });
    showTestResult(`${meta.icon} ${meta.name} (:${meta.port})`, r);
  }
}

// ---- Processes ----
async function refreshProcesses() {
  const r = await api('/api/admin/processes');
  const procs = r.processes || [];
  if (!procs.length) { document.getElementById('procList').innerHTML = '<div style="color:var(--text-dim);">Keine Prozesse.</div>'; return; }
  let html = '<div class="proc-row" style="font-weight:600;color:var(--text-bright);"><span class="pid">PID</span><span class="cpu">CPU%</span><span class="mem">MEM%</span><span class="cmd">Command</span><span style="width:50px;">Kill</span></div>';
  for (const p of procs) {
    html += `<div class="proc-row">
      <span class="pid">${p.pid}</span><span class="cpu">${p.cpu}</span><span class="mem">${p.mem}</span>
      <span class="cmd" title="${esc(p.command)}">${esc(p.command)}</span>
      <button class="sm-btn danger" onclick="if(confirm('PID ${p.pid} killen?')){api('/api/admin/kill/pid',{method:'POST',body:JSON.stringify({pid:${p.pid},signal:'9'})}).then(()=>{log('killLog','Killed PID ${p.pid}','ok');refreshProcesses();})}">☠</button>
    </div>`;
  }
  document.getElementById('procList').innerHTML = html;
}

// ---- Ports ----
async function refreshPorts() {
  const r = await api('/api/admin/ports');
  const ports = r.ports || [];
  if (!ports.length) { document.getElementById('portList').innerHTML = '<div style="color:var(--text-dim);">Keine Ports.</div>'; return; }
  let html = '<div class="port-row" style="font-weight:600;color:var(--text-bright);"><span class="pname">Command</span><span class="ppid">PID</span><span class="paddr">Address</span><span style="width:50px;">Free</span></div>';
  for (const p of ports) {
    const portNum = (p.name || '').match(/:(\d+)$/)?.[1];
    html += `<div class="port-row">
      <span class="pname">${esc(p.command)}</span><span class="ppid">${p.pid}</span><span class="paddr">${esc(p.name || '')}</span>
      ${portNum ? `<button class="sm-btn danger" onclick="if(confirm('Port ${portNum} freimachen?'))killPortDirect(${portNum})">☠</button>` : ''}
    </div>`;
  }
  document.getElementById('portList').innerHTML = html;
}

// ---- Init ----
refreshAgents();
refreshProcesses();
refreshPorts();
</script>
</body>
</html>
