<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gnom-Hub — Command Hub</title>
  <meta name="description" content="Gnom-Hub — Zentrale Kommandozentrale. Agenten orchestrieren, Chat, Status, Sprachausgabe.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Scanline overlay -->
  <div class="scanlines" aria-hidden="true"></div>
  
  <!-- Ambient particles -->
  <div id="particles" class="particles" aria-hidden="true"></div>

  <!-- ============================================================ -->
  <!--  HEADER                                                       -->
  <!-- ============================================================ -->
  <header id="header" class="header">
    <div class="header-left">
      <button class="hamburger" id="hamburger" title="Menü">☰</button>
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>GNOM-HUB</h1>
      </div>
      <span class="subtitle">Agent Command Hub</span>
    </div>
    <div class="header-right">
      <div id="cortexStatus" class="cortex-status">
        <span class="status-dot pulse"></span>
        <span class="status-text">Cortex: Verbinde…</span>
      </div>
      <div class="header-clock" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- ============================================================ -->
  <!--  MAIN LAYOUT                                                  -->
  <!-- ============================================================ -->
  <main class="main-layout">
    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <!-- ========== LEFT SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h2 class="section-title">
          <span class="section-icon">◆</span> AGENTS
        </h2>
        <div id="agentGrid" class="agent-grid">
          <!-- Dynamically populated -->
        </div>
      </div>

      <div class="sidebar-section">
        <h2 class="section-title">
          <span class="section-icon">◆</span> QUICK ACTIONS
        </h2>
        <div class="quick-actions">
          <button class="action-btn" id="btnMemorySearch" title="Cortex Memory durchsuchen">
            <span class="action-icon">🔍</span>
            <span>Memory Search</span>
          </button>
          <button class="action-btn" id="btnSpeak" title="Mac Sprachausgabe">
            <span class="action-icon">🔊</span>
            <span>Speak</span>
          </button>
          <button class="action-btn" id="btnCortexStats" title="Cortex Statistiken">
            <span class="action-icon">📊</span>
            <span>Cortex Stats</span>
          </button>
          <button class="action-btn" id="btnClearChat" title="Chat leeren">
            <span class="action-icon">🗑️</span>
            <span>Clear Chat</span>
          </button>
          <button class="action-btn" id="btnAddAgent" title="Neuen Agenten hinzufügen">
            <span class="action-icon">➕</span>
            <span>Add Agent</span>
          </button>
          <a href="/admin.html" class="action-btn" style="text-decoration:none;" title="Admin Panel öffnen">
            <span class="action-icon">🔧</span>
            <span>Admin Panel</span>
          </a>
        </div>
      </div>

      <div class="sidebar-section sidebar-footer">
        <div class="stats-mini">
          <div class="stat-item">
            <span class="stat-label">Agents</span>
            <span class="stat-value" id="statAgents">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Online</span>
            <span class="stat-value stat-online" id="statOnline">-</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Memory</span>
            <span class="stat-value" id="statMemory">-</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ========== CHAT AREA ========== -->
    <section class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome message -->
        <div class="message system-message fade-in">
          <div class="message-content">
            <span class="system-icon">⚡</span>
            Gnom-Hub initialisiert — bereit für Befehle.
            <br><small>Tippe <code>@hermes</code>, <code>@paperclip</code>, <code>@openclaw</code> oder <code>@zero</code> um direkt mit einem Agenten zu sprechen.</small>
          </div>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="chat-input-area">
        <!-- @mention autocomplete -->
        <div class="autocomplete-dropdown" id="autocomplete" style="display:none;">
          <!-- Dynamically populated -->
        </div>
        
        <div class="input-wrapper">
          <textarea 
            id="chatInput" 
            class="chat-input" 
            placeholder="Nachricht eingeben… (@agent für Direktnachricht)"
            rows="1"
            autofocus
          ></textarea>
          <div class="input-actions">
            <button class="input-btn tts-toggle" id="btnTTS" title="Sprachausgabe ein/aus">
              <span id="ttsIcon">🔇</span>
            </button>
            <button class="input-btn send-btn" id="btnSend" title="Senden (Enter)">
              <span>➤</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============================================================ -->
  <!--  MODALS                                                       -->
  <!-- ============================================================ -->
  <!-- Memory Search Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Memory Search</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!--  AGENT CONTEXT MENU                                           -->
  <!-- ============================================================ -->
  <div class="context-menu" id="contextMenu" style="display:none;">
    <button class="ctx-btn" data-action="restart">⟳ Restart</button>
    <button class="ctx-btn" data-action="stop">⏹ Stop</button>
    <button class="ctx-btn" data-action="start">▶ Start</button>
    <button class="ctx-btn" data-action="chat">💬 Chat</button>
    <button class="ctx-btn" data-action="remove" style="color:var(--red);">🗑️ Remove</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
