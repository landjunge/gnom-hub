<!DOCTYPE html>
<html lang="de">

<head>
  <script src="/api/showbox/themes"></script>
  <link rel="stylesheet" href="/static/showbox.css?v=2">
  <script src="/static/showbox-buttons.js?v=4"></script>
  <script src="/static/showbox.js?v=4"></script>
  <script src="/static/core.js?v=4"></script>
  <script src="/static/system_dashboard.js?v=4"></script>
  <script src="/static/worker_dashboard.js?v=4"></script>
  <script src="/static/worker_sidebar.js?v=4"></script>
  <script src="/static/chat.js?v=4"></script>
  <script src="/static/workspace.js?v=4"></script>
  <script src="/static/dashboard.js?v=4"></script>
  <script>
    // ── Init Bootstrap ──
    (async () => {
      try {
        if (typeof checkTimers === 'function') checkTimers();
        await discoverPort();
        if (!API) {
          document.getElementById('content').innerHTML = '<div class="empty" style="padding:80px 20px"><h2 style="color:var(--error);margin-bottom:10px">Hub unreachable (No API)</h2><p>Server nicht gefunden. Öffne http://127.0.0.1:3002/ im Browser.</p></div>';
          return;
        }
        try {
          const sysInfo = await api('GET', '/system/info');
          if (sysInfo) {
            window.hasElevenLabs = !!sysInfo.has_elevenlabs;
            if (sysInfo.is_supergnom) {
              document.body.classList.add('supergnom-mode');
              const style = document.createElement('style');
              style.textContent = `
                body.supergnom-mode .sidebar { display: none !important; }
                body.supergnom-mode .content { margin-left: 0 !important; width: 100% !important; max-width: 900px !important; margin: 0 auto !important; padding: 20px !important; }
                body.supergnom-mode header button { display: none !important; }
                body.supergnom-mode #nuke-btn { pointer-events: none !important; cursor: default !important; }
                body.supergnom-mode .logo { cursor: default !important; }
              `;
              document.head.appendChild(style);

              if (sysInfo.template === 'senior') {
                document.body.classList.add('senior-mode');
                // Automatically check the voice (TTS) option for seniors
                setTimeout(() => {
                  const cb = document.getElementById('tts-enabled');
                  if (cb) cb.checked = true;
                }, 500);
              } else if (sysInfo.template === 'headless') {
                document.body.classList.add('headless-mode');
                document.getElementById('content').innerHTML = `
                  <div style="text-align: center; padding: 60px 40px; background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: var(--radius); max-width: 600px; width: 90%; box-shadow: 0 8px 32px rgba(0, 229, 255, 0.08); margin: 60px auto;">
                    <h1 style="font-size: 2.2rem; color: var(--cyan); margin-bottom: 15px; font-weight: 600; text-shadow: 0 0 10px rgba(0, 229, 255, 0.2);">🧠 SuperGNOM Headless</h1>
                    <p style="font-size: 1rem; color: var(--text-dim); margin-bottom: 30px; line-height: 1.6;">Diese Instanz läuft im <strong>Headless-Modus (API-only)</strong>.<br>Die Hintergrund-Agenten kommunizieren und arbeiten direkt über externe Schnittstellen.</p>
                    <div style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
                      <a href="/docs" target="_blank" class="btn-primary" style="text-decoration: none; padding: 12px 24px; font-size: 0.95rem; font-weight: bold; border-radius: 8px; display: inline-flex; align-items: center; gap: 8px;">
                        🖥️ API Dokumentation (Swagger)
                      </a>
                      <span style="font-size: 0.75rem; color: var(--text-muted);">Port: 3003 | Host: 127.0.0.1</span>
                    </div>
                  </div>
                `;
                return; // Stop loading other layouts/polling
              }
            }
          }
        } catch (e) {
          console.error("Failed to check SuperGNOM mode", e);
        }
        await loadAgents();
        await loadActivePreset();
        updateLamps(agents);
        showWarRoom();
        await loadShowboxList();
        _trackInterval(async () => {
          const res = await api('GET', '/agents');
          agents = Array.isArray(res) ? res : (res?.agents || []);
          const searchInput = document.getElementById('agent-search');
          renderAgentList(searchInput ? searchInput.value : '');
          updateStats();
          updateLamps(agents);
          await loadShowboxList();
        }, 3000);
        _trackInterval(refreshChat, 5000);
      } catch (err) {
        document.getElementById('content').innerHTML = `<div class="empty" style="padding:80px 20px"><h2 style="color:red">UI Error</h2><p>${err.message}</p></div>`;
      }
    })();
  </script>

  <!-- Showbox Fullscreen Overlay Modal -->
  <div id="showbox-overlay" class="showbox-overlay" onclick="closeShowboxOverlay(event)">
    <div class="showbox-overlay-card" onclick="event.stopPropagation()">
      <button class="showbox-overlay-close" onclick="closeShowboxOverlay(event)">&times;</button>
      <div class="showbox-overlay-header">
        <div class="showbox-overlay-title" id="showbox-overlay-title">Präsentation</div>
        <div class="showbox-overlay-sender" id="showbox-overlay-sender">Vom Agenten: System</div>
      </div>
      <div class="showbox-overlay-screen" style="position: relative;">
        <!-- Navigation Arrows inside screen -->
        <button class="showbox-overlay-nav showbox-overlay-nav-prev" id="showbox-overlay-prev-btn" onclick="prevOverlaySlide()">&lsaquo;</button>
        <div class="showbox-overlay-content" id="showbox-overlay-content">
          Lade Inhalt...
        </div>
        <button class="showbox-overlay-nav showbox-overlay-nav-next" id="showbox-overlay-next-btn" onclick="nextOverlaySlide()">&rsaquo;</button>
      </div>
      <div class="showbox-overlay-dots" id="showbox-overlay-dots"></div>
    </div>
  </div>
</body>

</html>
