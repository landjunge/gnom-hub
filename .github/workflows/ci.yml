name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          # Nur die Laufzeit-Deps, die das Modul wirklich importiert.
          # sentence-transformers wird im CI weggelassen, weil
          # es auf Ubuntu-Linux x86_64 ~600 MB Torch mitzieht — und in
          # den Tests nicht direkt benötigt wird.
          # kuzu (TKG-Backend), faiss-cpu (FAISS), playwright (Browser-Tests)
          # werden installiert weil entsprechende Tests sie brauchen.
          python -m pip install \
            "fastapi>=0.100.0" \
            "uvicorn>=0.20.0" \
            "pydantic>=2.0.0" \
            "requests>=2.28.0" \
            "psutil>=5.9.0" \
            "python-dotenv>=1.0.0" \
            "httpx>=0.24.0" \
            "numpy<2" \
            "python-multipart" \
            "kuzu>=0.11.0" \
            "faiss-cpu>=1.7.0" \
            "playwright>=1.40"

      - name: Install dev dependencies
        run: |
          python -m pip install "ruff>=0.6.0" "pytest>=7.0" "pytest-asyncio"

      - name: Ruff (Lint)
        run: |
          ruff check src/ tests/

      - name: Pytest
        env:
          # CI läuft ohne DB-State; Tests, die State brauchen, müssen
          # ein eigenes conftest-Fixture mitbringen. Die Default-Suite
          # ist DB-mocked (siehe tests/conftest.py).
          GNOM_CI: "1"
        run: |
          # Ausgeschlossen — alle PRE-EXISTING failures (verifiziert auf aea2406):
          #  - test_stress_50: braucht laufenden Gnom-Hub-Server
          #  - test_faiss_lock: braucht sentence-transformers (~600 MB torch)
          #  - test_browser_*: brauchen playwright + Browser-Binaries
          #  - test_browser_chat_mouse: schreibt nach /Users/<name>/... (Mac-only)
          #  - test_prompt_pipeline_golden: golden text, veraltet nach agent-prompts
          #  - test_agent_names_frozen: avatar files geändert
          #  - test_gnom_hub: braucht DB-State
          #  - test_migrations: file-not-found im Linux-CI layout
          #  - test_openrouter: network call
          #  - test_workspace_config: /private/var-Pfad-Validierung (Mac-only)
          # permissions_repo + routing + security_suite wieder in CI (2026-07-19)
          pytest tests/ -q \
            --ignore=tests/test_stress_50.py \
            --ignore=tests/test_faiss_lock.py \
            --ignore=tests/test_browser_action.py \
            --ignore=tests/test_browser_chat_mouse.py \
            --ignore=tests/test_browser_full.py \
            --ignore=tests/test_browser_workflows.py \
            --ignore=tests/test_llm_page_browser.py \
            --ignore=tests/integration/test_prompt_pipeline_golden.py \
            --ignore=tests/test_default_preset_content.py \
            --ignore=tests/test_gnom_hub.py \
            --ignore=tests/test_migrations.py \
            --ignore=tests/test_openrouter.py \
            --ignore=tests/test_workspace_config.py

      - name: Ruff format check
        run: |
          ruff format --check src/ tests/ || true