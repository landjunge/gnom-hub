name: CI

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main, dev]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          # Nur die Laufzeit-Deps, die das Modul wirklich importiert.
          # sentence-transformers/faiss-CPU werden im CI weggelassen, weil
          # sie auf Ubuntu-Linux x86_64 ziehen ~600 MB Torch mit — und in
          # den Tests nicht direkt benötigt werden.
          # kuzu (TKG-Backend) wird installiert weil die TKG-Tests es brauchen.
          python -m pip install \
            "fastapi>=0.100.0" \
            "uvicorn>=0.20.0" \
            "pydantic>=2.0.0" \
            "requests>=2.28.0" \
            "psutil>=5.9.0" \
            "python-dotenv>=1.0.0" \
            "httpx>=0.24.0" \
            "numpy<2" \
            "python-multipart" \
            "kuzu>=0.11.0"

      - name: Install dev dependencies
        run: |
          python -m pip install "ruff>=0.6.0" "pytest>=7.0" "pytest-asyncio"

      - name: Ruff (Lint)
        run: |
          ruff check src/ tests/

      - name: Pytest
        env:
          # CI läuft ohne DB-State; Tests, die State brauchen, müssen
          # ein eigenes conftest-Fixture mitbringen. Die Default-Suite
          # ist DB-mocked (siehe tests/conftest.py).
          GNOM_CI: "1"
        run: |
          # Stress-Test (test_stress_50) ist explizit ausgeschlossen —
          # der braucht einen laufenden Gnom-Hub-Server.
          pytest tests/ -q --ignore=tests/test_stress_50.py

      - name: Ruff format check
        run: |
          ruff format --check src/ tests/ || true