        .step-container {

            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 2rem 0 1.5rem;
        }
        .step-display {

            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
            color: #c4b5fd;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 40px rgba(167, 139, 250, 0.15);
        }
        .step-label {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            color: #9ca3af;
            letter-spacing: 0.04em;
        }

        /* progress bar */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            overflow: hidden;
            margin: 1.5rem 0 2rem;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a78bfa, #6366f1);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* controls */
        .controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 0.65rem 1.6rem;
            border: none;
            border-radius: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.04);
            color: #d1d5db;
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(167, 139, 250, 0.3);
            transform: scale(1.02);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(99,102,241,0.25);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(99,102,241,0.35);
            background: linear-gradient(135deg, #8b5cf6, #4f46e5);
        }
        .btn-primary:active {
            box-shadow: 0 2px 8px rgba(99,102,241,0.2);
        }
        .btn-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        /* status */
        .status-msg {
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 1.5rem;
            min-height: 1.4em;
        }

        /* responsive */
        @media (max-width: 480px) {
            .sequence-card { padding: 1.75rem 1.25rem; border-radius: 1.75rem; }
            .step-display { font-size: 3.5rem; }
            .seq-title { font-size: 1rem; }
            .btn { padding: 0.5rem 1.2rem; font-size: 0.85rem; }
        }

        /* accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition-duration: 0.01ms !important; }
        }
        /* focus visible */
        .btn:focus-visible {
            outline: 2px solid #a78bfa;
            outline-offset: 3px;
        }
    </style>

    <main class="sequence-card" role="main" aria-labelledby="seq-title-id">
        <div class="seq-header">
            <span class="seq-number" aria-hidden="true">SEQ-12</span>
            <h1 class="seq-title" id="seq-title-id">Chain Satellite</h1>
        </div>

        <div class="step-container" aria-live="polite">
            <div class="step-display" id="stepDisplay">00</div>
            <p class="step-label" id="stepLabel">Bereit</p>
        </div>

        <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="controls" role="group" aria-label="Sequenzsteuerung">
            <button class="btn" id="prevBtn" aria-label="Vorheriger Schritt">
                <span class="btn-icon" aria-hidden="true">◀</span> Zurück
            </button>
            <button class="btn btn-primary" id="nextBtn" aria-label="Nächster Schritt">
                Weiter <span class="btn-icon" aria-hidden="true">▶</span>
            </button>
            <button class="btn" id="resetBtn" aria-label="Sequenz zurücksetzen">
                <span class="btn-icon" aria-hidden="true">⟳</span> Reset
            </button>
        </div>

        <p class="status-msg" id="statusMsg">Schritt 0 von 12</p>
    </main>

    <script>
        (function() {
            // ---- Konfiguration ----
            const TOTAL_STEPS = 12;
            const LABELS = [
                "Init",
                "Verbinden",
                "Sync",
                "Prüfen",
                "Kalibrieren",
                "Bereit",
                "Senden",
                "Empfangen",
                "Parität",
                "Bestätigen",
                "Final",
                "OK"
            ];

            // ---- DOM ----
            const stepDisplay  = document.getElementById('stepDisplay');
            const stepLabel    = document.getElementById('stepLabel');
            const progressFill = document.getElementById('progressFill');
            const statusMsg    = document.getElementById('statusMsg');
            const prevBtn      = document.getElementById('prevBtn');
            const nextBtn      = document.getElementById('nextBtn');
            const resetBtn     = document.getElementById('resetBtn');
            const progressBar  = document.getElementById('progressBar');

            // ---- Zustand ----
            let currentStep = 0;  // 0 .. TOTAL_STEPS

            function updateUI() {
                // Schritt anzeigen (zweistellig)
                stepDisplay.textContent = String(currentStep).padStart(2, '0');

                // Label
                const idx = Math.min(currentStep, LABELS.length - 1);
                stepLabel.textContent = LABELS[idx];

                // Fortschritt
                const percent = (currentStep / TOTAL_STEPS) * 100;
                progressFill.style.width = percent + '%';
                progressBar.setAttribute('aria-valuenow', Math.round(percent));

                // Status
                statusMsg.textContent = `Schritt ${currentStep} von ${TOTAL_STEPS}`;

                // Buttons deaktivieren an Grenzen
                prevBtn.disabled = (currentStep === 0);
                nextBtn.disabled = (currentStep === TOTAL_STEPS);

                // ARIA
                stepDisplay.setAttribute('aria-label', `Schritt ${currentStep}: ${LABELS[idx]}`);
            }

            function goToStep(step) {
                if (step < 0) step = 0;
                if (step > TOTAL_STEPS) step = TOTAL_STEPS;
                currentStep = step;
                updateUI();
            }

            function nextStep() {
                if (currentStep < TOTAL_STEPS) {
                    currentStep++;
                    updateUI();
                }
            }

            function prevStep() {
                if (currentStep > 0) {
                    currentStep--;
                    updateUI();
                }
            }

            function resetSequence() {
                goToStep(0);
                // Kurzes visuelles Feedback
                statusMsg.textContent = '↺ Sequenz zurückgesetzt';
                setTimeout(() => {
                    statusMsg.textContent = `Schritt ${currentStep} von ${TOTAL_STEPS}`;
                }, 800);
            }

            // ---- Event Listener ----
            nextBtn.addEventListener('click', nextStep);
            prevBtn.addEventListener('click', prevStep);
            resetBtn.addEventListener('click', resetSequence);

            // Tastaturunterstützung
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') {
                    e.preventDefault();
                    nextStep();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevStep();
                } else if (e.key === 'r' || e.key === 'R') {
                    resetSequence();
                }
            });

            // ---- Initialisierung ----
            updateUI();
            statusMsg.textContent = '✅ Sequenz geladen – bereit';
        })();
    </script>
