<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

  .scene {
    position: relative;
    width: 400px;
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .hammer {
    position: relative;
    width: 200px;
    height: 300px;
    transform-origin: top center;
    animation: swing 2s ease-in-out infinite alternate;
  }
  .handle {
    width: 20px;
    height: 200px;
    background: linear-gradient(to right, #8B4513, #A0522D, #8B4513);
    margin: 0 auto;
    border-radius: 4px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    position: relative;
    top: 60px;
  }
  .head {
    width: 120px;
    height: 60px;
    background: linear-gradient(145deg, #555, #333, #444);
    margin: 0 auto;
    border-radius: 8px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.1);
    position: relative;
    top: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffd700;
    font-weight: bold;
    font-size: 1.5rem;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 2px;
  }
  .head::after {
    content: "5";
    font-size: 2rem;
    color: #ffd700;
    text-shadow: 0 0 10px #ffaa00;
  }
  .impact {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
  }
  .impact span {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ffdd44;
    border-radius: 50%;
    box-shadow: 0 0 20px #ffaa00;
    animation: spark 1.5s ease-out infinite;
  }
  .impact span:nth-child(1) { top: 70%; left: 30%; animation-delay: 0s; }
  .impact span:nth-child(2) { top: 75%; left: 55%; animation-delay: 0.3s; }
  .impact span:nth-child(3) { top: 65%; left: 45%; animation-delay: 0.6s; }
  .impact span:nth-child(4) { top: 80%; left: 40%; animation-delay: 0.9s; }
  .impact span:nth-child(5) { top: 60%; left: 60%; animation-delay: 1.2s; }

  @keyframes swing {
    0% { transform: rotate(-30deg); }
    50% { transform: rotate(10deg); }
    100% { transform: rotate(-30deg); }
  }
  @keyframes spark {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
  }
  .title {
    position: absolute;
    bottom: 50px;
    color: #ffd700;
    font-size: 1.8rem;
    text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff6600;
    animation: glow 1.5s ease-in-out infinite alternate;
    font-weight: 800;
    letter-spacing: 4px;
  }
  @keyframes glow {
    0% { text-shadow: 0 0 10px #ffaa00, 0 0 20px #ff6600; }
    100% { text-shadow: 0 0 30px #ffaa00, 0 0 60px #ff3300; }
  }
  .bg-text {
    position: absolute;
    font-size: 12rem;
    font-weight: 900;
    color: rgba(255,215,0,0.05);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
    user-select: none;
  }
</style>
