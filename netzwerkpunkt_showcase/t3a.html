  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }
    .app {
      width: 100%;
      max-width: 600px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      padding: 2rem;
      transition: box-shadow 0.2s;
    }
    h1 {
      font-weight: 600;
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      color: #0f3460;
    }
    p.sub {
      color: #6c757d;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .input-group input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-group input:focus {
      border-color: #0f3460;
    }
    .input-group button {
      padding: 0.75rem 1.25rem;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .input-group button:hover { background: #1a4a7a; }
    .input-group button:focus-visible { outline: 3px solid #ffb703; outline-offset: 2px; }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .task {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: #f8f9fa;
      border-radius: 12px;
      transition: background 0.15s, transform 0.1s;
      cursor: default;
    }
    .task:hover {
      background: #eef1f5;
    }
    .task input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      accent-color: #0f3460;
      cursor: pointer;
    }
    .task .text {
      flex: 1;
      font-size: 1rem;
    }
    .task.done .text {
      text-decoration: line-through;
      color: #6c757d;
    }
    .task button.delete {
      background: transparent;
      border: none;
      color: #adb5bd;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      transition: background 0.1s, color 0.1s;
    }
    .task button.delete:hover { color: #d32f2f; background: rgba(211,47,47,0.1); }
    .task button.delete:focus-visible { outline: 2px solid #d32f2f; }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #e9ecef;
      font-size: 0.85rem;
      color: #6c757d;
    }
    .stats button {
      background: none;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      color: #495057;
      transition: background 0.1s;
    }
    .stats button:hover { background: #e9ecef; }
    .empty-msg {
      text-align: center;
      color: #adb5bd;
      padding: 2rem 0;
    }
    @media (max-width: 480px) {
      .app { padding: 1.5rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>

  <main class="app" role="main" aria-label="Aufgabenverwaltung t3a">
    <h1>Aufgabenliste</h1>
    <p class="sub" id="task-count">0 Aufgaben</p>
    <div class="input-group">
      <label for="new-task-input" class="sr-only" style="position:absolute;left:-9999px;">Neue Aufgabe</label>
      <input type="text" id="new-task-input" placeholder="Aufgabe hinzufügen …" maxlength="120" aria-describedby="task-count">
      <button id="add-task-btn" aria-label="Aufgabe hinzufügen">+ Hinzufügen</button>
    </div>
    <ul class="task-list" id="task-list" role="list" aria-label="Liste der Aufgaben"></ul>
    <div class="stats">
      <span id="progress"></span>
      <button id="clear-done-btn" aria-label="Erledigte Aufgaben löschen">Erledigte löschen</button>
    </div>
  </main>

  <script>
    (function() {
      // State
      let tasks = JSON.parse(localStorage.getItem('t3a_tasks')) || [];

      const listEl = document.getElementById('task-list');
      const inputEl = document.getElementById('new-task-input');
      const addBtn = document.getElementById('add-task-btn');
      const countEl = document.getElementById('task-count');
      const progressEl = document.getElementById('progress');
      const clearDoneBtn = document.getElementById('clear-done-btn');

      function save() {
        localStorage.setItem('t3a_tasks', JSON.stringify(tasks));
      }

      function render() {
        listEl.innerHTML = '';
        if (tasks.length === 0) {
          listEl.innerHTML = '<li class="empty-msg" aria-live="polite">Keine Aufgaben – lege eine neue an.</li>';
          countEl.textContent = '0 Aufgaben';
          progressEl.textContent = '';
          return;
        }

        const doneCount = tasks.filter(t => t.done).length;
        countEl.textContent = `${tasks.length} Aufgabe${tasks.length !== 1 ? 'n' : ''}`;
        progressEl.textContent = `${doneCount} von ${tasks.length} erledigt`;

        tasks.forEach((task, index) => {
          const li = document.createElement('li');
          li.className = 'task' + (task.done ? ' done' : '');
          li.setAttribute('role', 'listitem');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.done;
          checkbox.setAttribute('aria-label', `Aufgabe "${task.text}" als ${task.done ? 'nicht erledigt' : 'erledigt'} markieren`);
          checkbox.addEventListener('change', () => {
            tasks[index].done = !tasks[index].done; // toggle
            save();
            render();
          });

          const textSpan = document.createElement('span');
          textSpan.className = 'text';
          textSpan.textContent = task.text;

          const delBtn = document.createElement('button');
          delBtn.className = 'delete';
          delBtn.textContent = '✕';
          delBtn.setAttribute('aria-label', `Aufgabe "${task.text}" löschen`);
          delBtn.addEventListener('click', () => {
            tasks.splice(index, 1);
            save();
            render();
            inputEl.focus();
          });

          li.appendChild(checkbox);
          li.appendChild(textSpan);
          li.appendChild(delBtn);
          listEl.appendChild(li);
        });
      }

      function addTask() {
        const text = inputEl.value.trim();
        if (!text) return;
        tasks.push({ text, done: false });
        save();
        render();
        inputEl.value = '';
        inputEl.focus();
      }

      // Event listeners
      addBtn.addEventListener('click', addTask);
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addTask();
      });

      clearDoneBtn.addEventListener('click', () => {
        tasks = tasks.filter(t => !t.done);
        save();
        render();
      });

      // Initial render
      render();
    })();
  </script>
